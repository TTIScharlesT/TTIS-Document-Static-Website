              "id": "10-1-create-a-course",
              "title": "10.1 Create A Course",
              "text": "10.1 Create A Course Sign in with an account authorized to create LMS content. Open the LMS administration or course authoring area. Select create course. Enter course metadata: {{Course Code}} {{Course Title}} {{Description}} {{Owner}} {{Approval Track}} {{Status}} Add modules in the correct order. Add lessons to each module. Add lesson content or references. Add prerequisites if required. Add quizzes, questions, passing criteria, and retake policy if required. Add competency mappings where applicable. Add a practical rubric if observed skill is required. Save the course as draft. [Screenshot: Course authoring page showing course metadata, modules, lessons, quiz, and competency mapping]"
            },
            {
              "id": "10-2-configure-approval-track",
              "title": "10.2 Configure Approval Track",
              "text": "10.2 Configure Approval Track Open the draft course. Select the approval track: policy_anchored trade_technical federal_compliance Confirm the track matches the content risk: Use policy-anchored for internal policy or standard operating procedure training. Use trade-technical for technical field skill content. Use federal-compliance for FAR, CMMC, customer, federal compliance, or regulated content where applicable. Save the approval track. Submit the course for review."
            },
            {
              "id": "10-3-review-approve-reject-and-release-a-course",
              "title": "10.3 Review, Approve, Reject, And Release A Course",
              "text": "10.3 Review, Approve, Reject, And Release A Course For reviewers: Open the pending review queue. Filter by approval track. Open the course. Review course title, description, modules, lessons, quizzes, prerequisites, competency mappings, rubrics, and references. Confirm you have authority and competence to review the selected track. Approve or reject the course. Enter review notes: {{Decision}} {{Reviewer Name}} {{Reviewer Credential if required}} {{Justification}} Save the review. For release owner: Open courses pending release. Confirm required approvals are complete. Confirm no rejected or unresolved review items remain. Record release. If overriding, enter override justification. Confirm the course is published."
            },
            {
              "id": "10-4-create-or-update-competencies",
              "title": "10.4 Create Or Update Competencies",
              "text": "10.4 Create Or Update Competencies Open the competency registry. Search for an existing competency before creating a duplicate. Create or update the competency: {{Competency ID}} {{Competency Name}} {{Description}} {{Role Mapping}} {{Prerequisites}} {{Recertification Interval}} {{Standard Reference}} Add prerequisite relationships if required. Link lessons, quiz questions, practical criteria, or certifications to the competency. Ratify the competency if required. Record standard revisions when external standards or internal procedures change."
            },
            {
              "id": "10-5-create-a-certification",
              "title": "10.5 Create A Certification",
              "text": "10.5 Create A Certification Open the certifications administration area. Select create certification. Enter: {{Certification Code}} {{Certification Name}} {{Description}} {{Required Curriculum}} {{Required Courses}} {{Required Quiz or Final Assessment}} {{Practical Rubric Required}} {{Expiration Period}} {{Renewal Requirements}} Save the certification. Verify eligibility logic using a test learner or review screen. Publish or activate according to policy."
            },
            {
              "id": "10-6-issue-an-internal-credential",
              "title": "10.6 Issue An Internal Credential",
              "text": "10.6 Issue An Internal Credential Open the learner's certification eligibility page. Confirm all curriculum courses are complete. Confirm final quiz or assessment is passed if required. Confirm practical assessment is passed if the certification has a practical rubric. Confirm there is no active disqualifying exception. Select issue credential. Enter: {{Learner ID}} {{Certification ID}} {{Issue Date}} {{Expiration Date}} {{Issued By}} {{Evidence Reviewed}} Save the credential. Confirm the credential appears in the learner's active credential list."
            },
            {
              "id": "10-7-record-an-external-credential",
              "title": "10.7 Record An External Credential",
              "text": "10.7 Record An External Credential External credentials are earned outside the LMS and recorded by attestation. The learner should not attest their own external credential. Open the external credential entry screen. Select the learner. Enter: {{Credential Name}} {{Issuing Organization}} {{Credential Number}} {{Issue Date}} {{Expiration Date}} {{Evidence Reference}} {{Attestor}} {{Attestation Date}} Confirm the attestor is not the learner. Confirm evidence is sufficient under company policy. Save the external credential. Confirm the credential appears in the learner competency record. [TBD: information needed - approved external credential evidence standards and file handling rules]"
            },
            {
              "id": "10-8-manage-onboarding-records",
              "title": "10.8 Manage Onboarding Records",
              "text": "10.8 Manage Onboarding Records Open onboarding administration. Create or search for an onboarding record. Assign tasks, training, acknowledgements, screenings, assets, and check-ins. Monitor due dates and gate conditions. Process waivers only when authorized. Release gates only after evidence review. Export onboarding data when required for reporting. Complete or cancel records with documented reason."
            },
            {
              "id": "10-9-review-integrity-status-and-record-history",
              "title": "10.9 Review Integrity Status And Record History",
              "text": "10.9 Review Integrity Status And Record History Open LMS administration. Select integrity status. Review the current audit-chain verification result. If integrity is healthy, record the date and result for audit readiness. If integrity check fails, stop normal evidence-changing activity and escalate immediately. Open record history for the affected record. Preserve all evidence and logs. Start incident, corrective action, or CAPA workflow according to policy. [Screenshot: LMS integrity status page showing chain verification result and record history link]"
            },
            {
              "id": "11-certification-and-credential-management",
              "title": "11. Certification And Credential Management",
              "text": "11. Certification And Credential Management"
            },
            {
              "id": "11-1-internal-certifications",
              "title": "11.1 Internal Certifications",
              "text": "11.1 Internal Certifications Internal certifications are earned through LMS-controlled requirements. The expected evidence set includes: Required course completions. Required quiz or assessment pass. Required practical assessment pass, when applicable. Credential issue record. Expiration or renewal schedule. Do not issue an internal credential when eligibility evidence is incomplete."
            },
            {
              "id": "11-2-external-credentials",
              "title": "11.2 External Credentials",
              "text": "11.2 External Credentials External credentials are recorded by attestation. Examples may include OSHA, BICSI, FOA, manufacturer training, or other industry credentials when applicable. External credential controls: The credential is not issued by the LMS. The attestor must not be the learner. Evidence should identify the issuing organization. Date fields are attested claims unless verified through an authoritative source. External credential records should include expiration dates when applicable."
            },
            {
              "id": "11-3-expiration-and-renewal",
              "title": "11.3 Expiration And Renewal",
              "text": "11.3 Expiration And Renewal Managers and administrators should monitor expiring credentials before they affect readiness. Open the expiring credentials report. Filter by date range: {{Within 30 Days}} {{Within 60 Days}} {{Within 90 Days}} {{Expired}} Notify affected learners and managers. Assign renewal training or request updated external evidence. Confirm renewal completion. Update credential status or issue a renewed credential. [TBD: information needed - official notification windows for expiring credentials]"
            },
            {
              "id": "11-4-revocation",
              "title": "11.4 Revocation",
              "text": "11.4 Revocation Credential revocation should be used when a credential is no longer valid. Confirm revocation authority. Review the credential record. Confirm the reason: Expired or invalid evidence. Incorrect issuance. Failed reassessment. Policy or compliance issue. Other documented reason. Record revocation reason. Save the revocation. Notify affected learner, manager, and compliance owner. Review downstream readiness impact."
            },
            {
              "id": "11-5-certification-governance-checklist",
              "title": "11.5 Certification Governance Checklist",
              "text": "11.5 Certification Governance Checklist Control Required evidence Certification definition is approved Certification record and owner. Curriculum requirements are clear Required courses and assessments. Competencies are mapped Competency links and standard references. Practical criteria are defined Rubric and criteria. Issuance is eligibility-based Completion, quiz, and practical evidence. External credential is attested Attestor, evidence reference, issuing organization. Expiration is monitored Expiring report and renewal action. Revocation is documented Revocation reason and actor."
            },
            {
              "id": "12-qms-integration-and-competence-evidence",
              "title": "12. QMS Integration And Competence Evidence",
              "text": "12. QMS Integration And Competence Evidence The LMS/QMS module supports quality management by connecting training, competence, readiness, and audit evidence."
            },
            {
              "id": "12-1-qms-evidence-types",
              "title": "12.1 QMS Evidence Types",
              "text": "12.1 QMS Evidence Types Evidence type Example Quality purpose Course record Published course, approval track, release history Shows controlled training content. Enrollment record Assigned learner, due date, status Shows required learning assignment. Lesson completion Lesson completion timestamp Shows learner activity. Quiz attempt Score, pass/fail, attempt timestamp Shows knowledge assessment. Practical assessment Rubric, assessor, result, locked submission Shows observed skill competence. Credential record Active, expired, revoked, issue/expiration date Shows current qualification status. External credential attestation Issuer, credential number, attestor Shows outside qualification evidence. Competency matrix Role requirement, learner readiness Shows role-to-competence alignment. Onboarding acknowledgement Policy version and learner acknowledgement Shows receipt and acknowledgement. Waiver or exception Reason, approver, expiration Shows controlled deviation. CAPA reference Corrective action record Shows gap handling and remediation."
            },
            {
              "id": "12-2-controlled-content-expectations",
              "title": "12.2 Controlled Content Expectations",
              "text": "12.2 Controlled Content Expectations Controlled training content should include: Course owner. Version or revision reference. Approval track. Reviewer decision. Release record. Standard or policy reference. Competency mapping. Effective date. Retirement or supersession status when applicable. [TBD: information needed - final document control numbering convention for LMS content]"
            },
            {
              "id": "12-3-standard-revisions",
              "title": "12.3 Standard Revisions",
              "text": "12.3 Standard Revisions When a policy, customer requirement, technical standard, safety requirement, or compliance obligation changes: Record the standard revision. Identify affected courses, competencies, certifications, practical rubrics, and onboarding tasks. Update controlled content in draft status. Route updated content through the appropriate approval track. Release the updated content. Assign retraining or recertification as required. Preserve previous evidence and version history."
            },
            {
              "id": "12-4-readiness-decisions",
              "title": "12.4 Readiness Decisions",
              "text": "12.4 Readiness Decisions A readiness decision should be based on current evidence, not informal knowledge. Before approving a person for role, project, customer, or regulated work: Confirm the learner identity. Review the competency matrix. Confirm required training completion. Confirm quiz or knowledge assessment completion. Confirm practical skill assessment completion where required. Confirm active credentials. Confirm external credentials are attested and not expired. Confirm no unresolved waiver, CAPA, or exception blocks readiness. Record the decision or export supporting evidence as needed."
            },
            {
              "id": "13-reporting-and-audit-readiness",
              "title": "13. Reporting And Audit Readiness",
              "text": "13. Reporting And Audit Readiness"
            },
            {
              "id": "13-1-common-reports",
              "title": "13.1 Common Reports",
              "text": "13.1 Common Reports Report Purpose Typical audience Learner transcript Show an individual's course, quiz, practical, and credential history. Learner, manager, auditor. Team readiness matrix Show readiness by role, competency, credential, or project. Managers, operations leaders. Expiring credentials Identify credentials nearing expiration. Managers, LMS/QMS admins. Course completion report Track assigned, in-progress, completed, waived, and overdue learning. Managers, LMS/QMS admins. Practical assessment report Review observed skill assessment status and outcomes. Field ops, QMS, auditors. External credentials report Review attested external qualifications. LMS/QMS admins, auditors. Onboarding status report Track onboarding task, gate, and completion status. HR/onboarding coordinators, managers. Integrity status report Confirm audit-chain health. Administrators, compliance reviewers. Record history Show evidence changes for a selected record. Auditors, administrators."
            },
            {
              "id": "13-2-prepare-for-an-audit",
              "title": "13.2 Prepare For An Audit",
              "text": "13.2 Prepare For An Audit Confirm the audit scope: {{Audit Period}} {{Business Unit}} {{Project or Customer}} {{Learner Population}} {{Requirement Set}} Export or prepare the required reports. Verify LMS integrity status. Sample learner records for: Assignment evidence. Completion evidence. Quiz attempt evidence. Practical assessment evidence. Credential evidence. Waiver or CAPA evidence. Confirm controlled courses were approved and released. Confirm external credentials have independent attestation. Confirm expired or revoked credentials did not support current readiness. Document findings, exceptions, and follow-up actions."
            },
            {
              "id": "13-3-evidence-package-checklist",
              "title": "13.3 Evidence Package Checklist",
              "text": "13.3 Evidence Package Checklist Evidence package item Included? Notes Audit scope and date range {{Yes/No}} {{Notes}} Integrity status result {{Yes/No}} {{Notes}} Learner list {{Yes/No}} {{Notes}} Training assignments {{Yes/No}} {{Notes}} Course completion records {{Yes/No}} {{Notes}} Quiz attempts {{Yes/No}} {{Notes}} Practical assessments {{Yes/No}} {{Notes}} Credential records {{Yes/No}} {{Notes}} External credential attestations {{Yes/No}} {{Notes}} Waivers and CAPA references {{Yes/No}} {{Notes}} Course approval and release records {{Yes/No}} {{Notes}} Onboarding records {{Yes/No}} {{Notes}} [TBD: information needed - approved export format, storage folder, and audit package naming convention]"
            },
            {
              "id": "14-exceptions-waivers-corrections-and-capa",
              "title": "14. Exceptions, Waivers, Corrections, And CAPA",
              "text": "14. Exceptions, Waivers, Corrections, And CAPA"
            },
            {
              "id": "14-1-exception-types",
              "title": "14.1 Exception Types",
              "text": "14.1 Exception Types Exception type Use when Required controls Waiver A requirement is temporarily waived by authorized personnel. Reason, approver, expiration, compensating control. Deferral A required item is delayed but remains required. New due date, reason, manager approval. Correction Historical information needs correction without altering original evidence. New linked correction record, reason, actor. Revocation A credential is no longer valid. Reason, revocation actor, readiness review. CAPA A systemic or quality issue requires corrective/preventive action. Root cause, action owner, due date, closure evidence."
            },
            {
              "id": "14-2-waiver-procedure",
              "title": "14.2 Waiver Procedure",
              "text": "14.2 Waiver Procedure Confirm the requirement is eligible for waiver. Identify the learner, course, credential, onboarding task, or gate. Document why the requirement cannot be completed. Identify risk and compensating controls. Set an expiration date. Obtain approval from the required authority. Record the waiver. Monitor the waiver until it expires or the requirement is completed. Do not use a waiver to hide incomplete evidence."
            },
            {
              "id": "14-3-correction-procedure",
              "title": "14.3 Correction Procedure",
              "text": "14.3 Correction Procedure Identify the record that appears incorrect. Preserve the original record. Gather supporting evidence. Create a correction record or linked note. Enter: {{Original Record ID}} {{Correction Reason}} {{Corrected Value or Clarification}} {{Supporting Evidence}} {{Correction Actor}} Save the correction. Notify affected learner, manager, and compliance owner if readiness is impacted."
            },
            {
              "id": "14-4-capa-procedure",
              "title": "14.4 CAPA Procedure",
              "text": "14.4 CAPA Procedure Use CAPA when a training, competence, onboarding, or credential issue indicates a broader quality problem. Identify the issue. Contain immediate risk. Record the affected learners, courses, credentials, onboarding records, or standards. Determine root cause. Define corrective action. Define preventive action if applicable. Assign an owner and due date. Link LMS/QMS evidence to the CAPA record: {{CAPA ID}} {{Affected Course ID}} {{Affected Credential ID}} {{Affected Learner ID}} {{Evidence Reference}} Verify completion. Close CAPA only after evidence supports closure. [TBD: information needed - CAPA system of record and link format if outside the LMS/QMS module]"
            },
            {
              "id": "15-notifications-and-escalations",
              "title": "15. Notifications And Escalations",
              "text": "15. Notifications And Escalations The repository documents reports and status endpoints, but final notification timing and escalation policy are business-process decisions. Use this section as an operating model until the official schedule is confirmed."
            },
            {
              "id": "15-1-recommended-notification-events",
              "title": "15.1 Recommended Notification Events",
              "text": "15.1 Recommended Notification Events Event Notify Purpose New training assigned Learner, manager Start required learning. Training due soon Learner, manager Prevent overdue status. Training overdue Learner, manager, operations owner Restore readiness. Quiz locked or failed repeatedly Learner, manager, LMS/QMS admin Trigger support or retraining. Practical assessment scheduled Learner, assessor, manager Coordinate observed assessment. Practical assessment failed Learner, manager Assign retraining or reassessment. Credential expiring Learner, manager, LMS/QMS admin Start renewal. Credential expired or revoked Learner, manager, operations owner Remove from restricted work until resolved. Course pending review Reviewer, course owner Complete approval gate. Course pending release CEO or release owner Publish approved content. Onboarding task overdue Learner, manager, onboarding coordinator Keep onboarding on schedule. Gate blocked Manager, onboarding coordinator Resolve missing evidence. Integrity check failure LMS/QMS admin, compliance owner, executive owner Protect evidence and investigate."
            },
            {
              "id": "15-2-escalation-model",
              "title": "15.2 Escalation Model",
              "text": "15.2 Escalation Model Severity Example Escalation Low Learner has non-critical training due soon. Learner reminder. Medium Required training overdue but work is not safety-critical or customer-restricted. Manager follow-up. High Credential expired for restricted work. Manager and operations owner action before assignment. Critical Audit integrity failure or unauthorized evidence change suspected. Immediate administrator, compliance, and executive escalation. [TBD: information needed - official escalation timeframes, notification channels, and owner list]"
            },
            {
              "id": "16-data-records-and-retention",
              "title": "16. Data, Records, And Retention",
              "text": "16. Data, Records, And Retention"
            },
            {
              "id": "16-1-recordkeeping-principles",
              "title": "16.1 Recordkeeping Principles",
              "text": "16.1 Recordkeeping Principles LMS/QMS records should be: Accurate. Attributable to a user or system actor. Legible and exportable. Timely. Complete for the decision being supported. Preserved for the configured retention period. Protected from unauthorized change. Corrected through linked evidence rather than destructive edits."
            },
            {
              "id": "16-2-retention",
              "title": "16.2 Retention",
              "text": "16.2 Retention The LMS architecture documents LMS_RETENTION_DAYS with a default of 2557 , approximately seven years. Company policy may require longer retention for certain contract, safety, HR, or quality records. [TBD: information needed - official company retention matrix by LMS/QMS record type]"
            },
            {
              "id": "16-3-sensitive-data",
              "title": "16.3 Sensitive Data",
              "text": "16.3 Sensitive Data Do not enter unnecessary sensitive personal information into LMS/QMS free-text fields. Use only the data required for training, onboarding, credentialing, readiness, or audit evidence. Avoid entering: Social Security numbers. Dates of birth unless explicitly required by an approved process. Medical details. Unrelated disciplinary information. Customer-sensitive data not required for the training record."
            },
            {
              "id": "16-4-data-quality-checks",
              "title": "16.4 Data Quality Checks",
              "text": "16.4 Data Quality Checks Administrators should periodically review: Duplicate learners. Missing employee IDs. Expired credentials still used for readiness. Waivers without expiration. Courses stuck in draft, pending review, or release pending. Practical assessments not submitted. Onboarding records not completed or cancelled. External credentials without independent attestation. Integrity status failures."
            },
            {
              "id": "17-acceptance-criteria",
              "title": "17. Acceptance Criteria",
              "text": "17. Acceptance Criteria The guide and LMS/QMS process should be considered complete when these outcomes are satisfied."
            },
            {
              "id": "17-1-guide-acceptance-criteria",
              "title": "17.1 Guide Acceptance Criteria",
              "text": "17.1 Guide Acceptance Criteria Criterion Status Markdown version exists. {{Pass/Fail}} HTML-ready version exists. {{Pass/Fail}} Learner, manager, and administrator instructions are included. {{Pass/Fail}} Onboarding workflow is included. {{Pass/Fail}} Certification and credential workflows are included. {{Pass/Fail}} QMS evidence and audit readiness are included. {{Pass/Fail}} Exceptions, waivers, corrections, and CAPA are included. {{Pass/Fail}} Screenshot placeholders are included. {{Pass/Fail}} Field placeholders use {{Field Name}} format. {{Pass/Fail}} Unknown information is marked with [TBD: information needed] . {{Pass/Fail}}"
            },
            {
              "id": "17-2-operational-acceptance-criteria",
              "title": "17.2 Operational Acceptance Criteria",
              "text": "17.2 Operational Acceptance Criteria Criterion Expected outcome New employee onboarding can be created and tracked. Record includes tasks, training, acknowledgements, screenings, assets, gates, and check-ins. Learners can complete assigned training. Enrollment status and completion records are visible. Required quizzes are recorded. Quiz attempt evidence is available. Practical assessments are controlled. Assessments are submitted by authorized assessors and locked after submission. Internal credentials are eligibility-based. Credentials are not issued unless requirements are complete. External credentials are independently attested. Attestor is not the learner. Readiness can be reviewed. Manager can see gaps, active credentials, and exceptions. Audit evidence is available. Reports, record history, and integrity status can be reviewed. Exceptions are controlled. Waivers, corrections, revocations, and CAPA references are documented."
            },
            {
              "id": "18-troubleshooting",
              "title": "18. Troubleshooting",
              "text": "18. Troubleshooting"
            },
            {
              "id": "18-1-learner-issues",
              "title": "18.1 Learner Issues",
              "text": "18.1 Learner Issues Issue Likely cause What to do I cannot see my course. Not assigned, wrong account, course not published, or access issue. Confirm account, refresh, contact manager/admin with course name and employee ID. My course will not show complete. Lesson, quiz, or prerequisite is incomplete. Review course detail and complete missing items. My quiz is locked. Attempt limit or lockout rule reached. Contact manager or LMS/QMS admin. My credential is missing. Eligibility not complete, issue step not performed, or external credential not attested. Review readiness and contact manager/admin. My onboarding task is blocked. Missing evidence, pending screening, asset issue, or gate hold. Contact manager or onboarding coordinator. I see incorrect information. Data entry issue or stale record. Report the issue. Do not edit unrelated records."
            },
            {
              "id": "18-2-manager-issues",
              "title": "18.2 Manager Issues",
              "text": "18.2 Manager Issues Issue Likely cause What to do Team readiness looks incomplete. Missing assignment, expired credential, or incomplete practical. Review learner record and assign missing requirement. Learner says training is complete but report says open. Quiz, lesson, or prerequisite may be incomplete. Open enrollment details and verify completion evidence. External credential cannot be recorded. Attestor may match learner or required field missing. Use independent attestor and complete all fields. Gate cannot be released. Required onboarding evidence missing. Review gate conditions and document waiver if allowed. Export is missing expected data. Filter, date range, or access scope may be wrong. Adjust filters or request admin review."
            },
            {
              "id": "18-3-administrator-issues",
              "title": "18.3 Administrator Issues",
              "text": "18.3 Administrator Issues Issue Likely cause What to do Course cannot be published. Approval or release step incomplete. Check approval track, review log, and release status. Reviewer cannot approve trade content. Missing per-user grant or active qualifying credential. Confirm grants and reviewer credential status. Practical assessment cannot be submitted. Missing assessor access, rubric, or required fields. Verify lms_assess access and assessment configuration. Credential issue fails. Eligibility requirements incomplete. Check course, quiz, and practical requirements. Integrity status fails. Audit chain mismatch or evidence problem. Stop evidence-changing activity and escalate. Onboarding record cannot complete. Open tasks, blocked gates, missing screening, or missing training. Resolve evidence or record authorized waiver."
            },
            {
              "id": "18-4-escalation-checklist",
              "title": "18.4 Escalation Checklist",
              "text": "18.4 Escalation Checklist When escalating an issue, include: {{Issue Summary}} {{Affected User}} {{Employee ID}} {{Course ID}} {{Enrollment ID}} {{Credential ID}} {{Onboarding Record ID}} {{Error Message}} {{Date and Time}} {{Screenshot}} {{Business Impact}}"
            },
            {
              "id": "19-appendix-a-common-fields",
              "title": "19. Appendix A: Common Fields",
              "text": "19. Appendix A: Common Fields Field Description Example or note {{Employee ID}} Company employee identifier. [TBD: information needed - format] {{Learner ID}} LMS learner/user identifier. Same as VBS user identifier where configured. {{Course ID}} System course identifier. Course record primary key. {{Course Code}} Human-readable course code. [TBD: information needed - naming convention] {{Enrollment ID}} Assignment record identifier. Used for learner course progress. {{Certification ID}} Certification definition identifier. Used for eligibility and issuance. {{Credential ID}} Issued or recorded credential identifier. Used for active/expired/revoked status. {{Competency ID}} Competency registry identifier. Used for matrix and readiness. {{Practical Assessment ID}} Observed skill assessment identifier. Locked after submission. {{Onboarding Record ID}} Employee onboarding lifecycle record. Used for onboarding tracking. {{Task ID}} Onboarding task identifier. Used for task completion or waiver. {{Gate ID}} Onboarding gate identifier. Used for gate release. {{Evidence Reference}} Link, file reference, or external evidence identifier. [TBD: information needed - approved evidence storage pattern] {{CAPA ID}} Corrective/preventive action identifier. [TBD: information needed - CAPA system format]"
            },
            {
              "id": "20-appendix-b-key-api-surfaces",
              "title": "20. Appendix B: Key API Surfaces",
              "text": "20. Appendix B: Key API Surfaces The following API surfaces are included for administrators and technical reviewers. End users normally use dashboard screens rather than direct API calls."
            },
            {
              "id": "20-1-lms-learning-and-course-apis",
              "title": "20.1 LMS Learning And Course APIs",
              "text": "20.1 LMS Learning And Course APIs Surface Purpose /api/v1/lms/courses Course list and course creation. /api/v1/lms/courses/{course_id} Course detail and update. /api/v1/lms/courses/{course_id}/modules Course module management. /api/v1/lms/modules/{module_id}/lessons Lesson management. /api/v1/lms/courses/{course_id}/prerequisites Course prerequisite management. /api/v1/lms/courses/{course_id}/status Course status changes. /api/v1/lms/courses/{course_id}/enroll Learner enrollment. /api/v1/lms/enrollments Enrollment list. /api/v1/lms/enrollments/{enrollment_id} Enrollment detail. /api/v1/lms/enrollments/{enrollment_id}/lessons/{lesson_id}/complete Lesson completion. /api/v1/lms/enrollments/{enrollment_id}/complete Course completion."
            },
            {
              "id": "20-2-quiz-and-assessment-apis",
              "title": "20.2 Quiz And Assessment APIs",
              "text": "20.2 Quiz And Assessment APIs Surface Purpose /api/v1/lms/courses/{course_id}/quizzes Course quiz management. /api/v1/lms/quizzes/{quiz_id}/questions Quiz question management. /api/v1/lms/enrollments/{enrollment_id}/quizzes/{quiz_id}/serve Serve learner quiz. /api/v1/lms/enrollments/{enrollment_id}/quizzes/{quiz_id}/attempt Submit quiz attempt. /api/v1/lms/admin/quiz-escalations Quiz escalation review. /api/v1/lms/enrollments/{enrollment_id}/quizzes/{quiz_id}/reset-lock Reset quiz lock where authorized. /api/v1/lms/rubrics Practical rubric management. /api/v1/lms/practicals Practical assessment scheduling/list. /api/v1/lms/practicals/{assessment_id} Practical assessment detail. /api/v1/lms/practicals/{assessment_id}/results Practical assessment results. /api/v1/lms/practicals/{assessment_id}/submit Submit and lock practical assessment."
            },
            {
              "id": "20-3-credential-competency-and-readiness-apis",
              "title": "20.3 Credential, Competency, And Readiness APIs",

              "id": "1-purpose-and-scope",
              "title": "1. Purpose And Scope",
              "text": "1. Purpose And Scope This guide explains how to administer the TTIS AI Virtual Business System after Dashboard API v3. It covers day-to-day administration, security controls, user lifecycle, webhook trust, workflow gates, deployment operations, and audit evidence. The guide does not replace source-controlled implementation references. For API-level contracts, use TTIS_AI_API_Reference_v3.md . For deep production hosting details, use docs/PRODUCTION_HOSTING.md ."
            },
            {
              "id": "2-admin-responsibilities",
              "title": "2. Admin Responsibilities",
              "text": "2. Admin Responsibilities Administrators are responsible for keeping the system usable, secure, auditable, and current. Core duties: Provision and deactivate users. Assign correct ABAC roles, divisions, auditor posture, and any explicit grants. Verify MFA enrollment and help users recover from lost devices. Maintain environment secrets and encryption keys. Monitor workflow gates, failed jobs, webhook drops, and service health. Maintain the Knowledge corpus and ensure sensitive data remains ABAC-scoped. Confirm that Redis, dashboard, webhook, worker, and ChromaDB are running in the expected deployment shape. Preserve the audit trail and never disable chain verification."
            },
            {
              "id": "3-system-access-model",
              "title": "3. System Access Model",
              "text": "3. System Access Model TTIS uses per-user identity and ABAC capability authorization. There is no shared dashboard bearer secret in the v3 model."
            },
            {
              "id": "3-1-roles",
              "title": "3.1 Roles",
              "text": "3.1 Roles Role Typical user Administrative meaning ceo Owner / executive administrator Superuser role; can administer users, agents, policy, gates, workflows, finance, payroll, Knowledge, and Ask-LYNNE. field_ops_mgr Field operations manager Division-scoped management of projects, schedule, safety, timecards, onboarding, documents, and OPS EAA. business_dev Business development user Pipeline, workflow, document, telemetry, and business-development operations. finance Finance/payroll authority Finance, payroll, invoice, audit export, travel booking/approval, and finance-level approvals. field_crew Technician / crew member Own timecards, daily logs, incidents, travel requests, schedule, LMS, onboarding, and field views. Auditor posture is an additional attribute. An auditor can read permitted resources but is denied mutating actions."
            },
            {
              "id": "3-2-capabilities",
              "title": "3.2 Capabilities",
              "text": "3.2 Capabilities Authorization is evaluated as: principal + resource + action + context -> allow or deny Examples: finance can approve finance-level timecards. field_ops_mgr can manage division-scoped schedules. field_crew can submit their own timecards and daily logs. ceo can access Ask-LYNNE and global administration. The server is the security boundary. Do not rely on UI hiding alone."
            },
            {
              "id": "4-first-time-admin-setup",
              "title": "4. First-Time Admin Setup",
              "text": "4. First-Time Admin Setup"
            },
            {
              "id": "4-1-confirm-environment-configuration",
              "title": "4.1 Confirm Environment Configuration",
              "text": "4.1 Confirm Environment Configuration Open config/.env . Confirm these minimum values are set: ANTHROPIC_API_KEY= DASHBOARD_JWT_SECRET= DASHBOARD_PWD_SALT= CORS_ALLOW_LIST= REDIS_URL= SQLITE_DIR= CHROMA_DIR= DOCUMENTS_DIR= PURSUITE_WEBHOOK_SECRET= TELEGRAM_WEBHOOK_SECRET= AUTH_KEY_FILE=/app/secrets/auth.key Confirm DASHBOARD_JWT_SECRET is at least 32 characters and not a placeholder. Confirm DASHBOARD_PWD_SALT is at least 16 characters. Confirm CORS_ALLOW_LIST contains the real dashboard origin. Confirm AUTH_KEY_FILE points to a protected secrets volume, or AUTH_ENC_KEY is set as an environment fallback."
            },
            {
              "id": "4-2-install-dependencies",
              "title": "4.2 Install Dependencies",
              "text": "4.2 Install Dependencies From the repository root: pip install -r requirements.txt The password hashing stack requires argon2-cffi ."
            },
            {
              "id": "4-3-start-local-services",
              "title": "4.3 Start Local Services",

            },
            {

              "title": "4.4 Verify Health",
              "text": "4.4 Verify Health Open http://127.0.0.1:8000/health . Open http://127.0.0.1:8001/webhooks/health . Confirm Redis responds: docker exec ttis-redis redis-cli ping Expected response: PONG ."
            },
            {
              "id": "5-user-administration",
              "title": "5. User Administration",
              "text": "5. User Administration"
            },
            {
              "id": "5-1-user-lifecycle-overview",
              "title": "5.1 User Lifecycle Overview",
              "text": "5.1 User Lifecycle Overview Stage Admin action Result Create Add user with role, division, password, and optional grants User can sign in and receives ABAC-scoped capabilities. Enroll MFA User enrolls TOTP Sensitive actions can be step-up authorized. Update Change role/division/grants as duties change Effective capabilities update on future requests. Reset Admin resets password when required New password is stored as Argon2id. Disable Deactivate account User can no longer authenticate."
            },
            {
              "id": "5-2-create-a-user",
              "title": "5.2 Create A User",
              "text": "5.2 Create A User Who can perform: ceo or an explicitly authorized user-admin operator. Recommended steps: Open the dashboard administration area. Select Users . Choose Create User . Enter: - user ID - username - temporary password - ABAC role - division, when applicable - auditor flag, when applicable - optional wizard grants, if the user needs wizard access Save. Provide the temporary password through an approved secure channel. Instruct the user to sign in, change the password, and enroll MFA. Expected result: the new user appears in the user list and can authenticate."
            },
            {
              "id": "5-3-choose-the-correct-role",
              "title": "5.3 Choose The Correct Role",
              "text": "5.3 Choose The Correct Role Use least privilege. If the user needs to... Assign administer the whole platform ceo manage crews, schedule, timecards, incidents, or onboarding for a division field_ops_mgr work pipeline, business development, documents, and opportunities business_dev approve finance, payroll, invoices, audit export, or travel booking finance submit field work, time, incidents, travel, LMS, and onboarding tasks field_crew"
            },
            {
              "id": "5-4-reset-a-password",
              "title": "5.4 Reset A Password",
              "text": "5.4 Reset A Password Open Admin > Users . Select the user. Choose Reset Password . Enter a temporary password that satisfies the policy. Save. Tell the user to sign in and immediately change it. Expected result: the stored password is Argon2id. Legacy salted SHA-256 values remain accepted only for migration and are upgraded after successful login."
            },
            {
              "id": "5-5-disable-a-user",
              "title": "5.5 Disable A User",
              "text": "5.5 Disable A User Disable users immediately when employment ends, duties change, a device is lost, or credentials are suspected compromised. Open Admin > Users . Select the user. Toggle active status to disabled. Save. Review audit logs for recent activity. Expected result: future login attempts fail."
            },
            {
              "id": "6-mfa-and-step-up-administration",
              "title": "6. MFA And Step-Up Administration",
              "text": "6. MFA And Step-Up Administration"
            },
            {
              "id": "6-1-what-step-up-protects",
              "title": "6.1 What Step-Up Protects",
              "text": "6.1 What Step-Up Protects Step-up MFA protects sensitive and high-impact actions such as: large financial approvals payroll-sensitive actions policy threshold increases sensitive key generation or rotation governed workflow decisions above threshold"
            },
            {
              "id": "6-2-user-enrollment",
              "title": "6.2 User Enrollment",
              "text": "6.2 User Enrollment User signs in. User opens security/MFA enrollment. User scans the TOTP secret with an authenticator app. User stores backup codes securely. User verifies a current code. Expected result: GET /api/v1/auth/me reports totp_enrolled: true ."
            },
            {
              "id": "6-3-admin-recovery",
              "title": "6.3 Admin Recovery",
              "text": "6.3 Admin Recovery If a user loses MFA access: Confirm identity using company-approved verification. Disable the account temporarily if compromise is suspected. Reset password if needed. Clear or refresh MFA enrollment only through the approved admin path. Require the user to enroll a new authenticator. Review audit events."
            },
            {
              "id": "6-4-encryption-key-requirements",
              "title": "6.4 Encryption Key Requirements",
              "text": "6.4 Encryption Key Requirements TOTP secrets are encrypted at rest. The app reads key material from: AUTH_KEY_FILE , default /app/secrets/auth.key AUTH_ENC_KEY , environment fallback File precedence is intentional. Do not print, log, email, or paste key material into tickets."

              "title": "7.1 Capability Review Procedure",
              "text": "7.1 Capability Review Procedure Perform capability reviews: when a user is created when a user changes duties when an auditor posture is assigned before external audits after security incidents Steps: Export or inspect the user list. Confirm each role matches current job duties. Confirm division assignments are correct. Confirm auditor users cannot mutate records. Confirm any explicit grants are still justified. Remove stale grants. Record the review outcome."
            },

              "id": "7-2-division-scope",
              "title": "7.2 Division Scope",
              "text": "7.2 Division Scope Division-scoped resources include projects, safety, incidents, timecards, travel, schedule, and onboarding. Do not assign a broad role to solve a division mismatch. Correct the division attribute instead."
            },

              "title": "8.1 Daily Admin Start-Of-Day Check",
              "text": "8.1 Daily Admin Start-Of-Day Check Confirm dashboard health. Confirm webhook health. Confirm Redis health. Open Overview. Review pending gates. Review failed or stalled workflows. Review alerts and incidents. Confirm recent audit entries are being written."
            },
            {

              "title": "8.2 Navigation Areas",
              "text": "8.2 Navigation Areas Area Admin use Overview Operational health, queue status, alerts, and high-level state. Ask-LYNNE CEO-only executive assistant workflow and research surface. Agents Agent status, activity, flags, and configurable EAA details. Knowledge RAG search, corpus inspection, document grounding. Admin / Users User lifecycle, role assignment, account state. Finance / Payroll Finance, invoices, payroll runs, tax forms, audit export. Field Ops Timecards, schedule, incidents, daily logs, projects. LMS / Onboarding Training, certification, onboarding records, task progress."

            {

              "title": "9. Workflow And Gate Administration",
              "text": "9. Workflow And Gate Administration"
            },
            {
              "id": "9-1-gate-review",
              "title": "9.1 Gate Review",
              "text": "9.1 Gate Review Open Gates or Overview . Review gate type, workflow ID, presenter, age, confidence, and details. Confirm the underlying evidence. Approve, reject, or request changes where supported. Complete step-up if prompted. Confirm the result appears in workflow trace and audit."
            },
            {
              "id": "9-2-stalled-workflow-handling",
              "title": "9.2 Stalled Workflow Handling",
              "text": "9.2 Stalled Workflow Handling Open the workflow detail or trace. Identify the current step and last successful transition. Check whether a human gate is waiting. Check worker logs if queue mode is enabled. Confirm Redis queue depth if jobs are not draining. Use pause/override/terminate controls only when authorized. Record the decision reason."
            },
            {
              "id": "9-3-override-safety",
              "title": "9.3 Override Safety",
              "text": "9.3 Override Safety Overrides are sensitive. Use them only when the normal gate path cannot resolve the issue in time. Before override: verify workflow ID verify business justification verify authorization complete step-up if required capture the reason in the action comments"
            },

              "id": "10-agent-and-eaa-administration",
              "title": "10. Agent And EAA Administration",
              "text": "10. Agent And EAA Administration"
            },
            {
              "id": "10-1-agent-status-review",
              "title": "10.1 Agent Status Review",
              "text": "10.1 Agent Status Review Open Agents . Review health, status, model tier, recent actions, flags, and degraded state. Investigate repeated failures or tool errors. Confirm no disabled agent is required for an active workflow."

            {
              "id": "10-2-eaa-configuration",
              "title": "10.2 EAA Configuration",
              "text": "10.2 EAA Configuration Editable EAAs include LYNNE and the OPS support/management assistants. Steps: Open agent detail. Choose Manage Config . Review persona, tools, knowledge sources, and limits. Make the minimum necessary change. Save. Complete step-up if prompted. Confirm the change applies on the next task."

            {
              "id": "10-3-disable-or-force-terminate",
              "title": "10.3 Disable Or Force-Terminate",
              "text": "10.3 Disable Or Force-Terminate Open the agent detail. Confirm the reason. Disable or force-terminate only when the agent is unsafe, looping, or blocking work. Confirm worker and dashboard both honor the change. Review audit events."
            },

              "title": "11. Knowledge Base Administration",
              "text": "11. Knowledge Base Administration"
            },
            {
              "id": "11-1-corpus-ownership",
              "title": "11.1 Corpus Ownership",
              "text": "11.1 Corpus Ownership The Knowledge corpus may include policy, regulations, project documents, proposal material, and other sensitive data. Treat it as controlled internal content."
            },
            {
              "id": "11-2-add-or-refresh-documents",
              "title": "11.2 Add Or Refresh Documents",
              "text": "11.2 Add Or Refresh Documents Place approved documents in the configured documents directory. Run the ingestion process or use the dashboard refresh action when available. Confirm the document appears in Knowledge search. Search for a known phrase from the document. Confirm citations and section views are correct."
            },
            {
              "id": "11-3-quality-checks",
              "title": "11.3 Quality Checks",
              "text": "11.3 Quality Checks For each corpus update: confirm the source is approved confirm classification is appropriate confirm no prohibited PII is exposed confirm relevant roles can find it confirm unauthorized roles cannot see restricted content"
            },
            {
              "id": "12-finance-payroll-and-sensitive-actions",
              "title": "12. Finance, Payroll, And Sensitive Actions",
              "text": "12. Finance, Payroll, And Sensitive Actions"
            },
            {
              "id": "12-1-finance-administration",
              "title": "12.1 Finance Administration",
              "text": "12.1 Finance Administration Finance administrators manage contracts, cash flow, labor postings, invoices, audit export, and finance-level approvals. Before approving: Confirm amount, contract, source records, and attachments. Confirm provenance from timecard or invoice line. Confirm all required prior approvals exist. Complete step-up if prompted. Confirm audit hash is recorded."
            },
            {
              "id": "12-2-payroll-administration",
              "title": "12.2 Payroll Administration",
              "text": "12.2 Payroll Administration Payroll actions are sensitive and role-gated. Confirm employee records are current. Confirm approved timecards and labor postings. Generate or review the payroll run. Review deductions and tax settings. Generate ACH/NACHA only when authorized. Confirm encrypted bank detail handling and key status. Preserve generated artifacts as required by policy."
            },
            {
              "id": "12-3-key-status",
              "title": "12.3 Key Status",
              "text": "12.3 Key Status Payroll encryption keys and auth-side TOTP encryption keys must live in protected secrets storage. Never return key material from an endpoint, log, screenshot, or ticket."
            },
            {
              "id": "13-webhook-administration",
              "title": "13. Webhook Administration",
              "text": "13. Webhook Administration"
            },
            {
              "id": "13-1-pursuite-webhook",
              "title": "13.1 Pursuite Webhook",
              "text": "13.1 Pursuite Webhook Pursuite webhook requests require: X-Pursuite-Signature X-Pursuite-Timestamp , required by default optional X-Pursuite-Delivery , used for replay detection Environment controls: PURSUITE_REQUIRE_TIMESTAMP=1 PURSUITE_MAX_TIMESTAMP_SKEW_SECONDS=300 PURSUITE_REPLAY_TTL_SECONDS=86400 Validation behavior: Failure Result Invalid signature 401 Missing required timestamp 401 Stale timestamp 401 Duplicate delivery 409 Unknown event type Safe ignored response"
            },
            {
              "id": "13-2-telegram-webhook",
              "title": "13.2 Telegram Webhook",
              "text": "13.2 Telegram Webhook Telegram requires: URL token equal to TELEGRAM_WEBHOOK_SECRET X-Telegram-Bot-Api-Secret-Token header equal to the same secret sender chat ID in TG_USER_WHITELIST Registration: python scripts/register_telegram_webhook.py --public-url https://webhook.example.com Expected result: Telegram sends the secret header and the receiver accepts only whitelisted chats."
            },

              "text": "14. Deployment And Runtime Operations"
            },
            {
              "id": "14-1-production-shape",
              "title": "14.1 Production Shape",
              "text": "14.1 Production Shape Production should expose only Caddy publicly. Dashboard, webhook, Redis, and ChromaDB should be private or localhost-bound. Component Exposure rule Caddy Public 80/443 Dashboard Caddy-routed, not directly public Webhook Caddy-routed, not directly public Redis Never public ChromaDB Never public Secrets volume Mounted, protected, app-user owned"
            },
            {
              "id": "14-2-docker-hardening-expectations",
              "title": "14.2 Docker Hardening Expectations",
              "text": "14.2 Docker Hardening Expectations Dashboard and webhook images run as the non-root ttis user. Compose applies: cap_drop: - ALL security_opt: - no-new-privileges:true Writable mounted volumes must be owned by the app user."

              "text": "14.3 Deployment Validation Run: docker compose config docker build -f Dockerfile.dashboard -t ttis-dashboard:hardening-check . docker build -f Dockerfile.webhook -t ttis-webhook:hardening-check . Expected result: compose config renders successfully dashboard image builds webhook image builds image user is ttis"
            },
            {
              "id": "15-monitoring-audit-and-evidence",
              "title": "15. Monitoring, Audit, And Evidence",
              "text": "15. Monitoring, Audit, And Evidence"
            },
            {
              "id": "15-1-audit-trail",
              "title": "15.1 Audit Trail",
              "text": "15.1 Audit Trail The audit trail is append-only and chain-verified. Never disable, truncate, or rewrite audit data. Admin actions that should produce audit evidence: user creation, disablement, password reset gate decision workflow override agent configuration change payroll key generation or rotation finance approval audit export webhook security drop"
            },
            {
              "id": "15-2-daily-evidence-review",
              "title": "15.2 Daily Evidence Review",
              "text": "15.2 Daily Evidence Review Verify audit chain. Review failed login patterns. Review webhook security drops. Review high-value approvals. Review disabled or degraded agents. Review worker errors and queue backlog."

            },
            {
              "id": "16-1-backup-scope",
              "title": "16.1 Backup Scope",
              "text": "16.1 Backup Scope Back up: SQLite databases or PostgreSQL database ChromaDB persistence document corpus audit database secrets volumes environment configuration templates without secret values"
            },
            {
              "id": "16-2-recovery-order",
              "title": "16.2 Recovery Order",
              "text": "16.2 Recovery Order Restore database state. Restore secrets volume. Restore document and Chroma stores. Start Redis. Start dashboard, webhook, worker, and ChromaDB. Verify health endpoints. Verify audit chain. Run a login test. Run a Knowledge search test. Run a safe webhook health test."
            },
            {
              "id": "16-3-key-handling-rules",
              "title": "16.3 Key Handling Rules",
              "text": "16.3 Key Handling Rules Store encryption keys in secrets volumes or managed secret stores. Prefer file-backed keys over environment fallback. Restrict filesystem ownership to the app user. Rotate keys only through approved procedures. Never include key material in screenshots, chat, tickets, or logs."
            },

              "text": "0. Purpose & the distinction that drives the design A QMS competence system-of-record for an SDVOSB low-voltage telecom contractor. It delivers training, assesses written knowledge and observed practical skill , issues earned, expiring, chain-anchored credentials (and records externally-earned ones by attestation), maps a role→competency matrix to readiness, decomposes competence into an auditable competency registry , recerts per-competency, and governs all curriculum content through a three-stage approval gate . The auditor distinction — training tool vs. system of record — is the north star: - Every competence event (quiz attempt, course completion, practical assessment, credential issue/revoke/expire, approval decision, evidence-row change) is fail-closed chain-anchored into an append-only, verify_chain() -checkable log. - Evidence rows are WORM — no service/API path mutates or deletes them after the fact. - A documented retention floor ( LMS_RETENTION_DAYS , default 2557 ≈ 7y) governs persistence. - Curriculum content cannot reach a learner without a competence-routed human gate, and each approval signature attests only to what its holder can verify (authority ≠ competence). ┌───────────────────────────────────────────────────────────────────────┐ Frontend │ Next.js dashboard (TTI-S_Dashboard) — Learning tabs + User-Admin │ (separate │ Courses · Certifications · Assess · Review (gate) · Authoring (CEO) │ repo) └───────────────────────────────┬───────────────────────────────────────┘ │ HTTPS + per-user JWT ┌───────────────────────────────▼───────────────────────────────────────┐ API │ FastAPI :8000 dashboard/main.py /api/v1/lms/* │ │ require_capability(resource, Action) → ABAC PDP (dashboard/abac.py) │ └───────────────────────────────┬───────────────────────────────────────┘ Domain │ dashboard/lms.py (auth-agnostic; takes by_actor; no abac import) │ │ catalog · delivery · assessment · certs/credentials · competency │ │ registry · matrix ·               "text": "1. System boundaries & coupling (the \"is it separable?\" question) The LMS is a modular monolith inside VBS . Cleanly isolated: domain logic (one file, auth-agnostic — imports db only, never abac ), data (own lms.db / lms_* namespace), API namespace ( /api/v1/lms/* ), UI components. Three platform seams bind it: Seam Mechanism Notes Auth / ABAC capabilities checked at the route layer ( require_capability ) domain is auth-agnostic — a clean seam Audit hash-chain orchestration/audit_logger ( log_event_strict , verify_chain ) load-bearing & deliberate — the compliance backbone Identity learners/assessors/reviewers are VBS users ( auth.db ) single user store, no parallel LMS identity Standalone extraction is a bounded refactor , not a rewrite: abstract the three seams (inject an authz policy, carry/re-provide a tamper-evident log, supply a user store), split the route module + UI bundle. The audit-chain dependency is the one you would never drop. Persistence/concurrency. db.get_connection(\"lms\") → data/sqlite/lms.db locally / Cloud SQL Postgres in prod ( DATABASE_URL ); DDL dialect-portable ( exec_ddl + _pg_adapt ); all tables in init_lms_db() ; column additions are idempotent ALTER … ADD COLUMN . Integer OCC version guards mutable parents (courses, enrollments, curricula, certifications, credentials, practicals, competencies)."

              "id": "2-compliance-spine",
              "title": "2. Compliance spine",
              "text": "2. Compliance spine Fail-closed anchoring. _strict_anchor() wraps log_event_strict ; a competence mutation that cannot be anchored fails rather than silently proceeding. Chain: entry_hash = SHA-256(msg_type ‖ payload_hash ‖ prev_hash) , genesis GENESIS_BLOCK_TTIS_2026 ; verify_chain() recomputes the whole log and flags any altered/removed row. Config-level authoring uses best-effort log_event . WORM evidence. Practicals lock on submit ( locked=1 ); credentials transition forward only ( active → expired|revoked ); there is no service/API path that updates or deletes attempts, completions, credentials, practicals, or audit rows. Corrections are new linked records. Row-level evidence audit (Q2). lms_record_audit appends a chain-anchored before/after row for every evidence mutation, with actor — so an app-path change is attributed and a direct-DB change is caught by verify_chain() . integrity_status() surfaces the live verdict; record_history() returns a record's trail. Retention. RETENTION_DAYS (env, default 2557) is the stated floor; no hard-delete path exists."

              "id": "4-1-create-an-onboarding-record",
              "title": "4.1 Create an onboarding record",
              "text": "4.1 Create an onboarding record Who: HR or the CEO (the create permission). When: as soon as a hire is authorized — ideally before the start date. Before you begin: the person must already exist as an authorized employee in HR (the record references that employee). Have the start date , division , position , and the per‑hire applicability flags ready. A record is created by submitting the new hire’s details to the onboarding service. On creation, the system instantiates a tailored checklist — only the tasks, courses, gates and screening processes that apply to this hire, based on the flags you set. The applicability flags — what each one turns on 4.1 Create an onboarding record — data table 2 Flag What it turns on Field ( is_field ) Job‑site safety tasks (PPE issue, site briefing), the site‑specific safety acknowledgment, the Safety Orientation expectation before covered work, and the OSHA outreach module. Time‑charging ( is_time_charging ) The DCAA‑Compliant Timekeeping course and the time‑charging access gate — the person cannot submit timecards until that gate is released. CUI‑authorized ( is_cui_authorized ) The CUI Handling and CMMC / NIST SP 800‑171 Awareness courses and the CUI‑provisioning access gate . E‑Verify required ( everify_required ) An E‑Verify case task and screening row. This flag is off by default and only takes effect once the program is configured to enable E‑Verify. Screening level ( none / standard / contract ) standard (or contract ) adds the background screening task and process; contract additionally adds the HSPD‑12 / PIV credentialing task and process. Labor‑standards coverage ( none / sca / dba / both ) The SCA / DBA Labor‑Standards Orientation course and the wage‑determination communication task. Division Determines which managers can see and work the record. Steps Provide the hire’s employee identifier (for example, EMP‑1024 ), start date (in YYYY‑MM‑DD form), and optionally the login user , division and position title . Set the applicability flags above to match the role. Submit. The system confirms the employee exists, then opens the record in preboarding and builds the checklist. 🖼 Screenshot: Create‑record form with the applicability flags What success looks like: a new record appears on the Onboarding board in preboarding , pre‑loaded with exactly the tasks, courses, gates and screening rows that apply to the flags you set. Each item already carries a due date computed from the start date. › Auto‑creation on hire. When an authorized hire is recorded in HR with an onboarding directive attached , the system opens the onboarding record automatically using the same flags — you do not have to create it by hand. A hire recorded without that directive creates no record, so nothing is ever created by surprise. One open record per person. If the employee already has an open (preboarding or active) record, the system refuses to create a second one and tells you which record is already open."

              "text": "4.2 Reading the board and a record Who: anyone with onboarding view access (managers see their division; new hires see only their own record). When: any time. The board (left nav → Onboarding ) lists active records. The page title is Onboarding , and the subtitle reads “Policy‑tracked onboarding per TTIS Employee Onboarding Policy v1.0.” By default it shows active records only; select show completed to include finished ones. Each row shows: 4.2 Reading the board and a record — data table 3 Column Meaning Employee The new hire (and position, if set). Select it to open the record. Division The owning division. Start date The hire’s start date. Phase The current phase chip (for example, day one , week 1 ). Status preboarding / active / completed / cancelled. Open tasks Count of tasks not yet finished. Overdue Overdue task count. If any overdue task is statutory , the badge reads, for example, “2 overdue (1 statutory)” in the alert style. Acks outstanding Required acknowledgments not yet signed. Next due The date of the next item due. 🖼 Screenshot: Onboarding board with phase chips and an overdue/statutory badge Opening a record. Select an employee to open the record detail page, titled “Onboarding — EMP‑1024 .” The header shows the position, division, start date, status and phase, plus the record identifier and the program template version . When the record is complete, the header also shows the start of the completion hash. The detail page reads top to bottom as the onboarding story: Task checklist (Attachment A) — tasks grouped by phase. Acknowledgments (Attachment B) — outstanding documents and the signed ledger. Training roster (Attachment C) — required courses and their status. Access gates (§9 / §11) — held or released, with preconditions. Screening (§6 / §8) — background, credentialing and related processes. Issued assets (§14) — equipment and its recovery status. Milestone check‑ins (§5.4) — the 30/60/90 record. Completion certificate (§17) — appears once the record is certified complete. What success looks like: you can see, at a glance, what phase the hire is in, what is overdue, what is statutory, and what is next."

              "text": "4.3 Working the task checklist Who: HR, the hiring manager (in division), or the CEO. A new hire can submit their own tasks (see section 5 ). When: throughout the program. Before you begin: open the record and find the task in the Task checklist (Attachment A) section. Each task shows its owner , policy reference, due date, status , and any evidence pointer. Marking progress. A task moves through pending → in progress → complete (and may be blocked when something it depends on is not ready). To record progress, update the task’s status: Set the task to in progress when work starts (optional). Set it to complete when it is done. Evidence pointers. Some tasks require an evidence pointer before they can be completed — an opaque reference into the personnel file (for example, a document locator), never the document itself. If a task requires evidence and none is on file, completion is refused with “task ‘…’ requires a doc_ref evidence pointer.” Add the pointer, then complete the task. Dependencies. A task may depend on a screening being cleared (for example, HSPD‑12 / PIV credentialing depends on the credentialing screening). If you try to complete it before the screening clears, you see “task ‘…’ requires screening ‘…’ to be cleared.” Clear the screening first (section 4.7 ). Statutory tasks cannot be waived. The two I‑9 tasks — Form I‑9 Section 1 (by day one) and Form I‑9 Section 2 employer verification — are marked statutory . They can never be skipped or waived, and they drive priority reminders. An overdue statutory task holds the record’s phase back until it is completed. When you complete a statutory task, the system records a tamper‑evident audit anchor on it automatically. ⚠ Planned — not yet available. PLANNED — not yet available in this release. A manual “waive this task” action for ordinary (non‑statutory) tasks is planned. Today, a task becomes waived only automatically — when you change an applicability flag so the task no longer applies (see section 4.1 and the note below). There is no button to waive an individual task by hand yet. What success looks like: the task’s status chip changes to complete , its completion time is stamped, and the board’s Open tasks / Overdue counts drop. › Changing a flag re‑tailors the checklist. If you update an applicability flag on the record, the system adds any newly applicable tasks and automatically marks now‑inapplicable open tasks as waived , with a reason recorded (“flag change…: no longer applicable”). Statutory tasks are never auto‑waived."

              "text": "4.5 Managing training Who: HR, the hiring manager (in division), or the CEO. When: courses carry due dates relative to the start date; most fall in the first weeks. Before you begin: open the record and find the Training roster (Attachment C) section, which lists each required course, its policy reference, the basis on which it applies (for example, all , time‑charging , cui_authorized , field ), its due date, status , and score . Recording a completion Find the course in the roster. Set its status to completed . If the course has a passing score configured, provide a score . Optionally attach an evidence pointer (a training/certificate locator). If a passing score is configured and the score you provide is missing or below the minimum, completion is refused with “course ‘…’ requires score ≥ N.” Record a passing score to complete. Mandatory courses by flag 4.5 Managing training — data table 4 Course Applies to Business Ethics & Conduct; Mandatory Disclosure Rule; Anti‑Kickback Act Awareness All hires Cybersecurity Awareness & Acceptable Use All hires EEO & Anti‑Harassment Orientation All hires Safety Orientation All hires (field: before covered work) DCAA‑Compliant Timekeeping Time‑charging hires — gates timecards CUI Handling ; CMMC / NIST SP 800‑171 Awareness CUI‑authorized hires — gate CUI provisioning OSHA Outreach Module Field hires SCA / DBA Labor‑Standards Orientation Hires with labor‑standards coverage Waiving a course. A course may be waived only through the governed waive action, which requires the approve permission and step‑up verification , and records a written reason. The hard‑gate courses can never be waived : DCAA‑Compliant Timekeeping for time‑charging hires, and CUI Handling / CMMC‑NIST Awareness for CUI‑authorized hires. Attempting to waive one is refused with “course ‘…’ gates §9/§11 access and cannot be waived.” What success looks like: the course status chip reads completed (or waived ), the completion is anchored, and any access gate that depends on it can now be released (section 4.6 ). 🖼 Screenshot: Record detail — Training roster with statuses and scores"

              "title": "4.6 Releasing the gates",
              "text": "4.6 Releasing the gates Who: the CEO or an approver with onboarding approve (in division). When: after the gate’s precondition courses are completed. Before you begin: open the record’s Access gates (§9 / §11) section. Each gate shows its type , its precondition courses, its status (held or released), and who released it. The module enforces two hard gates. Their real‑world consequence is the point: Time‑charging gate — created for time‑charging hires. Until it is released, the person cannot submit a timecard. If they try, timecard submission is refused with the message that DCAA timekeeping training must be completed and the time‑charging access gate released before submitting timecards. Its precondition is DCAA‑Compliant Timekeeping completed. CUI‑provisioning gate — created for CUI‑authorized hires. Its preconditions are CMMC / NIST SP 800‑171 Awareness and CUI Handling , both completed with passing scores. Releasing it records that the person is cleared for CUI‑authorized provisioning. Releasing a gate Confirm the precondition courses are completed (with passing scores where required). Choose release on the gate. Complete the step‑up verification when prompted. The system checks the preconditions at the moment of release, all in one step. If any precondition course is not completed with a passing score, the release is refused and the message lists exactly which courses are missing ( “courses not completed with a passing score: […]” ). The gate stays held . When release succeeds, the gate flips to released , records who released it and when, and writes a tamper‑evident audit anchor. 🖼 Screenshot: Record detail — Access gates section, \"Release\" action and preconditions ⚠ Planned — not yet available. PLANNED — not yet available in this release. Releasing the time‑charging gate has immediate, enforced effect today: a held gate blocks timecard submission. The CUI‑provisioning gate is fully tracked and released the same way, but the list of specific sensitive systems it will hold a person out of is still being finalized, so its downstream blocking is not yet switched on. Release it as part of onboarding regardless — the completion check requires it. What success looks like: the gate status reads released ; for the time‑charging gate, the person can now submit timecards."

            {
              "id": "4-7-tracking-screening",
              "title": "4.7 Tracking screening",
              "text": "4.7 Tracking screening Who: HR or the Security Officer function (in practice, HR or the CEO), in division. When: background screening usually starts in preboarding; credentialing in week one. Before you begin: open the record’s Screening (§6 / §8) section. It lists each screening type (for example, background , hspd12 piv , everify case ), its status , a case reference pointer where relevant, and when it was initiated. A screening process moves through not required → initiated → in progress → cleared (or denied ). Update its status as the external process advances. Only a pointer (such as a case number) is stored — never the screening result content, which stays in the personnel file. Why “cleared” matters. Some tasks declare a dependency on a screening being cleared (for example, HSPD‑12 / PIV credentialing depends on the credentialing screening). While that screening is anything other than cleared , the dependent task is blocked and cannot be completed. Moving a screening to cleared unblocks its dependent work; moving it to cleared or denied is anchored in the audit trail. What success looks like: the screening status reflects reality, and any dependent tasks can proceed once it is cleared . 🖼 Screenshot: Record detail — Screening section with statuses and case references"

              "text": "4.10 Reminders and the sweep Who: the CEO or a service account (the trigger permission) runs the sweep; everyone benefits from the reminders. When: on a regular cadence (for example, daily). Before you begin: nothing — the sweep reads open items and sends notifications. The module does not run its own background timer. Instead, an administrator (or an automated trigger) runs a reminder sweep that: finds open tasks and courses whose due date is within three days or past ; sends a notification for each — higher‑priority for statutory items (the I‑9 deadlines), routine priority for everything else; marks each item so the same reminder is never sent twice for the same stage (approaching vs. overdue). Notifications carry only the record identifier , the employee identifier , and the item code — no names and no personal data. Running a sweep Trigger the sweep action. The system returns a small summary — how many records it scanned and how many reminders it sent. Re‑running is safe. Running the sweep again the same day sends nothing twice : items already reminded at their current stage are skipped, and a repeated trigger simply replays the previous result. ⚠ Planned — not yet available. PLANNED — not yet available in this release. The sweep’s automatic schedule (for example, a daily cloud or server timer) is a deployment‑time setup step that depends on where the system is hosted. The sweep action itself is fully available now and can be run on demand or wired to any external scheduler. What success looks like: owners receive timely reminders for approaching and overdue items, and statutory deadlines get the higher‑priority path."

th the version they were built from."

              "text": "7. Statuses & badges glossary Record status 7. Statuses & badges glossary — data table 7 Status Meaning preboarding Open; the start date has not yet arrived. active The start date has arrived; onboarding is under way. completed Every required item is done and the record is certified. cancelled Onboarding was stopped (no‑show, rescinded offer); terminal. Phase (shown as the phase chip): preboarding → day one → week 1 → day 30 → day 60 → day 90 → complete. The phase is computed from the start date and is held back by any open statutory task. Task status 7. Statuses & badges glossary — data table 8 Status Meaning pending Not started. in progress Started, not finished. complete Finished. blocked Waiting on a dependency (for example, a screening to clear). waived No longer required — set automatically when a flag change makes the task inapplicable (never for statutory tasks). A statutory badge marks the non‑waivable I‑9 tasks. On the board, an overdue badge may read, for example, “2 overdue (1 statutory)” . Training status: assigned → in progress → completed , or waived . Gate status: held (preconditions not yet cleared / not released) or released . Screening status: not required , initiated , in progress , cleared , or denied . Asset status: issued , recovery due (flagged at separation), returned , or lost . Acks outstanding / Open tasks / Overdue / Next due — board counters summarizing the record’s open items."
