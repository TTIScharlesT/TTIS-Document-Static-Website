              "id": "8-common-messages-how-to-resolve-them",
              "title": "8. Common messages & how to resolve them",
              "text": "8. Common messages & how to resolve them 8. Common messages & how to resolve them — data table 9 What you see What it means What to do “A fresh step‑up (MFA) assertion is required for this high‑value action.” This action (gate release, waiver, completion, cancellation) needs fresh verification. Complete the multi‑factor verification, then retry. “MFA enrollment required before this high‑value action.” You have not enrolled in multi‑factor verification. Enroll in MFA, then retry. A version conflict (the record changed since you loaded it). Someone updated the record after you opened it; your view is out of date. Reload the record and retry your change. You are asked for a record version you didn’t supply. A change was attempted without the record’s current version. Reopen the record so the current version is loaded, then retry. “waiving a task requires the waive endpoint” (when trying to set a task to waived ). Tasks are not waived by changing their status; statutory tasks can never be waived. Don’t waive statutory tasks. For non‑statutory tasks, change the applicable flag so the task no longer applies (it is then auto‑waived). “task ‘…’ requires a doc_ref evidence pointer.” The task needs an evidence pointer before it can be completed. Add the evidence pointer (a personnel‑file locator), then complete. “task ‘…’ requires screening ‘…’ to be cleared.” The task depends on a screening that is not yet cleared. Move the screening to cleared , then complete the task. “course ‘…’ requires score ≥ N.” The course has a minimum passing score and the score is missing or too low. Record a passing score to complete the course. “course ‘…’ gates §9/§11 access and cannot be waived.” This is a hard‑gate course (DCAA timekeeping, or CUI/CMMC‑NIST). It cannot be waived — the course must be completed. “courses not completed with a passing score: […]” A gate release was attempted before its precondition courses were finished. Complete the listed courses (with passing scores), then release the gate. “DCAA timekeeping training must be completed and the time‑charging access gate released before submitting timecards.” The person’s time‑charging gate is still held. Complete DCAA timekeeping and release the time‑charging gate, then submit the timecard. “day_90 requires [‘day_30’, ‘day_60’] to be recorded first.” Check‑ins must be recorded in order. Record the 30‑ and 60‑day check‑ins first. “‘…’ v… already acknowledged on this record.” That document version is already signed. No action needed — it is already done. “record has open required items: …” Completion was attempted while items are still open. Clear the listed open tasks, training, gates, acknowledgments and check‑ins, then complete. “employee ‘…’ already has an open onboarding record (…).” The person already has an open record. Use the existing record instead of creating a second one. “Forbidden: not your onboarding record.” / “you may only submit your own onboarding tasks.” A new hire tried to view or act on someone else’s record or task. You may only work your own record and your own tasks."

              "id": "9-faq",
              "title": "9. FAQ",
              "text": "9. FAQ Does the module store Social Security numbers, I‑9 images, or screening results? No. It stores completion state, dates, identities and pointers to documents that live in the personnel file. Notifications and exports contain no names and no personal data. Who sets the phase? No one — the phase is computed from the start date. An open statutory item (like an overdue I‑9) holds the phase back until it is resolved. Why can’t this person submit a timecard? Because their time‑charging gate is still held — DCAA timekeeping training must be completed and the gate released first. Can the I‑9 tasks be skipped? No. They are statutory and can never be waived; they also drive higher‑priority reminders. A document was re‑issued. Do people need to re‑sign? Yes. Acknowledgments are tracked per version; a new version reopens the requirement. Is it safe to run the reminder sweep twice? Yes. It never sends the same reminder twice for the same stage, and a repeated run simply replays the previous result. What is the “completion certificate”? It is the record itself plus its tamper‑evident chain hash, shown on the record once it is certified complete and available as a printable page and CSV exports. Can a new hire see other people’s onboarding? No — the self‑service view is strictly limited to their own record. What happens to issued equipment when someone leaves? When HR terminates or offboards the employee, their still‑issued assets are automatically flagged recovery due and a notification is raised."

          "title": "TSG License Manager GCP Staging Deployment Steps",

            {
              "id": "overview",
              "title": "Overview",
              "text": "TSG License Manager GCP Staging Deployment Steps This runbook deploys TSG License Manager to GCP staging using Cloud Run, Cloud SQL for PostgreSQL, Secret Manager, and Artifact Registry."
            },
            {
              "id": "staging-values",
              "title": "Staging values",
              "text": "Staging values GCP_PROJECT_ID=ttis-ai GCP_REGION=us-central1 ARTIFACT_REPOSITORY=tsg-platform ARTIFACT_IMAGE=tsg-license-manager CLOUD_RUN_SERVICE=tsg-license-manager-staging CLOUD_SQL_INSTANCE=tsg-license-manager-staging CLOUD_SQL_DATABASE=tsg_license_manager CLOUD_SQL_USER=tsg_app STAGING_BASE_URL=https://license-staging.tti-solutions.com"
            },
            {
              "id": "1-authenticate-gcp-tools",
              "title": "1. Authenticate GCP tools",
              "text": "1. Authenticate GCP tools gcloud auth login gcloud config set project ttis-ai gcloud auth configure-docker us-central1-docker.pkg.dev gcloud config get-value project gcloud auth list"
            },
            {
              "id": "2-enable-required-gcp-apis",
              "title": "2. Enable required GCP APIs",
              "text": "2. Enable required GCP APIs gcloud services enable ` run.googleapis.com ` sqladmin.googleapis.com ` secretmanager.googleapis.com ` artifactregistry.googleapis.com ` cloudbuild.googleapis.com"
            },
            {
              "id": "3-create-artifact-registry-repository",
              "title": "3. Create Artifact Registry repository",
              "text": "3. Create Artifact Registry repository gcloud artifacts repositories create tsg-platform ` --repository-format=docker ` --location=us-central1 ` --description=\"TSG License Manager container images\" If the repository already exists, record that and continue."
            },
            {
              "id": "4-build-and-push-the-container-image",
              "title": "4. Build and push the container image",
              "text": "4. Build and push the container image cd G:\\Tools\\tsg-platform-v0.2.0-dev-sprint-n docker build --tag tsg-platform:0.2.0-rc.1 . docker tag tsg-platform:0.2.0-rc.1 ` us-central1-docker.pkg.dev/ttis-ai/tsg-platform/tsg-license-manager:0.2.0-rc.1 docker push us-central1-docker.pkg.dev/ttis-ai/tsg-platform/tsg-license-manager:0.2.0-rc.1 Record the pushed image digest in the release evidence."
            },
            {
              "id": "5-create-cloud-sql-postgresql",
              "title": "5. Create Cloud SQL PostgreSQL",
              "text": "5. Create Cloud SQL PostgreSQL gcloud sql instances create tsg-license-manager-staging ` --database-version=POSTGRES_17 ` --tier=db-f1-micro ` --region=us-central1 ` --storage-type=SSD ` --storage-size=10GB ` --availability-type=zonal gcloud sql databases create tsg_license_manager ` --instance=tsg-license-manager-staging gcloud sql users create tsg_app ` --instance=tsg-license-manager-staging ` --password=\"REPLACE_WITH_STRONG_PASSWORD\" Use a strong generated password. Do not commit it."
            },
            {
              "id": "6-create-secret-manager-secrets",
              "title": "6. Create Secret Manager secrets",
              "text": "6. Create Secret Manager secrets Required secrets: DATABASE_URL TSG_AUTH_SECRET TSG_LICENSE_SIGNING_SECRET TSG_CLIENT_API_SECRET STRIPE_WEBHOOK_SECRET SMTP_PASSWORD The Cloud Run / Cloud SQL Unix-socket DATABASE_URL should look like: postgresql://tsg_app:YOUR_PASSWORD@/tsg_license_manager?host=/cloudsql/ttis-ai:us-central1:tsg-license-manager-staging echo \"postgresql://tsg_app:YOUR_PASSWORD@/tsg_license_manager?host=/cloudsql/ttis-ai:us-central1:tsg-license-manager-staging\" | gcloud secrets create tsg-license-manager-staging-database-url --data-file=- echo \"YOUR_AUTH_SECRET\" | gcloud secrets create tsg-license-manager-staging-auth-secret --data-file=- echo \"YOUR_LICENSE_SIGNING_SECRET\" | gcloud secrets create tsg-license-manager-staging-license-signing-secret --data-file=- echo \"YOUR_CLIENT_API_SECRET\" | gcloud secrets create tsg-license-manager-staging-client-api-secret --data-file=- echo \"YOUR_STRIPE_WEBHOOK_SECRET\" | gcloud secrets create tsg-license-manager-staging-stripe-webhook-secret --data-file=- echo \"YOUR_SMTP_PASSWORD\" | gcloud secrets create tsg-license-manager-staging-smtp-password --data-file=- PowerShell note: if echo introduces formatting issues, write each secret to a temporary local file, create the secret with --data-file , then securely delete the temporary file."
            },
            {
              "id": "7-deploy-cloud-run",
              "title": "7. Deploy Cloud Run",
              "text": "7. Deploy Cloud Run gcloud run deploy tsg-license-manager-staging ` --image us-central1-docker.pkg.dev/ttis-ai/tsg-platform/tsg-license-manager:0.2.0-rc.1 ` --region us-central1 ` --platform managed ` --add-cloudsql-instances ttis-ai:us-central1:tsg-license-manager-staging ` --set-env-vars TSG_ENV=staging,TSG_DB_BACKEND=postgres,TSG_SECURE_COOKIES=true,TSG_PUBLIC_BASE_URL=https://license-staging.tti-solutions.com,TSG_ALLOWED_HOSTS=license-staging.tti-solutions.com,docguard-ai-staging.tti-solutions.com,pursuite-staging.tti-solutions.com ` --set-secrets DATABASE_URL=tsg-license-manager-staging-database-url:latest,TSG_AUTH_SECRET=tsg-license-manager-staging-auth-secret:latest,TSG_LICENSE_SIGNING_SECRET=tsg-license-manager-staging-license-signing-secret:latest,TSG_CLIENT_API_SECRET=tsg-license-manager-staging-client-api-secret:latest,STRIPE_WEBHOOK_SECRET=tsg-license-manager-staging-stripe-webhook-secret:latest,SMTP_PASSWORD=tsg-license-manager-staging-smtp-password:latest ` --allow-unauthenticated Ingress can be restricted later if the existing Virtual Business Solution owns routing."

              "text": "9. Verify deployment curl https://license-staging.tti-solutions.com/health curl https://license-staging.tti-solutions.com/ready Expected /ready result: database=ok status=ready gcloud run services logs read tsg-license-manager-staging ` --region us-central1 ` --limit 100"
            },

              "text": "TSG Platform AWS Deployment Build This guide describes the AWS deployment package for running TSG Platform as a production container on AWS App Runner with PostgreSQL and AWS Secrets Manager. The package is produced by scripts/build_aws_deployment.ps1 and includes the Docker app, AWS CloudFormation template, example parameters, and paired Markdown/HTML documentation."

            },
            {

              "text": "Build the AWS package powershell -ExecutionPolicy Bypass -File scripts\\build_aws_deployment.ps1 The default output is: dist\\aws\\TSG-Platform-AWS-0.2.0-rc.1.zip dist\\aws\\TSG-Platform-AWS-0.2.0-rc.1.zip.sha256 To also build the Docker image locally: powershell -ExecutionPolicy Bypass -File scripts\\build_aws_deployment.ps1 -BuildImage"
            },
            {
              "id": "container-image-flow",
              "title": "Container image flow",
              "text": "Container image flow aws ecr create-repository --repository-name tsg-platform aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 123456789012.dkr.ecr.us-east-1.amazonaws.com docker build --tag tsg-platform:0.2.0-rc.1 . docker tag tsg-platform:0.2.0-rc.1 123456789012.dkr.ecr.us-east-1.amazonaws.com/tsg-platform:0.2.0-rc.1 docker push 123456789012.dkr.ecr.us-east-1.amazonaws.com/tsg-platform:0.2.0-rc.1 Use the pushed image URI as the CloudFormation ImageIdentifier parameter."
            },
            {

              "title": "Required secrets",
              "text": "Required secrets Secret Value DATABASE_URL PostgreSQL connection string TSG_AUTH_SECRET Random secret, at least 32 characters TSG_LICENSE_SIGNING_SECRET Random secret, at least 32 characters TSG_CLIENT_API_SECRET Random secret, at least 32 characters STRIPE_WEBHOOK_SECRET Real Stripe webhook signing secret beginning with whsec_ SMTP_PASSWORD SMTP account password aws secretsmanager create-secret --name tsg-platform/auth-secret --secret-string \"REPLACE_WITH_32_PLUS_RANDOM_CHARS\" The CloudFormation template receives secret ARNs, not raw secret values."

              "title": "Production configuration enforced by the app",
              "text": "Production configuration enforced by the app TSG_AUTH_SECRET , TSG_LICENSE_SIGNING_SECRET , and TSG_CLIENT_API_SECRET are non-placeholder secrets of at least 32 characters. TSG_DB_BACKEND=postgres . DATABASE_URL is present. STRIPE_WEBHOOK_SECRET is a real Stripe signing secret. TSG_SECURE_COOKIES=true . TSG_ALLOWED_HOSTS contains explicit hostnames and does not include * ."

            {
              "id": "overview",
              "title": "Overview",
              "text": "TSG Platform Standalone Desktop Build This guide describes the portable Windows desktop package for running TSG Platform as a local standalone service. The desktop build is intended for demos, operator workstations, isolated lab installs, and customer-support environments that need the admin and portal UI without a cloud deployment."
            },
            {
              "id": "included-files",
              "title": "Included files",
              "text": "Included files desktop/TSG-Platform-Launcher.ps1 desktop/setup/Install-TSG-Platform-Desktop.ps1 Application source under api , core , database , seed_data , and scripts requirements.txt Product and deployment documentation in Markdown and HTML desktop-manifest.json The launcher creates a local Python virtual environment, installs dependencies, initializes a SQLite database, starts Uvicorn on 127.0.0.1:8010 , and opens the admin console."
            },
            {
              "id": "build-the-package",
              "title": "Build the package",
              "text": "Build the package powershell -ExecutionPolicy Bypass -File scripts\\build_desktop_standalone.ps1 The default output is: dist\\desktop\\TSG-Platform-Desktop-0.2.0-rc.1.zip dist\\desktop\\TSG-Platform-Desktop-0.2.0-rc.1.zip.sha256 Use -SkipTests only for a quick local packaging check: powershell -ExecutionPolicy Bypass -File scripts\\build_desktop_standalone.ps1 -SkipTests"
            },
            {
              "id": "install-on-windows",
              "title": "Install on Windows",
              "text": "Install on Windows Extract the ZIP package. Run the installer: powershell -ExecutionPolicy Bypass -File desktop\\setup\\Install-TSG-Platform-Desktop.ps1 -CreateDesktopShortcut The default install location is: %LOCALAPPDATA%\\Programs\\TSGPlatform The installer creates a Start Menu shortcut and, when requested, a desktop shortcut."
            },
            {
              "id": "launch-manually",
              "title": "Launch manually",
              "text": "Launch manually powershell -ExecutionPolicy Bypass -File desktop\\TSG-Platform-Launcher.ps1 Useful options: powershell -ExecutionPolicy Bypass -File desktop\\TSG-Platform-Launcher.ps1 -Port 8020 powershell -ExecutionPolicy Bypass -File desktop\\TSG-Platform-Launcher.ps1 -NoBrowser powershell -ExecutionPolicy Bypass -File desktop\\TSG-Platform-Launcher.ps1 -DataDir \"$env:USERPROFILE\\TSGPlatformData\""
            },
            {
              "id": "runtime-data",
              "title": "Runtime data",
              "text": "Runtime data By default, the launcher stores data under: %LOCALAPPDATA%\\TSGPlatform The SQLite database is: %LOCALAPPDATA%\\TSGPlatform\\tsg_platform.db The launcher sets these local defaults when they are not already present: TSG_ENV=development TSG_DB_BACKEND=sqlite TSG_DB_PATH=<DataDir>\\tsg_platform.db TSG_ALLOWED_HOSTS=127.0.0.1,localhost For a custom environment file, pass -EnvFile path\\to\\.env.local . Values in that file are loaded before startup."
            },
            {
              "id": "verify-the-desktop-service",
              "title": "Verify the desktop service",
              "text": "Verify the desktop service Invoke-RestMethod http://127.0.0.1:8010/health Invoke-RestMethod http://127.0.0.1:8010/ready Open the admin console: http://127.0.0.1:8010/admin Development credentials are shown on the login page only when TSG_ENV is not production ."
            },
            {
              "id": "operational-notes",
              "title": "Operational notes",
              "text": "Operational notes The desktop build uses SQLite and is not a public internet deployment. Keep the generated .zip.sha256 file with the package for transfer validation. If dependency installation is pre-provisioned, use -SkipDependencyInstall . Stop the service by closing the PowerShell window that is running the launcher. Back up the SQLite database before replacing or moving the workstation install."
            }

              "id": "document-purpose",
              "title": "Document Purpose",
              "text": "Document Purpose This guide explains how to administer Pursuite in a professional, controlled, and audit-ready manner. It is written for users who have responsibility for the tenant itself rather than only one pursuit, proposal, opportunity, or workspace. Use this guide to: Configure a new Pursuite tenant. Manage users, roles, workspace access, and offboarding. Configure organization-level security controls. Administer SSO, MFA, AI providers, integrations, and usage guardrails. Govern RFP Shredder, CUI handling, templates, content, reports, and audit evidence. Operate Pursuite in a way that supports proposal quality, compliance, and repeatable business processes. This guide does not replace company policy. Where your internal cybersecurity, legal, contracts, records-management, or export-control policies are stricter than this guide, follow your internal policy."
            },
            {
              "id": "administrator-operating-model",
              "title": "Administrator Operating Model",
              "text": "Administrator Operating Model Pursuite administrators own the operating environment. They do not need to perform every proposal action, but they are accountable for ensuring that the platform is configured correctly and that the right users can perform the right work at the right time."
            },
            {
              "id": "administrative-principles",
              "title": "Administrative Principles",
              "text": "Administrative Principles Use these principles when making tenant changes: Least privilege. Give users the minimum role required for their responsibilities. Separation of duties. Avoid concentrating proposal approval, security administration, billing, and audit export responsibilities in one person. Traceability. Prefer actions that preserve audit history over destructive cleanup. Repeatability. Use templates, playbooks, and scheduled review cycles instead of ad hoc administration. Controlled automation. Enable AI and integrations only after reviewing data-handling and approval requirements. Business continuity. Maintain more than one active Admin account and document emergency access procedures."
            },
            {
              "id": "recommended-admin-team-structure",
              "title": "Recommended Admin Team Structure",
              "text": "Recommended Admin Team Structure Admin Function Primary Owner Backup Owner Typical Responsibilities Tenant Administration Platform Admin Proposal Operations Lead Organization settings, user roles, feature enablement Security Administration IT/Security Admin Platform Admin MFA, SSO, access review, incident response Compliance Administration Compliance Owner Security Admin Audit exports, CUI/ITAR classification, evidence handling AI Administration AI Program Owner Platform Admin Provider credentials, model routing, usage review Integration Administration Business Systems Owner IT Admin CRM, SharePoint, Teams, SAM.gov, CPQ, webhooks Proposal Operations Proposal Operations Lead Senior Proposal Manager Templates, content library, workspace governance Small organizations may combine these responsibilities, but the duties should still be reviewed separately."
            },
            {
              "id": "administrative-roles-and-access-boundaries",
              "title": "Administrative Roles and Access Boundaries",
              "text": "Administrative Roles and Access Boundaries Pursuite uses system-level roles and proposal workspace roles. System roles govern broad platform capabilities. Workspace roles govern what a user can do inside a specific proposal."
            },
            {
              "id": "system-roles",
              "title": "System Roles",
              "text": "System Roles Role Purpose Typical Capabilities Administrative Notes Admin Full tenant administrator User management, tenant settings, security settings, integrations, audit exports, billing, broad access to business records Use sparingly; review quarterly Proposal Manager Capture/proposal lead Create and manage opportunities and proposals, manage workspace teams, upload and confirm RFP requirements, run proposal workflows Appropriate for proposal leads and capture managers Writer Contributor Draft assigned sections, view proposal context, use permitted AI drafting tools Should not administer RFP requirement sets or tenant settings Reviewer Review participant Review content, comment, participate in review workflows Often used for SMEs, color team reviewers, and quality reviewers Executive Approver Leadership approver Bid/no-bid approval and executive-level review Should be limited to users with decision authority Read Only Observer/auditor View permitted records without editing Useful for auditors, temporary observers, and management visibility"
            },
            {
              "id": "workspace-roles",
              "title": "Workspace Roles",
              "text": "Workspace Roles Workspace roles are scoped to an individual proposal. A user may be a Writer on one proposal, a Reviewer on another, and have no access to a third. Typical workspace administration tasks: Add team members to a proposal. Assign the appropriate workspace role. Assign section ownership. Review membership before major gates such as color reviews or final export. Remove users when they no longer need access."
            },
            {
              "id": "access-review-standard",
              "title": "Access Review Standard",
              "text": "Access Review Standard Perform an access review at least monthly and before each major proposal deadline. Confirm: Admin list is still accurate. Proposal Managers still need manager-level access. Writers and Reviewers are assigned only to active work. Former employees or subcontractors are deactivated. Read-only access is still justified. SSO group mappings still reflect approved role assignments."
            },
            {
              "id": "initial-tenant-implementation",
              "title": "Initial Tenant Implementation",
              "text": "Initial Tenant Implementation This section provides a complete step-by-step setup procedure for a new tenant."
            },
            {
              "id": "phase-1-establish-administrative-control",
              "title": "Phase 1: Establish Administrative Control",
              "text": "Phase 1: Establish Administrative Control Sign in with the initial Admin account. Confirm the tenant name and organization identifier. Add at least one backup Admin. Confirm both Admins can sign in. Record the Admin owners in your internal system inventory or operations runbook. Success criteria: At least two Admins exist. Admin accounts are associated with named employees, not shared mailboxes. Emergency access handling is documented."
            },
            {
              "id": "phase-2-configure-organization-defaults",
              "title": "Phase 2: Configure Organization Defaults",
              "text": "Phase 2: Configure Organization Defaults Open organization settings. Confirm organization display name. Confirm primary domain. Set default timezone. Confirm currency, date, and number formatting where available. Review enabled feature flags and plan entitlements. Save changes. Success criteria: Tenant settings match company identity. Timezone aligns with report schedules and proposal operations. Enabled features match purchased plan and approved deployment model."
            },
            {
              "id": "phase-3-configure-identity-and-security",
              "title": "Phase 3: Configure Identity and Security",
              "text": "Phase 3: Configure Identity and Security Decide whether SSO is required. Configure SSO before inviting most users. Test SSO with one pilot account. Configure MFA policy. Confirm Admins and Proposal Managers are enrolled in MFA. Document support steps for MFA reset and locked accounts. Success criteria: SSO sign-in works for a test user. MFA is enforced according to company policy. A break-glass procedure exists if SSO becomes unavailable."
            },
            {
              "id": "phase-4-configure-ai-and-data-controls",
              "title": "Phase 4: Configure AI and Data Controls",
              "text": "Phase 4: Configure AI and Data Controls Identify approved AI provider or providers. Add provider credentials. Test provider connectivity. Confirm approved use cases. Confirm CUI/ITAR data handling policy. Configure CUI external-processing approval only if formally approved. Review audit logging for AI actions. Success criteria: AI provider test succeeds. AI data-handling policy is documented. CUI processing state matches organizational approval."
            },
            {
              "id": "phase-5-invite-users-and-establish-governance",
              "title": "Phase 5: Invite Users and Establish Governance",
              "text": "Phase 5: Invite Users and Establish Governance Create or invite Admins, Proposal Managers, Writers, Reviewers, and Executive Approvers. Verify users can sign in. Publish baseline templates. Approve core content library items. Configure integrations. Create scheduled reports. Review audit export procedure. Success criteria: Users have correct roles. Proposal Managers can create workspaces. Core templates and content are available. Integrations are tested before operational use."
            },
            {
              "id": "organization-profile-and-tenant-settings",
              "title": "Organization Profile and Tenant Settings",
              "text": "Organization Profile and Tenant Settings Organization settings affect how Pursuite behaves across the tenant."
            },
            {
              "id": "step-by-step-review-organization-settings",
              "title": "Step-by-Step: Review Organization Settings",
              "text": "Step-by-Step: Review Organization Settings Open the Admin or Settings area. Select Organization or Tenant Settings. Review the organization name. Review default timezone. Review plan and enabled modules. Review notification defaults. Review any branding or export defaults. Save only if changes are required. Record major setting changes in your internal change log."
            },
            {
              "id": "professional-controls",
              "title": "Professional Controls",
              "text": "Professional Controls Maintain the following controls: Review tenant settings after plan changes. Review timezone before creating scheduled executive reports. Confirm display name before sharing exports externally. Review feature availability before announcing new workflows to users. Avoid changing organization identifiers during active proposal deadlines unless necessary."
            },
            {
              "id": "user-lifecycle-management",
              "title": "User Lifecycle Management",
              "text": "User Lifecycle Management User lifecycle administration covers onboarding, role changes, temporary access, deactivation, and audit review."
            },
            {
              "id": "step-by-step-invite-a-user",
              "title": "Step-by-Step: Invite a User",
              "text": "Step-by-Step: Invite a User Open the user administration page. Click Add User or Invite User. Enter the user's full name and email address. Select the appropriate system role. Add optional notes if your organization tracks request context. Send the invitation. Confirm the user receives the invitation. Confirm the user signs in successfully. Add the user to proposal workspaces only where needed. Recommended evidence: Access request ticket. Approver name. Assigned role. Date access was granted."
            },
            {
              "id": "step-by-step-change-a-user-s-system-role",
              "title": "Step-by-Step: Change a User's System Role",
              "text": "Step-by-Step: Change a User's System Role Open the user list. Search for the user. Open the user profile. Review current system role. Confirm the requested new role has a business justification. Change the role. Save. Review proposal workspace memberships separately. Notify the user and requestor. Controls: Admin role changes should require explicit approval. Proposal Manager role changes should be reviewed for active proposal impact. Role elevation should be time-bound when access is temporary."
            },
            {
              "id": "step-by-step-deactivate-a-user",
              "title": "Step-by-Step: Deactivate a User",
              "text": "Step-by-Step: Deactivate a User Confirm the offboarding request. Identify active proposal assignments. Reassign sections, reviews, reports, templates, and scheduled exports. Remove the user from active proposal workspaces. Deactivate the user account. Confirm the user can no longer sign in. Review recent audit activity if required. Retain audit history. Do not delete audit records for a deactivated user. Deactivation preserves traceability while preventing new access."
            },
            {
              "id": "step-by-step-review-user-access",
              "title": "Step-by-Step: Review User Access",
              "text": "Step-by-Step: Review User Access Export or open the current user list. Filter active users. Review Admins first. Review Proposal Managers. Review users with CUI or export-controlled access. Review inactive project participants. Confirm workspace membership for active proposals. Remove unnecessary access. Record review completion."
            },
            {
              "id": "role-and-permission-governance",
              "title": "Role and Permission Governance",
              "text": "Role and Permission Governance Role governance ensures users have appropriate access for their duties."
            },
            {
              "id": "role-assignment-guidance",
              "title": "Role Assignment Guidance",
              "text": "Role Assignment Guidance Need Recommended Role Manage tenant, integrations, billing, security, audit exports Admin Lead capture/proposal work and manage proposal team Proposal Manager Draft proposal sections Writer Review proposal content without editing tenant settings Reviewer Approve bid/no-bid decisions Executive Approver Observe work or support audit review Read Only"
            },
            {
              "id": "common-anti-patterns",
              "title": "Common Anti-Patterns",
              "text": "Common Anti-Patterns Avoid these patterns: Making every senior user an Admin. Keeping former subcontractors active after proposal closeout. Granting Proposal Manager access only to allow one-time edits. Using shared accounts for proposal or admin work. Letting SSO groups drift from approved role assignments."
            },
            {
              "id": "emergency-access",
              "title": "Emergency Access",
              "text": "Emergency Access If emergency Admin access is needed: Document the reason. Obtain approval according to company policy. Grant the minimum required role. Perform the required action. Remove elevated access when complete. Review audit logs after the event."
            },
            {
              "id": "proposal-workspace-administration",
              "title": "Proposal Workspace Administration",
              "text": "Proposal Workspace Administration Admins usually do not manage every proposal day to day, but they support governance and recovery when workspace access or gates are blocked."
            },
            {
              "id": "step-by-step-add-a-user-to-a-proposal-workspace",
              "title": "Step-by-Step: Add a User to a Proposal Workspace",
              "text": "Step-by-Step: Add a User to a Proposal Workspace Open the proposal workspace. Open the Team panel. Click Add Member. Select the user. Select the workspace role. Save. Assign sections if applicable. Confirm the user can access the workspace."
            },
            {
              "id": "step-by-step-correct-a-workspace-role",
              "title": "Step-by-Step: Correct a Workspace Role",
              "text": "Step-by-Step: Correct a Workspace Role Open the proposal workspace. Open the Team panel. Locate the user. Review current workspace role. Select the corrected role. Save. Confirm the user can perform the required action."
            },
            {
              "id": "proposal-gate-governance",
              "title": "Proposal Gate Governance",
              "text": "Proposal Gate Governance Admins should understand the major gates: Gate What It Controls Who Usually Acts Bid/no-bid approval Whether pursuit should proceed Executive Approver RFP requirement confirmation Unlocks Compliance Matrix and Autonomous Pipeline Proposal Manager or Admin Low-confidence RFP review Prevents uncertain requirements from being confirmed without human review Proposal Manager or Admin Pipeline human review gates Controls AI pipeline advancement Assigned reviewer/approver Final export readiness Ensures content is approved before delivery Proposal Manager"
            },
            {
              "id": "admin-intervention-rules",
              "title": "Admin Intervention Rules",
              "text": "Admin Intervention Rules Admins should intervene only when: The assigned Proposal Manager is unavailable. Access is misconfigured. A compliance or security concern requires action. A production workflow is blocked by administrative settings. Record the reason for significant interventions."
            },
            {
              "id": "security-administration",
              "title": "Security Administration",
              "text": "Security Administration Security administration includes user controls, authentication, data classification, audit monitoring, and incident response."
            },
            {
              "id": "security-baseline",
              "title": "Security Baseline",
              "text": "Security Baseline Recommended baseline: MFA enforced for Admins and Proposal Managers. SSO enabled for enterprise tenants. At least two Admins, no shared Admin accounts. Quarterly access review. Immediate deactivation for offboarded users. CUI/ITAR controls enabled when controlled data is stored. AI provider approval documented. Audit exports reviewed and retained according to policy."
            },
            {
              "id": "step-by-step-perform-a-security-review",
              "title": "Step-by-Step: Perform a Security Review",
              "text": "Step-by-Step: Perform a Security Review Review active Admin accounts. Review MFA enrollment. Review SSO status and recent sign-in issues. Review users added since the last review. Review role elevations. Review CUI classification events. Review failed access attempts or unusual activity. Review integrations and active credentials. Document findings and remediation actions."
            },
            {
              "id": "incident-response-support",
              "title": "Incident Response Support",
              "text": "Incident Response Support If suspicious activity is reported: Preserve audit records. Identify affected users, proposals, and documents. Disable or restrict affected accounts if required. Review recent audit events. Review integrations and tokens. Escalate according to company incident response procedures. Document containment and remediation."
            },
            {
              "id": "sso-and-mfa-administration",
              "title": "SSO and MFA Administration",
              "text": "SSO and MFA Administration"
            },
            {
              "id": "sso-configuration-procedure",
              "title": "SSO Configuration Procedure",
              "text": "SSO Configuration Procedure Confirm the identity provider owner. Confirm required metadata, redirect URLs, and certificate details. Configure Pursuite SSO settings. Configure the application in the identity provider. Test with one pilot user. Confirm role mapping behavior. Test sign-out and re-authentication. Enable SSO for the broader tenant. Monitor sign-in errors after rollout."
            },
            {
              "id": "mfa-configuration-procedure",
              "title": "MFA Configuration Procedure",
              "text": "MFA Configuration Procedure Open security settings. Review current MFA policy. Choose the enforcement level. Communicate the rollout date. Require enrollment for Admins first. Require enrollment for Proposal Managers. Expand to all users if required. Monitor support requests."
            },
            {
              "id": "mfa-reset-procedure",
              "title": "MFA Reset Procedure",
              "text": "MFA Reset Procedure Verify the user's identity through approved internal process. Confirm the account email. Reset MFA enrollment. Ask the user to enroll a new factor. Confirm successful sign-in. Record the reset if your policy requires it."
            },
            {
              "id": "cui-itar-and-data-classification-administration",
              "title": "CUI, ITAR, and Data Classification Administration",
              "text": "CUI, ITAR, and Data Classification Administration Pursuite supports classification workflows for controlled information. Admins are responsible for ensuring those controls match organizational policy."
            },
            {
              "id": "classification-concepts",
              "title": "Classification Concepts",
              "text": "Classification Concepts Concept Meaning INTERNAL Default non-CUI business data classification CUI Controlled Unclassified Information requiring additional handling ITAR/EAR Export-controlled data requiring strict access and dissemination controls CUI category Specific CUI category such as controlled, specified, ITAR/EAR, or FOUO legacy Minimum clearance User clearance threshold required for access when configured"
            },
            {
              "id": "step-by-step-classify-an-rfp-document-as-cui",
              "title": "Step-by-Step: Classify an RFP Document as CUI",
              "text": "Step-by-Step: Classify an RFP Document as CUI Confirm the document contains CUI or controlled content. Confirm the classifier is authorized. Open the classification controls for the RFP document. Select the appropriate CUI category. Enter designator, caveats, reason, and review date when required. Save classification. Confirm the document classification shows as CUI. Confirm access restrictions and audit logging behavior."
            },
            {
              "id": "external-ai-processing-gate",
              "title": "External AI Processing Gate",
              "text": "External AI Processing Gate When an RFP document is classified as CUI, the RFP Shredder worker checks whether the organization is approved for external CUI processing before sending document text to an AI provider. Do not enable external CUI processing unless: The AI provider is approved for the data type. Contract terms permit that processing. Security and compliance owners have approved the configuration. The approval is documented."
            },
            {
              "id": "step-by-step-remove-cui-classification",
              "title": "Step-by-Step: Remove CUI Classification",
              "text": "Step-by-Step: Remove CUI Classification Confirm the document no longer requires CUI handling. Confirm approval to downgrade. Open the classification record. Remove or downgrade the classification to none. Save. Confirm the RFP document returns to INTERNAL classification. Retain the classification audit history."
            },
            {
              "id": "ai-provider-administration",
              "title": "AI Provider Administration",
              "text": "AI Provider Administration AI provider settings power drafting, RFP Shredder, Compliance Matrix, Autonomous Pipeline, Ask, analysis, and related AI features."
            },
            {
              "id": "step-by-step-add-or-update-an-ai-provider",
              "title": "Step-by-Step: Add or Update an AI Provider",
              "text": "Step-by-Step: Add or Update an AI Provider Open AI Provider settings. Select provider type. Enter endpoint, deployment, model, and API key details as required. Save the provider. Run the connectivity test. Confirm a successful response. Configure default routing if multiple providers exist. Record approval and key owner."
            },
            {
              "id": "provider-governance-checklist",
              "title": "Provider Governance Checklist",
              "text": "Provider Governance Checklist Provider is approved by security/legal. Provider supports required data handling. Key owner is documented. Key rotation schedule is defined. Test result is successful. Usage monitoring is enabled where available. CUI processing approval matches classification policy."
            },
            {
              "id": "step-by-step-rotate-provider-credentials",
              "title": "Step-by-Step: Rotate Provider Credentials",
              "text": "Step-by-Step: Rotate Provider Credentials Generate a new key in the provider portal. Add or update the key in Pursuite. Test connectivity. Confirm AI workflows run normally. Revoke the old key. Record the rotation date."
            },
            {
              "id": "rfp-shredder-administration",
              "title": "RFP Shredder Administration",
              "text": "RFP Shredder Administration The RFP Shredder converts solicitation documents into structured requirements. Admins should understand both the user workflow and the controls around it."
            },
            {
              "id": "supported-files",
              "title": "Supported Files",
              "text": "Supported Files PDF DOCX Maximum file size: 50 MB PDF files use text extraction with OCR fallback for scanned or image-only PDFs. DOCX files use Word document text extraction and do not use OCR."
            },
            {
              "id": "manager-admin-actions",
              "title": "Manager/Admin Actions",
              "text": "Manager/Admin Actions Proposal Managers and Admins can: Upload RFP files. Replace RFP files. Retry processing. Re-process completed documents. Add manual requirements. Edit extracted requirements. Delete false positives. Mark low-confidence rows reviewed. Confirm requirements. Writers can view completed requirements, but they cannot perform write or confirmation actions."
            },
            {
              "id": "step-by-step-resolve-a-blocked-rfp-confirmation",
              "title": "Step-by-Step: Resolve a Blocked RFP Confirmation",
              "text": "Step-by-Step: Resolve a Blocked RFP Confirmation Open the proposal workspace. Open RFP Shredder. Confirm document status is completed. Look for rows marked Review required. For each flagged row, compare it to the source solicitation. Edit the row if the text or classification is wrong. Mark the row reviewed if it is correct. Confirm requirements. Verify Compliance Matrix and Autonomous Pipeline unlock."
            },
            {
              "id": "re-process-behavior",
              "title": "Re-Process Behavior",
              "text": "Re-Process Behavior Re-processing follows replace-on-success semantics: Existing visible requirements remain available while the new run is processing. If the new run succeeds, old active rows are soft-deleted and replaced with the new extracted set. If the new run fails, old visible rows remain intact. Soft-deleted rows remain available for history and audit. This behavior protects proposal teams from losing a usable requirement set because of a failed re-processing attempt."
            },
            {
              "id": "compliance-and-audit-administration",
              "title": "Compliance and Audit Administration",
              "text": "Compliance and Audit Administration Audit and compliance administration supports SOC 2, CMMC, internal control reviews, and customer-driven evidence requests."
            },
            {
              "id": "audit-event-categories",
              "title": "Audit Event Categories",
              "text": "Audit Event Categories Common audited actions include: User sign-in and access-sensitive events. User and role administration. Proposal and opportunity changes. RFP upload, shredding, confirmation, and requirement edits. CUI classification and CUI access. AI provider usage and AI workflow events. Integration and export activity."
            },
            {
              "id": "step-by-step-export-audit-evidence",
              "title": "Step-by-Step: Export Audit Evidence",
              "text": "Step-by-Step: Export Audit Evidence Open the audit or compliance area. Select the date range. Select action categories if available. Filter by user, target, or module if needed. Generate the export. Confirm the export opens correctly. Save it to the approved evidence repository. Record the export purpose and requestor."
            },
            {
              "id": "evidence-handling-rules",
              "title": "Evidence Handling Rules",
              "text": "Evidence Handling Rules Export only the scope needed. Do not edit raw evidence files. Store exports in approved locations. Restrict access to evidence containing CUI or sensitive proposal data. Retain exports according to company policy."
            },
            {
              "id": "integration-administration",
              "title": "Integration Administration",
              "text": "Integration Administration Integrations connect Pursuite to external systems. Admins should treat integration changes as controlled configuration changes."
            },
            {
              "id": "common-integration-types",
              "title": "Common Integration Types",
              "text": "Common Integration Types Integration Purpose Admin Considerations SAM.gov Opportunity monitoring and import API access, search configuration, monitor ownership CRM Account, contact, opportunity, and activity synchronization OAuth scopes, sync direction, duplicate handling SharePoint/OneDrive Attach files from Microsoft document stores Tenant consent, document access scope Teams Notifications and workflow cards Channel ownership, notification routing ProPricer/CPQ Pricing and quote integration Bridge health, credentials, data mapping Email/SMS Notifications and communication Sender identity, compliance, delivery monitoring"
            },
            {
              "id": "step-by-step-add-an-integration",
              "title": "Step-by-Step: Add an Integration",
              "text": "Step-by-Step: Add an Integration Identify the business owner. Confirm security approval. Confirm required credentials or OAuth access. Open Integrations. Select the integration. Enter connection details. Test the connection. Configure sync or notification settings. Run a limited pilot. Review audit and sync logs. Communicate availability to users."
            },
            {
              "id": "step-by-step-disable-an-integration",
              "title": "Step-by-Step: Disable an Integration",
              "text": "Step-by-Step: Disable an Integration Notify impacted users. Pause scheduled jobs if available. Disable the integration. Revoke external credentials if appropriate. Confirm no new sync jobs run. Record the change."
            },
            {
              "id": "templates-and-content-library-governance",
              "title": "Templates and Content Library Governance",
              "text": "Templates and Content Library Governance Templates and approved content are central to repeatable proposal operations."
            },
            {
              "id": "template-governance",
              "title": "Template Governance",
              "text": "Template Governance Admin responsibilities: Publish standard templates. Approve or reject publish requests. Archive obsolete templates. Maintain bid-type and section metadata. Review template usage and quality. Step-by-step publish review: Open Templates. Filter to pending review if applicable. Open the requested template. Review title, bid type, volumes, sections, instructions, and metadata. Confirm it follows company proposal standards. Approve and publish, or reject with a clear reason. Notify the requester if additional changes are needed."
            },
            {
              "id": "content-library-governance",
              "title": "Content Library Governance",
              "text": "Content Library Governance Admin responsibilities: Approve high-quality reusable content. Reject or return incomplete content. Retire outdated content. Maintain tags and freshness indicators. Ensure regulated claims are reviewed. Recommended content review questions: Is the content accurate? Is it approved for reuse? Does it contain customer-sensitive data? Does it require CUI or export-control marking? Does it have a clear owner? Is it current?"
            },
            {
              "id": "dashboards-reports-and-scheduled-exports",
              "title": "Dashboards, Reports, and Scheduled Exports",
              "text": "Dashboards, Reports, and Scheduled Exports Admins govern reporting so leadership receives accurate information without exposing restricted data unnecessarily."
            },
            {
              "id": "step-by-step-create-a-scheduled-report",
              "title": "Step-by-Step: Create a Scheduled Report",
              "text": "Step-by-Step: Create a Scheduled Report Open Scheduled Reports. Click New Schedule. Select report type. Set frequency and timezone. Add recipients. Review whether the report contains sensitive data. Save. Confirm the first run completes. Review recipient feedback."
            },
            {
              "id": "report-governance",
              "title": "Report Governance",
              "text": "Report Governance Review scheduled reports monthly: Confirm recipients still need the report. Confirm departed users are removed. Confirm report frequency is appropriate. Confirm reports containing CUI or sensitive data have approved distribution. Disable stale schedules."
            },
            {
              "id": "billing-plans-feature-entitlements-and-usage",
              "title": "Billing, Plans, Feature Entitlements, and Usage",
              "text": "Billing, Plans, Feature Entitlements, and Usage Billing and entitlement administration varies by deployment, but Admins should understand the available controls. Admin tasks may include: Review plan and enabled modules. Monitor user counts. Monitor AI usage. Monitor storage usage. Review billing contact information. Download invoices where applicable. Coordinate upgrades or feature enablement. If users report missing functionality, check: User role. Workspace role. Feature entitlement. Plan limits. Deployment mode. Configuration dependencies."
            },
            {
              "id": "data-retention-archiving-and-records-management",
              "title": "Data Retention, Archiving, and Records Management",
              "text": "Data Retention, Archiving, and Records Management Pursuite data may include proposal drafts, solicitation files, pricing information, customer data, CUI, audit events, AI outputs, and exports."
            },
            {
              "id": "recommended-retention-controls",
              "title": "Recommended Retention Controls",
              "text": "Recommended Retention Controls Archive proposals after closeout. Retain audit logs according to compliance policy. Retain CUI classification history. Remove unnecessary user access instead of deleting business records. Export required records before contract closeout if the customer or contract requires it. Coordinate purge requests with legal, compliance, and IT."
            },
            {
              "id": "step-by-step-archive-a-proposal",
              "title": "Step-by-Step: Archive a Proposal",
              "text": "Step-by-Step: Archive a Proposal Confirm the proposal is complete or no longer active. Confirm required exports have been saved. Confirm final status and opportunity outcome are recorded. Remove unnecessary workspace users. Archive the proposal. Record archive date if required."
            },
            {
              "id": "operational-runbooks",
              "title": "Operational Runbooks",
              "text": "Operational Runbooks"
            },
            {
              "id": "runbook-new-tenant-launch",
              "title": "Runbook: New Tenant Launch",
              "text": "Runbook: New Tenant Launch Add backup Admin. Configure organization profile. Configure SSO and MFA. Configure AI provider. Configure CUI policy. Invite pilot users. Publish starter templates. Approve starter content library items. Configure integrations. Test one opportunity-to-proposal workflow. Export one audit sample. Announce production readiness."

              "text": "9. Templates Method Endpoint Permission Description Key Request Fields Key Response Fields GET /templates template:read List templates (admins see all; others see published only) — Template[] POST /templates template:create Create template name, bidType, agency?, state?, description? Template (201) GET /templates/:id template:read Get with sections — Template + sections[] PATCH /templates/:id template:create Update (draft only) name?, bidType?, agency?, state?, description? Template POST /templates/:id/sections template:create Add section title, orderIndex, required, instructions?, pageLimit?, defaultContent?, criteriaRefs?, contentLibraryTags?, setAsideRequired? TemplateSection (201) PATCH /templates/:id/sections/:sectionId template:create Update section same fields as create, all optional TemplateSection DELETE /templates/:id/sections/:sectionId template:create Delete section — { deleted: true } PATCH /templates/:id/sections/reorder template:create Reorder sections order: [{ id, orderIndex }] { reordered: true } POST /templates/:id/publish template:publish Publish template changeLog?, version? Template POST /templates/:id/unpublish template:publish Revert to draft — Template GET /templates/:id/versions template:read Version history — TemplateVersion[] PUT /templates/:id/dynamic-fields template:create Set dynamic fields fields: [{ key, label, defaultValue? }] Template PUT /templates/:id/commercial-risk-rules template:create Set commercial risk rules rules: [{ id, pattern, severity, message }] Template GET /templates/:id/analytics template:read Usage analytics — { proposalCount, lastUsedAt } POST /templates/:id/request-publish template:create Request publish approval (non-admin) note? Template POST /templates/:id/approve-publish template:publish Admin approves publish request changeLog?, version? Template POST /templates/:id/reject-publish template:publish Admin rejects publish request reason? Template"

              "text": "10.5 Webhooks Method Endpoint Permission Description Key Request Fields Key Response Fields GET /crm/webhooks crm:admin List subscriptions — Subscription[] POST /crm/webhooks crm:admin Register webhook url, events: string[], secret? Subscription (201) — secret shown once only GET /crm/webhooks/:id crm:admin Get subscription — Subscription PATCH /crm/webhooks/:id crm:admin Update subscription url?, events?, active?, secret? Subscription DELETE /crm/webhooks/:id crm:admin Delete subscription — 204 No Content POST /crm/webhooks/:id/test crm:admin Fire test delivery — { fired: boolean }"

              "id": "signature-verification",
              "title": "Signature Verification",
              "text": "Signature Verification // Node.js const crypto = require('crypto'); function verify(secret, rawBody, sigHeader) { const expected = 'sha256=' + crypto .createHmac('sha256', secret).update(rawBody).digest('hex'); return crypto.timingSafeEqual(Buffer.from(expected), Buffer.from(sigHeader)); } # Python import hmac, hashlib def verify(secret, raw_body, sig_header): expected = 'sha256=' + hmac.new( secret.encode(), raw_body, hashlib.sha256).hexdigest() return hmac.compare_digest(expected, sig_header)"
            },

            {
              "id": "14-email-calendar-nylas",

              "text": "14. Email & Calendar (Nylas) Method Endpoint Permission Description Key Request Fields Key Response Fields GET /nylas/auth-url crm:write Get Nylas OAuth URL — { url } GET /nylas/status crm:read Check email/calendar connection — { connected, email?, provider? } DELETE /nylas/disconnect crm:write Disconnect mailbox — { disconnected: true } GET /nylas/emails crm:read List synced email threads contactId?, accountId?, limit? EmailThread[] POST /nylas/emails/sync crm:write Sync recent emails — { synced: number } (202) POST /nylas/emails/send crm:write Send email from connected mailbox to: string[], subject, html, contactId?, accountId?, opportunityId? { sent: true } GET /nylas/calendar crm:read List calendar events start?, end?, contactId? CalendarEvent[] POST /nylas/calendar/sync crm:write Sync next 30 days of calendar — { synced: number } (202)"
            },
            {
              "id": "15-rfp-shredder-a1",
              "title": "15. RFP Shredder (A1)",
              "text": "15. RFP Shredder (A1) The RFP Shredder extracts requirements from an uploaded RFP PDF or DOCX using AI and produces a structured, editable requirement list. Confirming requirements unlocks the Compliance Matrix (A2) and Autonomous Pipeline (A3) for the proposal. BUG-08 (v2.0): GET /proposals/:id/rfp-document previously returned 500 when no document had been uploaded. This is now a structured 404 ."
            },
            {
              "id": "15-1-document-upload-status",
              "title": "15.1 Document Upload & Status",
              "text": "15.1 Document Upload & Status Current implementation supports PDF and DOCX uploads up to 50 MB. RFP endpoints use the dedicated rfp:* permission family: rfp:upload , rfp:read , rfp:write , and rfp:confirm . Both GET /proposals/:proposalId/rfp-document and GET /rfp-documents/:id return requirements[] with reviewed_at and needs_review . Method Endpoint Permission Description Key Request Fields Key Response Fields POST /proposals/:proposalId/rfp-upload rfp:upload Upload RFP PDF or DOCX (multipart or presigned flow, max 50 MB) Multipart file or JSON file_name, file_size_bytes, mime_type { rfp_document_id, shred_status?, upload_url?, upload_expires_at? } (201) GET /proposals/:proposalId/rfp-document rfp:read Get current RFP document and status; 404 when none uploaded - { id, shred_status, requirements[] }"
            },
            {
              "id": "shred-status-values",
              "title": "shred_status values",
              "text": "shred_status values Value Meaning uploaded File received; worker has not yet started pending Worker picked up; AI extraction in progress completed Requirements extracted; awaiting confirmation confirmed Requirements confirmed; A2/A3 unlocked failed Extraction failed; re-process to retry"
            },
            {
              "id": "15-2-processing-confirmation",
              "title": "15.2 Processing & Confirmation",
              "text": "15.2 Processing & Confirmation POST /rfp-documents/:id/process re-runs extraction using replace-on-success semantics: active requirements for the document remain visible if extraction fails, and are soft-deleted/replaced only inside the successful completion transaction. POST /rfp-documents/:id/confirm returns 409 LOW_CONFIDENCE_REVIEW_REQUIRED when any active requirement below confidence 0.70 lacks reviewed_at ; edit the row or send PATCH /rfp-shredder-requirements/:id with { \"reviewed\": true } to clear the gate. Method Endpoint Permission Description Key Request Fields Key Response Fields POST /rfp-documents/:id/confirm rfp:confirm Confirm requirements; locks the set and sets rfp_confirmed_at . Requires completed status and no unreviewed low-confidence rows. - { rfp_document_id, shred_status: \"confirmed\" } POST /rfp-documents/:id/process rfp:upload Re-queue AI extraction with replace-on-success semantics. - { rfp_document_id, shred_status: \"pending\" } Role gate (NEG-19): only admin and proposal_manager may confirm requirements. writer returns 403 ."
            },
            {
              "id": "15-3-requirements-crud",
              "title": "15.3 Requirements CRUD",
              "text": "15.3 Requirements CRUD Manual requirement writes require rfp:write . Manual rows are appended at MAX(position)+1 over non-deleted requirements for the same rfp_document_id . Method Endpoint Permission Description Key Request Fields Key Response Fields POST /rfp-shredder-requirements rfp:write Add a requirement manually rfp_document_id, requirement_text, category?, is_mandatory? Requirement (201); position is MAX(position)+1 over active rows PATCH /rfp-shredder-requirements/:id rfp:write Edit or mark reviewed requirement_text?, category?, is_mandatory?, reviewed? Updated requirement DELETE /rfp-shredder-requirements/:id rfp:write Soft-delete requirement ( deleted_at set) - 204 No Content"
            },
            {
              "id": "requirement-object",
              "title": "Requirement Object",
              "text": "Requirement Object Field Type Description id UUID Requirement identifier proposal_id UUID Parent proposal rfp_document_id UUID Parent document requirement_text string The extracted or manually-entered requirement category string e.g. \"Technical\" , \"Management\" , \"Past Performance\" is_mandatory boolean Whether compliance is mandatory position number Display order source \"ai\"|\"manual\" Origin deletedAt ISO timestamp | null Soft-delete timestamp"
            },
            {
              "id": "16-compliance-matrix-a2",
              "title": "16. Compliance Matrix (A2)",
              "text": "16. Compliance Matrix (A2) Automatically maps each confirmed RFP requirement to proposal sections. Requires rfp_confirmed_at to be set on the proposal (A1 must be confirmed first)."
            },
            {
              "id": "16-1-generation-retrieval",
              "title": "16.1 Generation & Retrieval",
              "text": "16.1 Generation & Retrieval Method Endpoint Permission Description Key Request Fields Key Response Fields POST /proposals/:proposalId/compliance-matrix/generate compliance_matrix:write Queue AI-powered matrix generation (async). Returns 409 if A1 not confirmed. — { jobId, status: \"queued\" } (202) GET /proposals/:proposalId/compliance-matrix compliance_matrix:read Get current matrix with all items and coverage summary — { items: MatrixItem[], summary: { total, covered, partial, missing } }"
            },
            {
              "id": "16-2-item-management",
              "title": "16.2 Item Management",
              "text": "16.2 Item Management Method Endpoint Permission Description Key Request Fields Key Response Fields PATCH /compliance-matrix-items/:itemId compliance_matrix:write Override item status or assign to a section coverageStatus?, humanStatus?, assignedSectionId?, notes? Updated MatrixItem"
            },
            {
              "id": "matrixitem-object",
              "title": "MatrixItem Object",
              "text": "MatrixItem Object Field Type Description id UUID Item identifier requirementId UUID Linked RFP Shredder requirement requirementText string Requirement text (denormalized for display) assignedSectionId UUID | null Proposal section handling this requirement coverageStatus \"covered\"|\"partial\"|\"missing\" AI-assessed coverage humanStatus \"pending\"|\"verified\"|\"waived\" Human review status notes string | null Reviewer notes"
            },
            {
              "id": "16-3-export",
              "title": "16.3 Export",
              "text": "16.3 Export Method Endpoint Permission Description Key Request Fields Key Response Fields POST /proposals/:proposalId/compliance-matrix/export compliance_matrix:write Queue DOCX or CSV export format: \"docx\"|\"csv\" { exportId, status: \"queued\" } (202) GET /compliance-matrix-exports/:exportId compliance_matrix:read Poll export status; get download URL when ready — { status, downloadUrl?, expiresAt? }"
            },
            {
              "id": "17-autonomous-pipeline-a3",
              "title": "17. Autonomous Pipeline (A3)",
              "text": "17. Autonomous Pipeline (A3) Orchestrates the AI-assisted proposal drafting pipeline: RFP ingestion → requirement extraction → section-by-section AI drafting → compliance check → export. Human gates pause the pipeline for review at configurable checkpoints."
            },
            {
              "id": "17-1-pipeline-runs",
              "title": "17.1 Pipeline Runs",
              "text": "17.1 Pipeline Runs Method Endpoint Permission Description Key Request Fields Key Response Fields GET /proposals/:proposalId/pipeline-runs/latest pipeline:read Get the most recent run for this proposal · 404 if no run started — PipelineRun + steps[] + gates[] POST /proposals/:proposalId/pipeline-runs pipeline:write Start a new pipeline run config?: { tokenBudget?, steps?: string[] } PipelineRun (202) GET /pipeline-runs/:runId pipeline:read Get run with all steps and human gates — PipelineRun + steps[] + gates[] DELETE /pipeline-runs/:runId pipeline:write Cancel a running pipeline — { cancelled: true }"
            },
            {
              "id": "pipelinerun-object",
              "title": "PipelineRun Object",
              "text": "PipelineRun Object Field Type Description id UUID Run identifier proposalId UUID Parent proposal status \"pending\"|\"running\"|\"waiting_gate\"|\"completed\"|\"failed\"|\"cancelled\" Overall run status steps PipelineStep[] Ordered list of pipeline steps currentGate number | null Gate number currently blocking the run (null = not gated) tokenBudget number Max tokens allocated for AI calls in this run tokensUsed number Tokens consumed so far startedAt ISO timestamp When the run began completedAt ISO timestamp | null When the run finished"
            },
            {
              "id": "17-2-human-gates",
              "title": "17.2 Human Gates",
              "text": "17.2 Human Gates Human gates pause the pipeline and require explicit approve/reject before execution continues. Method Endpoint Permission Description Key Request Fields Key Response Fields POST /pipeline-runs/:runId/gates/:gateNumber/approve pipeline:gate Approve the gate — pipeline resumes comments? { approved: true, resuming: true } POST /pipeline-runs/:runId/gates/:gateNumber/reject pipeline:gate Reject the gate — pipeline aborts reason? { rejected: true, runStatus: \"failed\" }"
            },
            {
              "id": "18-competitive-intel-a5",
              "title": "18. Competitive Intel (A5)",
              "text": "18. Competitive Intel (A5) Monitors configured intelligence feeds (SAM.gov award notices, procurement forecasts, competitor filings) and surfaces curated intel items with AI-generated digest summaries. All endpoints are registered under the prefix /intel . Method Endpoint Permission Description Key Request Fields Key Response Fields GET /intel/feeds intel:read List org's configured intel feeds — IntelFeed[] POST /intel/feeds intel:write Create or upsert an intel feed config feedType, name, config: { keywords?, naicsCodes?, agencies?, competitors? } IntelFeed (201) GET /intel/feed intel:read Paginated intel items across all feeds feedType?, bookmarked?, from?, to?, limit?, offset? { items: IntelItem[], total } POST /intel/items/:itemId/bookmark intel:write Toggle bookmark on an intel item — { bookmarked: boolean } GET /intel/digest/latest intel:read Most recent AI-generated digest summary — { digest: IntelDigest, itemCount }"
            },
            {
              "id": "intelitem-object",
              "title": "IntelItem Object",
              "text": "IntelItem Object Field Type Description id UUID Item identifier feedId UUID Source feed feedType \"sam_award\"|\"forecast\"|\"competitor\"|\"news\" Feed category title string Item headline summary string AI-generated summary sourceUrl string | null Original source URL publishedAt ISO timestamp When the item was published bookmarked boolean Whether the requesting user bookmarked it relevanceScore number AI relevance score 0–1"
            },
            {
              "id": "19-teaming-workspace-b7",
              "title": "19. Teaming Workspace (B7)",
              "text": "19. Teaming Workspace (B7) Manages teaming arrangements for a proposal opportunity. Supports partner onboarding, work-share validation, document exchange, and a public partner portal for document uploads without a Pursuite account."
            },
            {
              "id": "19-1-workspace",
              "title": "19.1 Workspace",
              "text": "19.1 Workspace Method Endpoint Permission Description Key Request Fields Key Response Fields GET /opportunities/:opportunityId/teaming teaming:read Get workspace + partners + documents for the opportunity — { workspace, partners[], documents[] } POST /teaming-workspaces teaming:write Create a teaming workspace opportunityId, primeOrgName?, notes? TeamingWorkspace (201)"
            },
            {
              "id": "19-2-partners",
              "title": "19.2 Partners",
              "text": "19.2 Partners Method Endpoint Permission Description Key Request Fields Key Response Fields POST /teaming-workspaces/:workspaceId/partners teaming:write Add a partner (work-share sum must stay ≤ 100%) orgName, role: \"prime\"|\"sub\"|\"mentor\"|\"protege\"?, workSharePercent?, contactEmail?, contactName?, notes? TeamingPartner (201) PATCH /teaming-workspace-partners/:partnerId teaming:write Update partner details / work-share orgName?, role?, workSharePercent?, status?, contactEmail?, contactName?, notes? TeamingPartner POST /teaming-workspace-partners/:partnerId/invite teaming:write Generate and send portal invite link to partner email? (overrides stored contact email) { inviteToken, inviteUrl, expiresAt } Work-share validation: the sum of all active partner workSharePercent values must not exceed 100. A 409 is returned if an add/update would exceed the limit."
            },
            {
              "id": "19-3-documents",
              "title": "19.3 Documents",
              "text": "19.3 Documents Method Endpoint Permission Description Key Request Fields Key Response Fields POST /teaming-documents teaming:write Upload a teaming document (multipart, max 50 MB) Multipart file , workspaceId , partnerId? , documentType? TeamingDocument (201) GET /teaming-documents/:documentId/download teaming:read Get signed download URL (15-min TTL) — { url, expiresAt, fileName }"
            },
            {
              "id": "19-4-partner-portal-public-no-auth-required",
              "title": "19.4 Partner Portal (Public — no auth required)",
              "text": "19.4 Partner Portal (Public — no auth required) These endpoints allow teaming partners to interact with the workspace using only an invite token. No Pursuite account is required. Method Endpoint Auth Description Key Response Fields GET /partner-portal/:inviteToken Public (invite token) Look up workspace and partner details by token { workspace, partner, documents[] } POST /partner-portal/:inviteToken/documents Public (invite token) Partner uploads a document (multipart, max 50 MB) { documentId, fileName, uploadedAt } (201) Invite tokens are single-use per document upload and expire 7 days after generation."
            },
            {
              "id": "20-deltek-propricer-cpq",
              "title": "20. Deltek ProPricer & CPQ",
              "text": "20. Deltek ProPricer & CPQ Connects Pursuite to a Deltek ProPricer server via the ProPricer Bridge microservice — a .NET 8 sidecar that wraps the ProPricer 9.5 SDK (WebSocket/.NET protocol) and exposes a REST+JSON interface. Architecture: Pursuite API ──(REST + JSON + X-Bridge-Key)──▶ ProPricer Bridge (.NET 8) │ (ProPricer SDK / WebSocket) │ ▼ ProPricer 9.5 App Server Security model: ProPricer credentials (username, password, license key) reside only in the bridge's appsettings.json . Pursuite stores only the bridge URL and an AES-256-GCM encrypted bridge API key. Neither credential is ever returned in API responses. Mock mode: the bridge runs in MockMode=true by default, returning realistic canned data — no ProPricer license required for development or testing. Set Bridge:MockMode=false and supply SDK DLLs for real connectivity."
            },
            {
              "id": "20-1-config",
              "title": "20.1 Config",
              "text": "20.1 Config Method Endpoint Permission Description Key Request Fields Key Response Fields GET /deltek/config deltek:read Get org's ProPricer config (keys never returned) — { id, orgId, propriceUrl, bridgeUrl, defaultCostPool, laborRateSource, isActive, lastSyncAt } PUT /deltek/config deltek:write Create or update config (upsert by orgId) propriceUrl?, authToken?, bridgeUrl?, bridgeKey?, defaultCostPool?, laborRateSource?, isActive? Config object (token/key fields omitted) DELETE /deltek/config deltek:write Remove config — 204 No Content bridgeKey and authToken are write-only — always encrypted with AES-256-GCM before storage and never included in any GET response. To update, POST a new value; omit the field to leave the current value unchanged."
            },
            {
              "id": "20-2-health-probe",
              "title": "20.2 Health Probe",
              "text": "20.2 Health Probe Method Endpoint Permission Description Key Response Fields GET /deltek/health deltek:read Test bridge/ProPricer connectivity. Uses bridge when bridgeUrl is set; falls back to direct HTTP probe otherwise. { reachable, proPricerReachable?, mockMode?, latencyMs, bridgeMode, lastSyncAt, reason? }"
            },
            {
              "id": "health-response-fields",
              "title": "Health response fields",
              "text": "Health response fields Field Type Description reachable boolean Bridge (or direct endpoint) is reachable proPricerReachable boolean ProPricer Application Server is reachable via the bridge (bridge mode only) mockMode boolean Bridge is running in mock mode (bridge mode only) latencyMs number | null Round-trip latency in ms bridgeMode boolean true when using the bridge, false for legacy direct probe lastSyncAt ISO timestamp | null Timestamp of last successful probe or sync reason string Error message when reachable=false"
            },
            {
              "id": "20-3-bridge-sync-new-in-v2-0",
              "title": "20.3 Bridge — Sync (NEW in v2.0)",
              "text": "20.3 Bridge — Sync (NEW in v2.0) Method Endpoint Permission Description Key Request Fields Key Response Fields POST /deltek/sync deltek:write Pull all resource rates from the bridge and upsert into propricer_labor_rates . Requires bridgeUrl to be configured. Timeout: 30 s. — { upsertedRates, resourceRatesSynced, burdenTablesSynced, syncedAt } Returns 400 if no bridgeUrl is configured. Returns 502 if the bridge is unreachable or returns an error. A sync audit event ( deltek.sync_completed ) is written to the org audit log."
            },
            {
              "id": "20-4-bridge-proposals-new-in-v2-0",
              "title": "20.4 Bridge — Proposals (NEW in v2.0)",
              "text": "20.4 Bridge — Proposals (NEW in v2.0) Method Endpoint Permission Description Key Request Fields Key Response Fields GET /deltek/proposals deltek:read List proposals available in the ProPricer workspace via bridge. — { data: ProposalSummary[], count } GET /deltek/proposals/:name/:version deltek:read Get proposal detail with tasks and resource assignments. Returns 404 if not found in ProPricer. — { data: ProposalDetail }"
            },
            {
              "id": "proposalsummary-object",
              "title": "ProposalSummary Object",
              "text": "ProposalSummary Object Field Type Description name string Proposal name as stored in ProPricer version string Proposal version description string | null Proposal description totalCost number | null Total contract value currency string Currency code (e.g. \"USD\" )"
            },
            {
              "id": "proposaldetail-object",
              "title": "ProposalDetail Object",
              "text": "ProposalDetail Object Extends ProposalSummary with: Field Type Description tasks ProposalTask[] Ordered list of tasks/CLINs Each ProposalTask contains: Field Type Description name string Task name (e.g. \"Base Year\" , \"Option Year 1\" ) description string | null Task description totalCost number | null Task total cost resourceAssignments ResourceAssignment[] Labor assignments Each ResourceAssignment contains: Field Type Description laborCategory string Labor category (LCAT) name hours number Hours assigned hourlyRate number Direct hourly rate totalCost number hours × hourlyRate"
            },

mplete { assemblyStatus, updatedAt } 40 GET /proposals/:proposalId/exports/:exportId/download Retrieve signed download URL { url, expiresIn, fileName, format } 41 POST /reports/opportunities/:id/debrief Submit win/loss debrief after award decision Debrief 42 POST /auth/refresh Renew accessToken before 8-hour expiry — schedule proactively throughout { accessToken, expiresIn }"
