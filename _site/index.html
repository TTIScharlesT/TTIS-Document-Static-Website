oposals due within seven days, with days remaining. My Work — tasks assigned to you (for example, a bid decision, a section to write, or a section to review). Click a task to go straight to it. If you have none, you'll see \"You're all caught up.\" Deals by Stage — your CRM funnel across Lead, Qualified, Proposal, Negotiation , with counts, values, and win rate. Account Health — a breakdown of accounts by letter grade (A–F) and the average score out of 100. Review Team Productivity (when enabled). Two tables show Writer Sections (active, in review, and completed sections per writer) and Proposal Managers (active proposals per manager). Your own row is highlighted. Act on Pending Bid/No-Bid Reviews (when enabled). If bid/no-bid scores are waiting for your review, this amber panel lists them with their weighted score and who scored them. Click one to open its bid/no-bid review. Use Quick Access. The tile row at the bottom links to Opportunities, Proposals, Win / Loss Report, Proposal Templates, SAM.gov Monitors, and Compliance . What success looks like. You land on Home with your name in the banner, the KPI cards populated, and the panels you enabled showing current figures. If something goes wrong. Panels show \"No data yet\" or \"—\". You have no records of that type yet (for example, no closed bids means no win rate). The panel fills in as you add and close work. A KPI card won't click. Only some cards are links; the rest are display-only. A panel you wanted is missing. Open the Home settings gear and re-enable it under Visible Widgets . Tips & things to watch for. Win rate and trend only appear once bids have closed as won, lost, or no-bid. \"Proposals Due Soon\" counts only proposals that are not yet submitted and are due within seven days. Your widget choices are per-device, so a different computer may show a different layout. Related sections. From Home you'll most often move to Pipeline , Proposals , Accounts , or the Win-Loss report ."

            {
              "id": "2-1-accounts",
              "title": "2.1 Accounts",
              "text": "2.1 Accounts What it's for. Accounts is your customer relationship list — the organizations you do business with or pursue. Each account gathers its contacts, opportunities, and interactions in one place, and carries a health grade so you can see at a glance which relationships are strong and which need attention. Who can use it. All roles can open Accounts and view the list and account details. Creating, editing, deleting, and importing accounts require Proposal Manager or higher. Read-Only, Writer, and Executive Approver users see the list but not the + New Account , Import CSV , Edit , or Delete controls. Step by step. Find an account. Use the Search accounts… box to search by name, and the Filter by industry… box to narrow by industry. The list updates as you type and resets to the first page. Read the table. Columns are Name, Industry, Location, Employees, Health, Created . Click a Name to open that account's detail page. Refresh a health grade. In the Health column, click the small circular-arrow button next to a grade to recalculate that account's health score. You'll see \"Health score refreshed.\" Create an account (Proposal Manager+). Click + New Account . In the New Account dialog, complete the fields: Name (required). Industry , Website , Primary Location (optional). Employee Count , Annual Revenue ($) (optional, numbers). If a similar name already exists, Pursuite shows \"Similar accounts already exist\" with links so you can avoid duplicates. Click Create Account to save; you'll see \"Account \"…\" created.\" Import accounts from a spreadsheet (Proposal Manager+). Click Import CSV . In the Import Accounts from CSV dialog: Choose your CSV File (it needs a header row and at least one data row). Map your columns to the account fields Name, Industry, Website, Phone, Email . Name is required; set any field you don't have to — Skip — . Matching columns are mapped automatically. Review the Preview (first 3 rows) and the total row count, then click Import . When it finishes you'll see how many accounts were created and any errors. Click Done . Edit an account (Proposal Manager+). Click Edit on a row and change any field in the Edit Account dialog, then Save Changes . Delete an account (Proposal Manager+). Click Delete , then confirm in the Delete Account dialog. Deleting an account also removes its contacts, opportunities, and interactions. Move through pages. Accounts are shown 25 per page. Use ← Prev , the page numbers, and Next → at the bottom. What success looks like. New or edited accounts appear in the list immediately, with a confirmation message. Imported accounts appear with a created-count summary. Deleted accounts disappear from the list. If something goes wrong. \"Name is required.\" The account name is blank — enter a name before saving. \"Similar accounts already exist.\" A close match was found. Open the linked account to check before creating a duplicate. \"You must map the Name column.\" During CSV import you didn't assign a column to Name — map it, then import. \"No valid rows to import.\" None of your rows had a name in the mapped Name column — check your file and mapping. No + New Account , Edit , or Delete buttons. Your role is below Proposal Manager; ask an Admin or Proposal Manager to make the change. Tips & things to watch for. Health grades show only after a score has been calculated; use the refresh button on a row to generate one. Search needs at least three characters to check for duplicates while you type a new name. Deleting an account is far-reaching — it removes everything linked to it. Export or note anything you need first. Related sections. Open an account to reach its contacts and opportunities; roll-ups of this data appear in CRM Reports and on Home ."

e report. Numbers look stale. Click Refresh . Tips & things to watch for. Health scores are calculated nightly or on demand; if a grade is missing, recalculate it from the Accounts screen. The Open Stage Breakdown total covers only the open stages (Lead, Qualified, Proposal, Negotiation), so it won't match counts that include Won/Lost. Related sections. Drill into a deal via Accounts ; for bid/proposal outcomes (won/lost) see Analytics and the Win-Loss report ."

              "id": "2-3-pipeline",
              "title": "2.3 Pipeline",
              "text": "2.3 Pipeline What it's for. The Pipeline (titled Opportunity Pipeline ) is your working list of federal and other pursuits — every solicitation you're tracking, from first identified through award or loss. You filter, sort, and view it the way that suits you, move pursuits through their stages, and create new ones quickly from an email or an RFP file. Who can use it. All roles can view the Pipeline and open any opportunity. Editing, deleting, closing out, moving stages, and bulk actions require Proposal Manager or higher. Recording an approved bid/no-bid decision is reserved for Executive Approver or higher (see Bid / No-Bid decision ). Step by step. Choose a view. Use the view toggle (top right) to switch between list , kanban , and timeline : List — a sortable, paged table (50 per page). Sort by Date Added, Due Date, Value, or Name . Kanban — columns by stage; drag a card to another column to change its stage (Proposal Manager+). Timeline — pursuits grouped by the month they're due, with a \"No Due Date\" group at the end. Search and filter. Type in Search name or agency… . Open the Filters panel on the left to narrow by: Stage — tick any of Identified, Qualifying, Active, In Review, Submitted, Award Pending, Won, Lost, No Bid . Bid Type — All Types, Federal, SLED, Commercial. Set-Aside — Any Set-Aside, 8(a), HUBZone, SDVOSB, VOSB, WOSB, Small Business, Unrestricted. NAICS Code , Est. Value Range (Min/Max), and Response Due (From/To). A count shows how many filters are active; click Clear to reset. Selected stages also appear as removable chips above the list. Create from an email. Click ✉️ From Email , paste the solicitation email, and click Parse Email . Pursuite extracts fields it recognizes (name, agency, solicitation number, value, due date, NAICS, set-aside, source). Review the extracted fields, then click Use Extracted Data → to open the New Opportunity form pre-filled for your check, and Add to Pipeline . Create from an RFP file. Click 📄 From RFP (or drag a PDF/DOCX anywhere onto the page — a \"Drop RFP to create opportunity\" overlay appears). Pursuite pre-fills the create form from the file name. Import many at once. Click Import to open the import wizard and bring in a batch of opportunities. Fill the New Opportunity form. Required fields are Opportunity Name and Agency / Customer . Optional fields include Account , Bid Type (Federal/SLED/Commercial), Set-Aside , Solicitation # , NAICS Code , Est. Value ($) , Response Due , and Source . Click Add to Pipeline ; you'll see \"… added to pipeline.\" Act on a row (Proposal Manager+). Each list row offers Edit , Delete , and — for pursuits that are Submitted or Award Pending — Close Out . Click a row's name to open the opportunity detail . Work in bulk (Proposal Manager+). Tick the checkboxes (or Select all ). A bulk bar appears: choose Move to stage… and click Apply , click Export CSV , or Delete the selected records (with a confirm step). Export. With nothing selected, Export CSV from the bulk bar exports your current filtered list; with rows selected, it exports just those. What success looks like. New pursuits appear in the list with a confirmation message; stage changes, edits, and deletions take effect immediately; the count under the title shows the total and notes when the list is filtered. If something goes wrong. \"Name is required.\" / \"Agency is required.\" Fill both required fields before saving. \"Limited data extracted…\" during email intake — the email didn't contain much Pursuite could recognize; fill the rest in by hand on the next step. \"Failed to move opportunity.\" A stage change was rejected; check whether the pursuit conflicts with the target stage and try again. No Edit/Delete/Close Out buttons, or drag doesn't move cards. Your role is below Proposal Manager. \"No opportunities match your filters.\" Loosen or clear the filters with Clear all filters . Tips & things to watch for. Due dates flag automatically: overdue shows in red, due within seven days in amber. Kanban and timeline load up to 200 matching pursuits at once for layout; list view is paged at 50. Always review extracted fields from email/RFP intake — pre-fill is a starting point, not a guarantee, especially for an amended solicitation or one missing its NAICS/set-aside. The empty Pipeline suggests creating opportunities from a contact so they stay linked to the right account. Related sections. Open a pursuit to reach the opportunity detail ; score a pursuit in Bid / No-Bid decision ; after award/loss, see Analytics ."

              "text": "2.3.1 Opportunity detail What it's for. The detail page is the full record for a single pursuit: its stage and key facts, its documents, its bid/no-bid decisions, the proposals and quotes attached to it, any teaming workspace, and a history of how its status changed over time. Who can use it. All roles can open and read the detail. Editing, changing the stage, uploading documents, creating a proposal, and managing teaming require Proposal Manager or higher. Recording decisions requires Executive Approver or higher. Step by step. Open a pursuit. Click its name anywhere in the Pipeline. The header shows the name, reference ID, agency, bid type, and current status, with a stage-progress bar beneath. Move between tabs. The tabs are Overview, Documents, Decision History, Proposals, Quotes, Teaming, and Timeline (Documents, Proposals, and Quotes show a count). Change the stage (Proposal Manager+). On Overview , use the Current Stage selector to move the pursuit; you'll see \"Stage updated to ….\" Edit key facts (Proposal Manager+). Click Edit to change name, agency, bid type, solicitation number, NAICS code, set-aside, estimated value, response due, and source. Manage documents (Proposal Manager+). On Documents , upload files — only PDF (.pdf) and Word (.docx / .doc) are accepted, up to 50 MB . Download links refresh if they expire. Start a proposal (Proposal Manager+). On Proposals , create a proposal workspace for this pursuit. This is locked until an Approved bid/no-bid decision exists — until then you'll see \"Proposal creation is locked.\" Review decisions. Decision History lists each bid/no-bid record with its weighted score and outcome. Executive Approvers can record the formal decision here. Set up teaming (Proposal Manager+). On Teaming , create a teaming workspace and Add Teaming Partner (Company Name is required; CAGE Code, UEI, Contact Name, Contact Email, Role / Scope, and Work-Share % are optional). You can invite partners and share specific documents with them. See linked quotes and history. Quotes lists pricing quotes tied to the pursuit; Timeline shows the status history in order. What success looks like. Each change shows a confirmation (\"Stage updated…\", \"… uploaded.\", \"Opportunity updated.\", \"Partner added.\"), and the tab counts update to match. If something goes wrong. \"Proposal creation is locked.\" You need an Approved bid/no-bid decision first — score and approve the pursuit, then return. \"Only PDF (.pdf) and Word (.docx / .doc) files are accepted (max 50 MB).\" Convert or shrink the file and try again. \"Failed to update stage.\" The stage change was rejected; pick a valid next stage. Edit/upload/stage controls are missing. Your role is below Proposal Manager. Tips & things to watch for. A teaming partner's combined work-share across partners cannot exceed 100%. Documents shared with partners are clearly marked \"Shared with partners.\" Related sections. Score the pursuit in Bid / No-Bid decision ; when it's submitted, close it out ; build its bid in Proposals ."

              "id": "2-3-2-bid-no-bid-decision",
              "title": "2.3.2 Bid / No-Bid decision",
              "text": "2.3.2 Bid / No-Bid decision What it's for. The Bid/No-Bid screen helps your team decide whether a pursuit is worth bidding. Each reviewer rates the pursuit against weighted criteria; the system produces a single weighted score, and scores at or above the bid threshold are escalated to Executive Approvers for a formal decision. Who can use it. Anyone who can open the pursuit can submit a score. Recording the formal approve / decline / more-info decision is reserved for Executive Approver or higher. Editing the org-wide scoring criteria is done from this screen too. Step by step. Open the form. From the pursuit (or from Home's Pending Bid/No-Bid Reviews ), open Bid / No-Bid Scoring . Review prior scores. If teammates have already scored, their scores, comments, and decisions appear at the top, along with an averaged consensus score and whether it meets the threshold. Score each criterion. For every criterion, rate it 1–5 and adjust its weight . The Weighted Total Score gauge updates as you go. Add comments (optional). Use the Comments box (up to 2,000 characters) to note context, risks, or a recommendation. Save or load weighting templates. Use ⚙ Templates to save the current weights under a name, or load a saved set. Manage criteria (optional). Click Manage Criteria to open Manage Scoring Criteria , where you add or remove criteria and set each weight. Criteria are org-wide and apply to all future scoring forms; each needs a lowercase, snake_case key and a label. If the weights don't total 100%, they're normalized automatically. Submit. Click Submit Score (or Submit & Notify Approvers when the score meets the threshold). You'll see a confirmation and return to the pursuit. Record the decision (Executive Approver+). When submissions exist, an approval panel lets an approver record Approved , Declined , or More Info . What success looks like. Your score is saved and appears in the team list; if it met the threshold, Executive Approvers are notified. An approver's decision shows as ✅ Approved , ❌ Declined , or ⏳ More Info on the pursuit's Decision History. If something goes wrong. \"Failed to submit scoring form.\" Try again; if it persists, confirm criteria are loaded. No approval controls. Recording the formal decision needs Executive Approver or higher. Submit is disabled. There are no scoring criteria yet — add some via Manage Criteria . Tips & things to watch for. An Approved decision is what unlocks proposal creation on the pursuit. Editing criteria changes the form for everyone in your organization, not just this pursuit. Related sections. Return to the opportunity detail ; after an approval, create the bid in Proposals ."

posals are created against a pursuit from Pipeline ."

              "text": "2.4.2 The proposal workspace What it's for. The workspace is the home for a single proposal: an outline of volumes and sections on the left, a section editor in the center, and a toolbar of specialized panels (RFP requirements, compliance, AI pipeline, pricing, presentations, and more) across the top. Who can use it. All roles can open a workspace. Managing structure (volumes, sections, status, locks, export, templates, the kickoff wizard) requires Proposal Manager or higher. Writers can edit the sections they're assigned. Some panels involve Executive Approver sign-off (noted in their subsections). Step by step. Get your bearings. The left outline shows the proposal name, a status control, the due date, and an Est. cost button. The center is the editor; the top bar holds the breadcrumb ( ← Opportunity ) and the panel buttons. Set the status (Proposal Manager+). Use the status selector to move the proposal through Draft, In Progress, Under Review, Approved, Submitted, and Archived . Build the structure (Proposal Manager+). Click Add volume (e.g., \"Technical Approach\"). Inside a volume, click the + to Add Section — give it a Section title (required) and, optionally, Instructions , a Page limit , and a Due date . Open a section. Click any section in the outline to edit it (the first section opens automatically). See Section Editor and AI drafting . Lock or unlock a section (Proposal Manager+). Use the lock toggle (🔒/🔓) on a section row to freeze its content as read-only or release it. Assign a writer. With a section open, click Assign in the top bar and pick a person. If they aren't on the team yet, they're added automatically as a Writer. Track cost. Click Est. cost to open the cost panel — see the current estimate, ✏ Update Estimate (amount and optional note), any Linked Quotes , and the change history. Open a specialized panel. From the top bar: 📄 RFP (RFP Shredder), 📋 Matrix (Compliance Matrix), 🤖 Pipeline (Autonomous Pipeline), 🎯 Win Themes , 💰 Pricing , 📊 Presentation , 💬 Ask , 💬 Discussion , 📅 Timeline , 📋 Debrief , 🧮 Calculator , and (Proposal Manager+) ✨ Kickoff wizard and 📋 Save as Template . Manage the team. Click Team (n) to open the workspace team. Assemble and export (Proposal Manager+). Use Assemble & Export at the bottom of the outline; once assembled it becomes ↓ Download / Export . What success looks like. Volumes and sections appear in the outline; status, locks, assignments, and cost changes each show a confirmation; the chosen panel slides in. If something goes wrong. \"Failed to load proposal workspace.\" Reopen from the proposals list; the proposal may have been removed. Structure/status/export controls are missing. Your role is below Proposal Manager. \"This section is locked by a Proposal Manager. Content is read-only.\" Ask a Proposal Manager to unlock it. \"Your workspace is empty.\" No volumes yet — add one (or start the proposal from a published template). Tips & things to watch for. 🧮 Calculator opens this proposal in the cost calculator and writes the result back as the estimated cost. 📋 Save as Template creates a draft template from this proposal's sections; an Admin must publish it before others can use it. Related sections. Edit content in the Section Editor ; finish with Export ."

              "text": "2.4.3 RFP Shredder What it's for. The RFP Shredder reads your solicitation and pulls out the individual requirements so you don't have to transcribe them by hand. Confirming the requirement set unlocks the Compliance Matrix and the Autonomous Pipeline. Who can use it. Available from the workspace ( 📄 RFP ) to those who can manage the proposal. Step by step. Open it. Click 📄 RFP in the workspace top bar. Upload the solicitation. Upload a PDF or DOCX (up to 50 MB ). The assistant extracts requirements automatically. Review the requirements. Each extracted requirement shows a confidence percentage and a category. Edit the text or category, Add Requirement for anything missed, or delete ones that don't apply. Low-confidence rows show Review required and must be edited or marked reviewed before confirmation. Re-process if needed. Use the reprocess action to run extraction again. The existing visible requirements stay in place if the new extraction fails; they are replaced only after the new run succeeds. Confirm. Click Confirm Requirements . You'll see \"Requirements confirmed! Compliance Matrix and Pipeline are now available.\" What the AI assistant does here. The Shredder reads your uploaded solicitation document and produces a list of discrete requirements, each tagged with a category and a confidence score, drawn from the text of that document. You review, edit, add, or remove entries before confirming. Treat low-confidence items as a prompt to check the wording against the source, and add anything the assistant missed. What success looks like. A confirmed requirement set, and the 📋 Matrix and 🤖 Pipeline panels become usable. If something goes wrong. \"Only PDF and DOCX files are supported.\" / \"File exceeds the 50 MB limit.\" Convert or shrink the file. \"Upload failed. Please try again.\" Retry the upload. \"Review low-confidence requirements before confirming.\" Edit each flagged row or mark it reviewed, then confirm again. \"Failed to confirm requirements.\" Try again; nothing is lost. Tips & things to watch for. For an amended solicitation, re-upload or re-process the latest version and re-confirm so the matrix and pipeline use the current requirements. If an RFP is classified as CUI, an administrator must allow external CUI processing before the shredder can send that document to the AI provider. Related sections. Feeds the Compliance Matrix and the Autonomous Pipeline ."

              "text": "2.4.5 Section Editor and AI drafting What it's for. The Section Editor is where you write each section of the proposal, with autosave, version history, reusable library content, and an AI drafting assistant that can produce a first draft for you to refine. Who can use it. Anyone with access to the section. Locked sections are read-only until a Proposal Manager unlocks them. Step by step. Write. Use the formatting toolbar — Bold, Italic, Underline, Heading 1–3, Bullet list, Numbered list, Block quote, Code block, Undo, Redo . Your work autosaves a few seconds after you stop typing; you can also press Ctrl+S / Cmd+S . The status reads Saving… , Saved , Unsaved changes , or Save failed . A live word count , page estimate, and target appear in the header. Rename or delete (when unlocked). Use the pencil to rename the section, or the trash icon to delete it (with a confirm). Insert reusable content. Click + Library to open Insert from Library , search approved content by type (Company Overview, Technical Approach, Past Performance, Key Personnel, Boilerplate, Other), preview it, and Insert . Draft with AI. Click ✨ AI Draft to open the assistant. Set the Tone (Formal, Persuasive, Technical), drag the Target Length slider (50–1,000 words), and optionally add Context / Notes . Click ✨ Generate draft (or ↺ Regenerate ; ⏹ Stop generating to halt). Review the draft and its checks. The result shows a confidence percentage and a grounded percentage (how much of the specific factual content traces to a source). Any unverified claims are listed and, if you insert, marked inline as \"[unverified: not found in source].\" Insert it. Click Append to section or Replace section . The draft is added and saved, and an AI Draft · n% confidence badge appears on the section until you dismiss it. Use version history. Click History to see every saved version (with author, time, and AI/grounding badges) and Restore any of them — restoring creates a new version, so nothing is lost. What the AI assistant does here. Given the section title, your chosen tone and length, any notes you add, and the proposal's approved source material, the assistant writes a draft for that section. It reports how confident it is and how much of the draft's specific claims (clause numbers, codes, dates, figures) it could trace to a source, and it flags claims it could not verify. Always read the draft, check flagged or low-grounding items against the solicitation and your library, and edit before relying on it. You decide whether to append or replace. What success looks like. Your content saves automatically (\"Saved\"), inserted drafts carry a confidence badge, and version history records each change. If something goes wrong. \"Save failed.\" Check your connection; your latest text stays in the editor — press Ctrl/Cmd+S to retry. AI Draft shows an error or returns nothing. AI drafting may not be configured for your organization — an Admin sets up the AI provider (see Guided Setup and Admin ). Try again once it's connected. \"⚠ … little approved source material was found.\" The request asked for specifics that aren't in your sources — verify clause numbers, dates, and figures by hand before submitting. Editing is blocked. The section is locked; ask a Proposal Manager to unlock it. Tips & things to watch for. The page estimate assumes roughly 275 words per page; if a section has a page limit, the word count turns red when you exceed the target. The AI Draft is a starting point — never submit a generated draft without checking its flagged claims and grounding. Related sections. Reusable content comes from the Content Library ; coverage is checked in the Compliance Matrix ."

or. The human gates exist so you can catch problems early — don't approve a gate without reading the output. Related sections. Depends on RFP Shredder ; produces content you refine in the Section Editor ."

              "text": "2.4.10 Ask panel What it's for. The Ask panel answers plain-language questions about this opportunity — page limits, applicable FAR clauses, submission details — with answers grounded in your documents and shown with citations. Who can use it. Available from the workspace ( 💬 Ask ). Step by step. Open it. Click 💬 Ask . Ask a question. Type a question (for example, \"What is the page limit for the technical volume? Which FAR clauses apply?\"). Read the answer. The answer is returned with citations, and a figure shows the share of factual claims traceable to a cited source. What the AI assistant does here. The assistant answers your question using this opportunity's documents (such as your uploaded solicitation and related records) and cites where each answer comes from. It also indicates how much of the answer is traceable to a cited source. When that share is low, or a citation is missing, verify the answer against the source document before acting on it. What success looks like. A cited answer to your question with a traceability indicator. If something goes wrong. No answer or a low-traceability result. The documents may not contain the answer — check the solicitation directly, and confirm AI is configured for your organization. Tips & things to watch for. Always open the cited source for anything you'll rely on in the proposal — citations point you to it. Related sections. Works alongside the RFP Shredder and Compliance Matrix ."
            },
            {
              "id": "2-4-11-discussion-team-timeline-export-and-debrief",
              "title": "2.4.11 Discussion, Team, Timeline, Export, and Debrief",
              "text": "2.4.11 Discussion, Team, Timeline, Export, and Debrief These workspace panels round out collaboration, scheduling, delivery, and post-award review. Discussion (💬 Discussion). A proposal-wide comment thread. Post messages and use @mentions to notify teammates. Available to anyone in the workspace. Team (Team (n)). Opens the Workspace Team . Add members and set each person's workspace role; update or change roles later. Managing the team is a Proposal Manager action; assigning a section also adds that person as a Writer automatically. Timeline (📅 Timeline). A schedule view of sections and their due dates across the proposal, so you can see what's due when relative to the proposal deadline. Export (Assemble & Export / ↓ Download). Opens Document Assembly & Export (Proposal Manager+). Click to assemble the proposal into a document — you'll see \"Document assembly queued. This page will update when ready.\" The panel warns about coverage gaps (for example, a win theme not addressed in any section); if sections aren't approved, a manager can tick the override to allow export anyway. Past exports appear in the export history. The assembly state (queued, running, assembled, failed) also shows on the proposals list. Debrief (📋 Debrief). Opens Post-Award Debrief to record what you learned after award — the awardee, the award value, feedback from the contracting officer or evaluators, and noted strengths and weaknesses. Submit a record to keep it with the proposal. If something goes wrong. Export controls are missing. Export and the override are Proposal Manager actions. \"No exports yet. Assemble the document first.\" Run an assembly before downloading. Coverage warning on export. Address the flagged win themes or sections, or (as a manager) acknowledge the override deliberately. Related sections. Debrief complements the pursuit-level close-out ; export delivers the finished bid."
            },
            {
              "id": "3-quoting",
              "title": "3. Quoting",
              "text": "3. Quoting The Quoting group is where you build priced quotes for your bids: a reusable Catalog of cost items, and Quotes with a CLIN-based pricing builder."
            },
            {
              "id": "3-1-catalog",
              "title": "3.1 Catalog",
              "text": "3.1 Catalog What it's for. The Catalog (titled CPQ — Product Catalog ) holds your reusable cost items — labor categories, ODCs, and other elements — with their unit prices and burden rates, so you can drop them into quotes instead of re-entering rates each time. Who can use it. This item is visible in the sidebar to Admin and Proposal Manager only. Everyone who can see it can view the catalog; creating, editing, archiving, and deleting items require Proposal Manager or higher. Step by step. Browse. The table lists items with Code, Description, Category, Unit, Base Price, Burden Rate, Status . Filter by category (Labor, ODC, Subcontract, Material, Travel, Other) and tick Show archived to include inactive items. Add an item (Proposal Manager+). Click + Add Item . In Add Catalog Item , complete the required fields Item Code , Category , Description , Unit , and Base Price ($) ; optionally set Burden Rate (%) , Escalation Rate (%) , and Notes . Click Add Item . Edit an item (Proposal Manager+). Click Edit on a row, change any field, and Save Changes . Archive or delete (Proposal Manager+). Archive makes an item inactive (it stays for history); Delete removes it permanently after a confirmation. What success looks like. New and edited items appear in the table with a confirmation; archived items show an \"Archived\" status; deleted items disappear. If something goes wrong. Required field empty. Item Code, Category, Description, Unit, and Base Price are required. \"Failed to save catalog item.\" / \"Failed to delete item.\" Try again. No add/edit/delete buttons, or the item isn't in your sidebar. Your role is below Proposal Manager. Tips & things to watch for. Burden and escalation rates are entered as percentages; the unit price and burden flow into quotes when you pick a catalog item there. Related sections. Catalog items feed line items in the Quote Builder ."
            },
            {
              "id": "3-2-quotes",
              "title": "3.2 Quotes",
              "text": "3.2 Quotes What it's for. Quotes (titled CPQ — Quotes ) is the list of all pricing quotes. Each quote captures a contract type and total value and links to a pursuit; you build the detailed pricing in the builder. Who can use it. All roles can view the list and open the builder. Creating a quote opens it in the builder; deleting a quote requires Proposal Manager or higher. Step by step. Browse. The table shows Quote Name, Status (Draft, Final, Submitted, Accepted, Expired), Contract Type, Total Value, Created, Opportunity, Actions . Create a quote. Click + New Quote . Enter a Quote Name (required), pick a Contract Type (FFP, T&M, CPFF, IDIQ, BPA, CPAF), and optionally link an Opportunity (type at least two characters to search). Click Create Quote — you land in the builder. Open the builder. Click Open Builder on any row. Delete a quote (Proposal Manager+). Click Delete and confirm. What success looks like. New quotes are created and open in the builder; the list shows status and total value for each. If something goes wrong. \"Failed to create quote.\" / \"Failed to delete quote.\" Try again. No Delete button. Your role is below Proposal Manager. Related sections. Configure pricing in the Quote Builder ; a quote can link to an opportunity and a proposal ."
            },
            {
              "id": "3-2-1-quote-builder",
              "title": "3.2.1 Quote Builder",
              "text": "3.2.1 Quote Builder What it's for. The builder is where you structure a quote's pricing using CLINs and line items, set contract terms, link the quote to an opportunity and a proposal, and export the result. It computes burdened prices and a total quote value as you go. Who can use it. All roles can open the builder; deleting the quote requires Proposal Manager or higher. Step by step. Open and rename. Open a quote from the Quotes list. Click the quote name (top left) to edit it. Set quote terms. In Quote Settings (left panel), set the Contract Type , Option Years , and Fee Percentage (%) , then save. Link to an opportunity. Use Link Opportunity (search by name or agency) to associate the quote with a pursuit; unlink at any time. Link to a proposal. Use Link Proposal (filter by name or number) so the quote's total cost auto-syncs to that proposal when you recalculate. Add CLINs. In the CLINs panel, click + Add CLIN and give it a CLIN Number , Period , and Description . Add line items. Within a CLIN, Add Line Item — pick a catalog item or enter a Description , Qty , Unit , Unit Price ($) , and Burden Rate (%) . The builder shows the burdened price and amount per line, a CLIN total, and the overall Total Quote Value . Export. Click Export CSV to export the quote (columns include CLIN, Period, Description, Line Item, Qty, Unit, Unit Price, Burdened Price, Amount). Finalize. While the quote is a draft, click Finalize Quote to lock it as final. Delete (Proposal Manager+). Use Delete Quote to remove it. What success looks like. CLINs and line items appear with burdened amounts, the total value updates live, and a linked proposal's estimated cost syncs on recalculate. If something goes wrong. \"Failed to add CLIN.\" / \"Failed to add line item.\" Try again; check required fields. Total isn't reaching the proposal. Make sure the quote is linked to the proposal — the cost syncs on recalculate. No Delete Quote button. Your role is below Proposal Manager. Tips & things to watch for. Picking a catalog item pre-fills its unit price and burden rate, keeping quotes consistent with your Catalog. A finalized quote reflects a locked pricing state — finalize when the numbers are settled. Related sections. Rates come from the Catalog ; linked quotes appear on the opportunity detail and in the proposal cost panel (see the proposal workspace )."
            },
            {
              "id": "4-resources",
              "title": "4. Resources",
              "text": "4. Resources The Resources group gathers the cross-cutting tools you use across pursuits and proposals: analytics, the cost calculator, compliance, your content library, custom dashboards, market intel, and proposal templates."
            },
            {
              "id": "4-1-analytics",
              "title": "4.1 Analytics",
              "text": "4.1 Analytics What it's for. Analytics (titled Reports ) gives you win/loss analytics and pipeline health across all opportunities, plus a view of how your win themes perform. Who can use it. All roles. Figures reflect your organization's opportunities and proposals. Step by step. Open it. Select Analytics in the sidebar. Use the tabs. Switch between Pipeline and Win Theme Analytics . Read the Pipeline tab. KPI cards show Total Opportunities (with open count), Win Rate (with closed count), Avg Days to Close , and Pipeline Value , followed by stage breakdowns and bid/no-bid analytics. Read Win Theme Analytics. See which win themes are tracked and how they relate to outcomes. (Themes are added on proposals and analyzed once proposals close as won or lost.) Open the Win-Loss report. For the dedicated win/loss view, use the Win / Loss Report tile on Home, or see Win-Loss report . What success looks like. Cards and charts populate with current figures; tabs switch between pipeline and win-theme views. If something goes wrong. \"Failed to load report data.\" Click Retry ; if it persists the service may be temporarily unavailable. \"No win theme data yet.\" Add win themes to proposals and close them as won/lost to build analytics. Related sections. Deeper outcome detail is in the Win-Loss report ; CRM-side analytics are in CRM Reports ."
            },
            {
              "id": "4-1-1-win-loss-report",
              "title": "4.1.1 Win-Loss report",
              "text": "4.1.1 Win-Loss report What it's for. The Win/Loss report (titled Win / Loss Analytics ) focuses on closed outcomes — totals, contract value won and lost, monthly trends, win rate over time, and writer workload. Who can use it. All roles. Step by step. Open it. Use the Win / Loss Report tile on Home. Use the tabs. Switch between Overview and Workload . Read the Overview. KPI cards include Total Closed (last 24 months), Won Contract Value , and Lost Contract Value , with Monthly Outcomes — Last 24 Months , an Outcome Breakdown table, and Monthly Win Rate — Last 12 Months . Read the Workload tab. See Writer Workload — Active Proposals across the team. What success looks like. The charts and tables reflect your closed pursuits and current writer load. If something goes wrong. Empty charts. You have no closed outcomes yet — close pursuits as won/lost/no-bid (see close-out ). Related sections. Outcomes are recorded at close-out ; related analytics in Analytics ."
            },
            {
              "id": "4-2-calculator",
              "title": "4.2 Calculator",
              "text": "4.2 Calculator What it's for. The Calculator is a guided cost/price model — set up a project, build labor, configure burden and other costs, compare scenarios, and export — and it can send a total back to a proposal as its estimated cost. Who can use it. All roles. When opened from a proposal (via 🧮 Calculator in the workspace), it's pre-filled and can post the total back. Step by step. Open it. Select Calculator in the sidebar (or open it from a proposal). Work through the numbered tabs: 1. Project Setup 2. Labor Builder 3. Burden Config 4. Other Costs 5. Proposal Summary 6. Scenarios 7. Tracking 8. Save & Export Save and export. Use Save & Export to keep the model and export the results. Send the total to a proposal. When launched from a proposal, use Send Total to Proposal to write the calculated cost back as that proposal's estimated cost (you'll see a confirmation in the proposal). What success looks like. A complete cost model with a summary total; when sent to a proposal, the proposal's estimated cost updates (\"Updated from Calculator\"). If something goes wrong. The total didn't reach the proposal. Open the Calculator from the proposal's 🧮 Calculator button so the two are linked, then use Send Total to Proposal . Tips & things to watch for. The tabs are meant to be worked in order; later tabs build on the labor and burden you enter earlier. Related sections. Feeds the proposal cost panel (see the proposal workspace ); for CLIN-level pricing use the Quote Builder ."
            },
            {
              "id": "4-3-compliance",
              "title": "4.3 Compliance",
              "text": "4.3 Compliance What it's for. The Compliance area (titled Compliance Center ) is where you run and review compliance scans per proposal. Each proposal has its own requirements derived from its solicitation; you open a proposal to scan it or review findings. Who can use it. All roles can open the Compliance Center and a proposal's scan results. Step by step. Open it. Select Compliance in the sidebar. Pick a proposal. The page lists your active proposals with status. Click one to open its scan results . What success looks like. A list of proposals, each leading to its own scan results. If something goes wrong. \"No requirements loaded.\" Upload an RFP and extract requirements (via the RFP Shredder on the proposal) so there's something to scan against. \"No active proposals.\" Create a proposal first. Tips & things to watch for. Compliance scans are proposal-scoped — there is no single org-wide scan; always start from a proposal. Related sections. Requirements come from the RFP Shredder ; coverage mapping is in the Compliance Matrix ."
            },
            {
              "id": "4-3-1-scan-results",
              "title": "4.3.1 Scan results",
              "text": "4.3.1 Scan results What it's for. The scan results screen (titled Compliance Scan Results ) shows a proposal's scan history and findings, scores each scan, and lets you address or waive findings and compare scans over time. Who can use it. All roles can view; addressing and waiving findings are working actions on the proposal. Step by step. Open it. From the Compliance Center, click a proposal. Run a scan. Click Run Scan . The newest scan becomes selected when it finishes. Read the scorecard. See the Compliance Score (%) and the findings, split into blocking and advisory severities. Act on a finding. For an open finding, mark it addressed , or waive it with a required reason. Compare scans. Use Compare with to view two scans side by side from the scan history. What the AI assistant does here. A scan evaluates your proposal's content against the proposal's RFP requirements and returns a compliance score plus findings (each with a severity and, often, a suggestion). Review each finding, fix the content or waive it with a reason, and re-scan. Treat findings as prompts to verify against the solicitation, especially \"blocking\" items. What success looks like. A scored scan with findings you can address or waive; \"No findings\" when content fully covers requirements (expected for a new or empty proposal). If something goes wrong. \"No scans run yet.\" Click Run Scan to start. Waive is blocked. A waiver reason is required. \"No findings\" on an empty proposal. Add content to your sections, then re-scan. Tips & things to watch for. Saving a section automatically triggers a background re-scan, so scores stay current as you write. Related sections. Built from RFP Shredder requirements; complements the Compliance Matrix ."
            },
            {
              "id": "4-4-content-library",
              "title": "4.4 Content Library",
              "text": "4.4 Content Library What it's for. The Content Library holds reusable, approved content — company overviews, technical approaches, past performance, key personnel, and boilerplate — that writers can insert into proposal sections and that AI drafting can draw on. Items move through a submit → review → approve flow. Who can use it. All roles can browse and add content. Approving or rejecting submissions, bulk importing, and the Pending Review queue require approver rights (Proposal Manager or higher). Deleting an approved item is restricted to admins. Step by step. Browse the Library tab. Search by title or content and filter by Type and Bid Type . Each item shows a status badge (Approved, Draft, Pending Review) and a freshness indicator. Add content. Click + Add Content , enter a Title and Content Type , paste the body, add tags and bid types, and submit. New or edited items are submitted for review (editing an approved item sends it for re-review). Bulk import (approvers). Click Bulk Import to add many items at once. Review submissions (approvers). Open the Pending Review tab to approve an item or reject it with a required reason. Open an item. View its content, version history, and details; edit or delete where your role allows. What success looks like. Submitted items appear as Pending Review; approved items become available to insert in the Section Editor and to AI drafting. If something goes wrong. \"Title and content are required.\" Complete both before submitting. \"Rejection reason is required.\" Provide a reason when rejecting. Can't delete an approved item. Only admins can delete approved content. Tips & things to watch for. The Insert from Library picker in the Section Editor only shows approved items, so keep the review queue moving. Freshness and expiry badges flag stale content — review items marked \"Expires soon\" or \"Expired.\" Related sections. Inserted in the Section Editor ; used as source material by AI drafting throughout Proposals ."
            },
            {
              "id": "4-5-dashboards",
              "title": "4.5 Dashboards",
              "text": "4.5 Dashboards What it's for. Dashboards (titled Custom Dashboards ) let you assemble your own view from a library of widgets — pipeline, win rate, SAM monitors, workload, compliance health, CPQ, and more. Who can use it. All roles. Step by step. Open it. Select Dashboards in the sidebar. Add a widget. Click Add Widget and choose from the catalog, which includes (among others) Pipeline Funnel, Win Rate, Recent Opportunities, Proposal Status, SAM Monitors, Opportunity Intel, Writer Workload, Team Roster, Debrief Outcomes, pWin Distribution, Top Win Themes, AI Usage Meter, Content Performance, RFP Queue, Compliance Health, FedRAMP Posture, CPQ Pipeline, Revenue Forecast, Plan Usage, and Deadline Calendar . Arrange and remove. Add the widgets you want and remove any with the widget's remove control. What success looks like. Your chosen widgets appear and populate with live data. If something goes wrong. \"Click 'Add Widget' to get started.\" The dashboard is empty — add your first widget. A widget shows \"No … data.\" There isn't data of that type yet. Related sections. Widgets summarize data from across Pipeline , Proposals , Quoting , and Intel ."
            },
            {
              "id": "4-6-intel",
              "title": "4.6 Intel",
              "text": "4.6 Intel What it's for. Intel (titled Competitive Intel ) is a market-intelligence feed with a daily digest summarizing recent competitor and award activity, filterable by your areas of interest. Who can use it. All roles. Step by step. Open it. Select Intel in the sidebar. Read the Daily Intelligence Digest. The digest card shows the date, a summary, an item count, and top themes. Filter the feed. Narrow items by fields such as NAICS code and agency, and search to find specific items. Add or update a feed. Use Add / Update Feed to register an intel source (with a name and source details). What the AI assistant does here. The Daily Intelligence Digest is an AI-generated summary of recent intelligence items in your feed — it produces a short narrative summary and surfaces top themes. Use it as a scan of what's new; open the underlying items to verify specifics before acting. What success looks like. A current digest and a filterable list of intel items. If something goes wrong. No digest, or \"No items match your current filters.\" Adjust your filters/search, or add a feed so there's material to summarize. Related sections. Intel can surface on Dashboards (Opportunity Intel widget) and informs your Pipeline decisions."

            {
              "id": "4-7-templates",
              "title": "4.7 Templates",
              "text": "4.7 Templates What it's for. The Template Library holds reusable proposal structures (volumes and sections) by bid type and agency. Published templates appear when creating a proposal and auto-scaffold its sections; templates move through a draft → (request) → publish flow with version history. Who can use it. All roles can browse templates. Creating, importing, and editing draft sections require Proposal Manager or higher. Publishing, unpublishing, cloning, archiving, and approving publish requests are Admin actions. A Proposal Manager can Request Publish ; an Admin reviews it. Step by step. Browse. Search templates and filter by bid type (Federal, SLED, Commercial). Each shows a status badge (Draft, Published, Pending Review, Archived), version, bid type, and usage count. Create a template (Proposal Manager+). Click + New Template , enter a Name and Bid Type (add State for SLED), optionally an Agency and Description , and Create . Import a template (Proposal Manager+). Click Import JSON to import a previously exported template as a new draft. Edit a draft's sections. Open a template to the builder; for a draft, + Add Section (title, instructions, page limit, required), reorder with the ▲/▼ controls, and edit or remove sections. Request or perform publish. A Proposal Manager clicks Request Publish (with an optional note). An Admin opens Publish and provides a required Change Log (and optional version) to publish, or reviews a pending request to Approve & Publish or Reject . Clone, archive, export (as permitted). Clone copies a template as a new draft (Admin); Archive/Restore hides or restores it (Admin); Export JSON downloads it; History shows published versions. What success looks like. Draft templates can be built and requested; published templates appear in the New Proposal dialog and auto-build sections when chosen. If something goes wrong. \"Name is required.\" Name the template before creating. \"Change log is required.\" / \"Failed to publish… Make sure it has at least one section.\" Add a change log and at least one section before publishing. \"Draft — not available for proposals.\" The template must be published by an Admin before it appears in proposal creation. Publish/clone/archive controls are missing. Those are Admin actions; use Request Publish if you're a Proposal Manager. Tips & things to watch for. A published template can't have its sections edited — Unpublish to revert it to draft first. Saving a proposal as a template (from the workspace) creates a draft that still needs Admin publishing. Related sections. Templates are chosen when creating a proposal and scaffold the workspace ."
            },
            {
              "id": "5-settings",
              "title": "5. Settings",
              "text": "5. Settings The Settings group holds connections and automation: Integrations , Scheduled Reports , and Workflows ."
            },
            {
              "id": "5-1-integrations",
              "title": "5.1 Integrations",
              "text": "5.1 Integrations What it's for. Integrations connects Pursuite to your email and calendar and to other systems, so activity can sync automatically. It's where you connect a Google Workspace or Microsoft 365 account (or an individual mailbox/calendar) and see CRM-related connections. Who can use it. All roles see Integrations in the sidebar; connecting and disconnecting accounts depends on your account's permissions. Because connecting authorizes an outside account, you'll go through that provider's sign-in. Step by step. Open it. Select Integrations in the sidebar. Sections include Email & Calendar , CRM , and How sync works . Connect email & calendar. Click Connect Google Workspace or Connect Microsoft 365 (or connect an individual mailbox), and complete the provider's authorization. A green Connected badge appears when done. Sync or disconnect. For a connected account, trigger a sync or disconnect it. You'll see confirmations such as \"… sync queued\" or \"… disconnected.\" Review activity. Each connection shows its recent sync events (or \"No sync events yet\"). What success looks like. A Connected badge on the provider and sync events appearing over time. If something goes wrong. \"Failed to start … connection.\" / \"Could not generate authorization URL.\" Start the connection again; you may need to complete sign-in in the provider window. \"Email sync failed.\" / \"Calendar sync failed.\" Trigger the sync again; if it persists, reconnect the account. Tips & things to watch for. Connecting links an external account — only connect accounts you're authorized to use, and disconnect when you no longer need the sync. Related sections. Webhook and other connector setup can also be done via the Integrations & Webhooks wizard ; admin-level connections live in the Admin console."
            },
            {
              "id": "5-2-scheduled-reports",
              "title": "5.2 Scheduled Reports",
              "text": "5.2 Scheduled Reports What it's for. Scheduled Reports emails a chosen report to recipients on a recurring schedule, so stakeholders get regular updates without logging in. Who can use it. All roles can view; creating, editing, running, and deleting schedules require Proposal Manager or higher. Step by step. Open it. Select Scheduled Reports in the sidebar. Create a schedule (Proposal Manager+). Give it a Name , choose a Report Type (options include Pipeline, Win / Loss, Win Themes, CRM Activity, Compliance Summary, Calculator Summary, Debrief Summary, AI Usage, Content Library, RFP Analysis, Proposal Health, CPQ Summary, SAM Alerts, Opportunity Intel, FedRAMP Posture, Team Activity, and User Activity), pick a frequency ( Daily at 8am , Every Monday 8am , 1st of month 8am , or a Custom cron expression), set a Timezone (ET, CT, MT, PT, or UTC), and enter recipient email addresses (one per line). Save it. Run now (Proposal Manager+). Trigger an immediate run; you'll see \"Report queued. Check run history for status.\" Review run history. Each schedule shows its recent runs (or \"No runs yet\"). Edit or delete (Proposal Manager+). Update the schedule or remove it. What success looks like. The schedule appears with its report type and cadence; runs show in its history and reports arrive in recipients' inboxes. If something goes wrong. \"Failed to save schedule.\" / \"Failed to queue report run.\" Try again; check the recipient list and cron expression. No create/edit controls. Your role is below Proposal Manager. Tips & things to watch for. The custom cron field expects a standard expression (for example, 0 8 * * 1 for Mondays at 8am); use the preset frequencies if you're unsure. Related sections. The reports themselves come from Analytics , Compliance , Intel , and other areas."
            },
            {
              "id": "5-3-workflows",
              "title": "5.3 Workflows",
              "text": "5.3 Workflows What it's for. Workflow Automation runs rule-based automations when key events happen — for example, notifying a role, assigning a user, tagging an opportunity, creating a task, or calling a webhook. These are simple \"when this happens, do that\" rules (no AI involved). Who can use it. All roles see Workflows in the sidebar; creating and managing workflows depends on your account's permissions. Step by step. Open it. Select Workflows in the sidebar. Create a workflow. Give it a Name , choose a Trigger — Opportunity stage change, Bid/No-Bid decision, Proposal status change, Section approved, Compliance scan complete, or Debrief submitted — and optionally add conditions (key/value pairs that must match the event; use * to match any value, or leave empty to run on every trigger). Add actions (at least one required). Choose one or more actions: Send notification (message + recipient role), Assign user (role or user ID), Set opportunity tag (tag name), Create task (title + due-in-days), or Send webhook (webhook URL). Save and enable. Save the workflow; use its toggle to enable or disable it. Test and review runs. Use the test option (you can supply sample event data) and open a workflow to see its run history (or \"No runs yet\"). Edit or delete. Update or remove a workflow. What success looks like. The workflow is listed with its trigger and run count, and runs appear in its history when the trigger fires. If something goes wrong. \"Name is required.\" / \"At least one action is required.\" Add a name and at least one action. \"Failed to save workflow.\" Try again. No runs recorded. The trigger hasn't fired yet, or conditions didn't match the event. Tips & things to watch for. Leave conditions empty to run on every occurrence of the trigger; add conditions to target specific cases (for example, only when a proposal moves to \"submitted\"). Related sections. Workflows react to events from Pipeline , Proposals , and Compliance ."
            },
            {
              "id": "6-system",
              "title": "6. System",
              "text": "6. System"
            },
            {
              "id": "6-1-admin",
              "title": "6.1 Admin",
              "text": "6.1 Admin What it's for. The Admin Console is the organization's control center — managing users and roles, sessions, the audit log, billing and plan, webhooks, the AI provider, and CPQ pricing configuration. Several Guided Setup wizards (onboarding, AI provider, SSO/MFA, ProPricer) also write their settings here. Who can use it. Admin only. The Admin item appears in the sidebar solely for Admins. Step by step. Open it. Select Admin in the sidebar to open the Admin Console . Use the tabs: Users & Roles — invite/add users, set roles, deactivate or reactivate accounts, and perform bulk role updates or deactivations. Sessions — view active user sessions and terminate them. Audit Log — review recorded system events. Billing & Plan — see your plan and usage limits. Webhooks — manage outbound webhook connections. AI Provider — connect your AI provider (OpenAI, Azure OpenAI, Anthropic, PursuiteAI, or a custom OpenAI-compatible endpoint), test the connection, and manage API keys. This is what enables AI drafting, the RFP Shredder, the Compliance Matrix, the pipeline, and other AI features across Pursuite. CPQ — configure burden rates and labor-rate (ProPricer) settings used by quotes. Reach the admin sub-pages. From Admin you also manage Compliance Rules and Custom Fields (organization-wide configuration). What success looks like. Changes save with confirmations (for example, \"AI provider configuration saved,\" \"Roles updated\"), and new users and settings take effect across the organization. If something goes wrong. \"Connection test failed. Check your credentials.\" Re-enter the AI provider details and test again. \"Failed to update roles.\" / \"Bulk role update failed.\" Try again. The Admin item isn't in your sidebar. Your role isn't Admin. Tips & things to watch for. AI features fail until a provider is connected and a successful connectivity test passes — set this up early via the AI Provider tab or the AI Provider wizard . A newly saved proposal template stays a draft until an Admin publishes it (see Templates ). Related sections. Many settings here are also reachable through Guided Setup ; roles set here govern access throughout the app."
            },
            {
              "id": "6-2-help",
              "title": "6.2 Help",
              "text": "6.2 Help What it's for. Help is the in-app guide. It explains how to use Pursuite end to end — a quick start, a step-by-step workflow guide, a roles-and-permissions reference, and a catalog of features. Who can use it. All roles. Step by step. Open it. Select Help in the sidebar. Browse the sections , including Quick Start , Workflow Guide , Roles & Permissions , and feature references. Expand a workflow step to see instructions, where to go, and common friction points. What success looks like. You find the guidance you need for the task at hand. Tips & things to watch for. The Roles & Permissions section is a quick way to confirm what your role can and can't do before you go looking for a missing button. Related sections. Help points back to every area of the app described in this guide."
            },
            {
              "id": "7-guided-setup",
              "title": "7. Guided Setup",
              "text": "7. Guided Setup What it's for. Guided Setup is a launcher of step-by-step wizards that walk you through common setup and onboarding tasks. It sits at the bottom of the sidebar (the ✨ Guided Setup button) and is also reachable inside the proposal workspace for the kickoff wizard. Who can use it. Everyone sees the ✨ Guided Setup button, but the list of available wizards is filtered to what your role is allowed to run. The wizards and who can run them: Proposal Kickoff: RFP → Draft-Ready (Proposal Manager) — turns an uploaded RFP into a draft-ready proposal. New-Tenant Onboarding (Org Admin) — first-time setup for your organization. AI Provider (BYOK) Connection (Org Admin) — connect and test your AI provider. ProPricer Pricing-Bridge Setup (Admin / Pricing Lead) — connect ProPricer for live labor rates. Integrations & Webhooks Connection (Admin / Integrator) — connect a webhook, mailbox, or calendar. Teaming Partner Onboarding (Proposal Manager) — set up a teaming workspace and partners. SSO + MFA + Clearance Governance (Org Admin) — configure single sign-on, MFA, and personnel clearances. Step by step. Open the picker. Click ✨ Guided Setup at the bottom of the sidebar. Each wizard shows its title, audience, and step count. Start a wizard. Click Start . For wizards that act on a specific item (Proposal Kickoff, Teaming Partner), you'll be asked to paste the relevant ID (for example, a Proposal ID or Teaming workspace ID) before it launches. Work through the steps. Each wizard guides you step by step; some steps require an action (such as saving credentials or passing a connectivity test) before you can continue. Progress is saved, so you can close a wizard and resume it later from the same launcher. Finish. Completing the final step applies the setup (for example, \"Credentials saved,\" \"Requirements confirmed,\" \"Bridge connected\"). What the AI assistant does here. The Proposal Kickoff wizard ties into the AI features documented under Proposals: it ingests your uploaded RFP (extracting requirements via the RFP Shredder) and can generate a compliance matrix, then leaves you ready to draft. Review and confirm the extracted requirements inside the proposal's RFP Shredder panel before the wizard advances. The AI Provider wizard is what connects the AI engine that powers drafting across the app. What success looks like. The wizard reaches its final step and reports success; the related feature (AI drafting, a connected integration, a draft-ready proposal) is now available. If something goes wrong. \"No wizards available for your role.\" Your role can't run any setup wizards — an Admin or Proposal Manager handles these. A step won't advance. That step requires a successful action first — for example, the AI Provider wizard needs a passing connectivity test, and Proposal Kickoff needs you to confirm RFP requirements in the proposal's RFP Shredder panel. A connectivity or health test fails. Re-check the URL and key you entered and run the test again. Tips & things to watch for. Resource-scoped wizards (Proposal Kickoff, Teaming) need an ID up front — have the proposal or workspace open so you can copy it. The Proposal Kickoff wizard can be started from the proposal workspace's ✨ Kickoff wizard button as well as from the sidebar. Related sections. The wizards configure features documented under Proposals , Integrations , and Admin ."

              "title": "8. Your profile",
              "text": "8. Your profile What it's for. The profile area (titled Settings ) is where you manage your own account — your display details, password, notification preferences, digest emails — and find quick links to connected tools. It's reached from the user block at the very bottom of the sidebar. Who can use it. All roles, for their own account. Step by step. Open it. Click your name/avatar at the bottom of the sidebar. Edit your profile. Under Account Settings , update your Photo , Display name , Email address , Time zone , and Date format ; your Role is shown but not editable here. Click Save changes . Change your password. Enter your Current password (if you have one), then a New password (minimum 8 characters) and confirm it. Save to update it. Set notification preferences. Choose which notifications you receive and how, and configure digest emails . Jump to connected tools. Use the quick links to Integrations , SAM Monitors , and (Proposal Manager+) Scheduled Reports . What success looks like. \"Profile updated.\" and \"Password updated successfully.\" confirmations; your display name, time zone, and date format apply across the app. If something goes wrong. \"Passwords don't match.\" Re-enter the new password and confirmation so they match. Password too short. Use at least 8 characters. Tips & things to watch for. Your Time zone and Date format affect how deadlines, reminders, and dates appear throughout Pursuite, including digest emails. Related sections. Connected tools link to Integrations and Scheduled Reports ."

              "title": "1. Purpose And Scope",
              "text": "1. Purpose And Scope This guide explains how to install, configure, license, operate, validate, and support DocGuard AI in an administrative environment. DocGuard AI is a local-first desktop and command-line application for document sanitization, metadata inspection, reporting, verification, and writing assistance. The core workflows run on the local workstation. Optional TSG License Manager integration supports online license activation, entitlement refresh, online deactivation, and update checks. This guide covers: Deployment models and package contents System and permission requirements Installation and portable operation Product identity and configuration locations Licensing and TSG License Manager integration Security, privacy, and data-handling guidance Cleanroom and reporting administration Validation checklists Support and troubleshooting procedures Post-RC production readiness"

              "id": "2-administrative-responsibilities",
              "title": "2. Administrative Responsibilities",
              "text": "2. Administrative Responsibilities Before deploying DocGuard AI, assign owners for these areas: | Area | Responsible Role | Responsibilities | |---|---|---| | Release ownership | Release manager | Approves production package, tracks evidence, coordinates rollout. | | Endpoint deployment | IT administrator | Installs package, configures shortcuts, manages user access. | | Licensing | License administrator | Configures product keys, TSG License Manager endpoint, activation and refresh policy. | | Security review | Security owner | Reviews local processing claims, reports, backups, dependencies, and endpoint scan results. | | Support readiness | Support lead | Maintains support intake, troubleshooting runbook, escalation path. | | Data governance | Records or compliance owner | Defines report retention, backup handling, and acceptable document workflows. |"
            },
            {
              "id": "3-product-dashboard",

            },

              "id": "4-deployment-models",
              "title": "4. Deployment Models",
              "text": "4. Deployment Models DocGuard AI supports three deployment models. | Model | Description | Recommended Use | |---|---|---| | Portable package | Self-contained folder containing DocGuardAI.exe and bundled runtime files. | Pilot use, controlled file-share deployment, support diagnostics, restricted installs. | | Installer package | Windows installer created from installer\\DocGuardAI.iss . | Managed endpoint distribution, desktop shortcuts, Start menu entries. | | Source install | Python source install with pip install -e . . | Development, validation, integration testing, internal engineering workflows. | The approved polished portable build is: dist-docguard-ui-polish\\DocGuardAI\\DocGuardAI.exe The approved installer is: release\\DocGuardAISetup.exe"
            },

              "title": "5. System Requirements",
              "text": "5. System Requirements Recommended endpoint requirements: Windows 10 or Windows 11 Standard user execution rights for the application folder Read access to target source documents Write access to selected output/report locations Optional network access to TSG License Manager for online licensing and update checks For source-based validation: Python 3.11 or newer Dependencies from requirements.txt PyInstaller for packaged build workflows"

            },

            },
            {
              "id": "12-licensing-model",
              "title": "12. Licensing Model",
              "text": "12. Licensing Model DocGuard AI supports: Trial/local operation Offline development activation Online activation through TSG License Manager Online license refresh Online deactivation Product keys use this format: DGA-XXXX-XXXX-XXXX Legacy SSP-... keys are accepted only for RC compatibility."
            },
            {
              "id": "13-license-administration",
              "title": "13. License Administration",
              "text": "13. License Administration Check status: sanitize license Activate offline: sanitize license --activate DGA-XXXX-XXXX-XXXX Activate online: sanitize license --activate DGA-XXXX-XXXX-XXXX --online --server-url https://<tsg-platform-url> Refresh: sanitize license --refresh --server-url https://<tsg-platform-url> Deactivate locally: sanitize license --deactivate Deactivate online: sanitize license --deactivate --online --server-url https://<tsg-platform-url> Administrative guidance: Do not publish full product keys in support tickets. Record only the last four characters when documenting license issues. Prefer online activation for production if TSG License Manager is available. Confirm whether the legacy RC license fallback should remain enabled before production distribution."
            },
            {
              "id": "14-tsg-license-manager-integration",
              "title": "14. TSG License Manager Integration",
              "text": "14. TSG License Manager Integration Set the API endpoint with an environment variable: $env:TSG_API_URL=\"https://<tsg-platform-url>\" Run an update check: sanitize update-check --server-url https://<tsg-platform-url> DocGuard AI can send these fields to TSG License Manager: product key device identifier device label machine hash app version product id release channel platform Document content is not required for license activation, refresh, deactivation, or update checks."
            },
            {
              "id": "15-security-and-privacy-controls",
              "title": "15. Security And Privacy Controls",
              "text": "15. Security And Privacy Controls Recommended controls: Restrict deployment folder write permissions. Use an approved reports folder for regulated workflows. Treat generated reports as sensitive because they may include file paths and finding details. Keep backups enabled unless another recovery mechanism exists. Review backup retention policy before cleaning sensitive sources. Run endpoint protection scans on signed production artifacts. Review dependency vulnerability results before production release. Confirm local-only processing language in customer-facing materials."
            },
            {
              "id": "16-cleaning-profiles-and-policy",
              "title": "16. Cleaning Profiles And Policy",
              "text": "16. Cleaning Profiles And Policy Profiles: | Profile | Administrative Use | |---|---| | standard | Conservative cleanup for routine metadata reduction. | | aggressive | Recommended default for release preparation. | | paranoid | Strongest cleanup; validate output quality before broad rollout. | Recommended policy: Use aggressive for normal production-release preparation. Use standard for low-risk routine cleanup. Require sample validation before using paranoid on business-critical document sets. Keep Backup enabled in the GUI. Restrict CLI use of --no-backup to workflows with separate recovery controls."
            },
            {
              "id": "17-supported-extensions",
              "title": "17. Supported Extensions",
              "text": "17. Supported Extensions Core Extensions: Document Sanitizer Office Sanitizer PDF Sanitizer Image Sanitizer Writing Assistant Integration and module packs shown in Extensions: Word Add-in Outlook Add-in Browser Extension CAD Pack Email Pack Media Pack Some module packs are inspection-first. CAD, email, and media formats can require external native tools, export workflows, or remux tooling for complete remediation."
            },
            {
              "id": "18-cleanroom-administration",
              "title": "18. Cleanroom Administration",
              "text": "18. Cleanroom Administration Recommended full pipeline: sanitize run \"C:\\Path\\To\\Source\" --profile aggressive --report-dir \"C:\\Path\\To\\Reports\" Pipeline order: scan -> clean -> post-clean scan -> verify -> report -> Activity Batch job example: { \"profile\": \"aggressive\", \"report_dir\": \"reports\", \"sources\": [ \"C:\\\\Path\\\\To\\\\SourceA\", \"C:\\\\Path\\\\To\\\\SourceB\" ] } Run the batch: sanitize batch jobs.json Watch a folder: sanitize watch \"C:\\Path\\To\\DropFolder\" --interval 30 Create a scheduled-task helper: sanitize schedule nightly --profile aggressive The schedule command writes a PowerShell helper under reports\\ and prints a schtasks command. Review and register the scheduled task according to your endpoint policy."
            },
            {
              "id": "19-reporting-and-evidence-retention",
              "title": "19. Reporting And Evidence Retention",
              "text": "19. Reporting And Evidence Retention DocGuard AI can produce: HTML scan reports HTML clean reports JSON reports CSV reports local Activity database entries Examples: sanitize scan \"C:\\Path\\To\\Source\" --html-report auto --json-report reports\\scan.json --csv-report reports\\scan.csv sanitize clean \"C:\\Path\\To\\Source\" --html-report auto sanitize history --last 50 sanitize history --stats sanitize history --top-risk For controlled release workflows, retain: pre-clean scan report clean report post-clean scan report verification result Activity database entry manual remediation notes final accepted artifact hash, if applicable"
            },

            },

              "text": "21. Post-RC Production Readiness RC1 U6.1 is production-release approved. Use the post-RC production plan as the operational checklist for signing, rollout, monitoring, and support governance: docs\\POST_RC_PRODUCTION_PLAN.md docs\\POST_RC_PRODUCTION_PLAN.html Minimum readiness gates: Release ownership and approval record are assigned. Production build is reproducible from a clean workspace. Executable and installer artifacts are signed and timestamped. Installer, upgrade, uninstall, and portable workflows pass on target Windows versions. TSG License Manager production licensing and update-check paths pass. Security and privacy review is complete. User Guide, Admin Guide, release notes, and support runbook are approved. Signed artifacts, hashes, release notes, rollout instructions, and rollback plan are published. Post-release monitoring owner and triage window are assigned."

              "id": "22-troubleshooting",
              "title": "22. Troubleshooting",
              "text": "22. Troubleshooting | Symptom | Likely Cause | Administrative Action | |---|---|---| | Reports page is empty | No report has been generated | Run Run Cleanroom or sanitize run . | | Activity is empty | No run recorded or wrong history DB | Check reports\\history.db or pass --history-db . | | License shows trial | No local or TSG license cache exists | Activate or refresh the license. | | Online activation fails | TSG API unavailable or wrong URL | Check endpoint, firewall, DNS, and TSG_API_URL . | | File not detected | Unsupported extension or discovery issue | Run sanitize scan <path> --diagnose . | | Cleaning does not remove a finding | Finding is informational, inspection-only, or requires stronger profile | Review report remediation and profile selection. | | Verification fails | Residual findings remain after cleaning | Review File Review and post-clean report, remediate, or document residual risk. | | Portable app does not launch | Blocked file, missing runtime file, endpoint policy, or AV quarantine | Re-extract package, unblock files, check endpoint logs, verify package hash. | | Writing Assistant missing | Outdated build or license-gated legacy package | Deploy latest package and confirm Extensions shows Writing Assistant as Core. |"
