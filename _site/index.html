          "title": "DocGuard AI User Guide",
          "slug": "docguardai-user-guide",
          "path": "docguardai/docguardai-user-guide.html",
          "sections": [
            {
              "id": "overview",
              "title": "Overview",
              "text": "DocGuard AI User Guide Version: v1.2.0 RC1 U6.1 Audience: end users, reviewers, analysts, records teams, and document owners Purpose: step-by-step guidance for scanning, cleaning, verifying, reporting, and using the Writing Assistant"
            },
            {
              "id": "current-release-update",
              "title": "Current Release Update",
              "text": "Current Release Update DocGuard AI RC1 U6.1 is production-release approved. The current desktop experience uses the approved workflow navigation: 1. Dashboard 2. File Review 3. Findings 4. Writing Assistant 5. Risk Map 6. Cleanroom 7. Reports 8. Activity 9. Extensions 10. Settings The latest UI fixes include: Dashboard card drill-downs now open populated detail pages. The risk distribution bar has improved spacing for low-count severity segments. Selected findings remain readable while highlighted. Corrupted display characters were removed from the dashboard and navigation surfaces. Writing Assistant is included in Core and is not a separately licensed Professional feature. Use Run Cleanroom for the end-to-end workflow that generates Reports and Activity."
            },
            {
              "id": "1-what-docguard-ai-does",
              "title": "1. What DocGuard AI Does",
              "text": "1. What DocGuard AI Does DocGuard AI helps you inspect and clean documents before sharing, filing, publishing, or releasing them. It runs locally on your workstation and helps identify metadata, comments, image data, document structure issues, PDF artifacts, and other findings that may need review. DocGuard AI also includes a core Writing Assistant for heuristic writing analysis, sentence heatmaps, and rewrite assistance."
            },
            {
              "id": "2-before-you-start",
              "title": "2. Before You Start",
              "text": "2. Before You Start Before running a cleanup workflow: 1. Confirm you are working on the correct file or folder. 2. Confirm you have permission to inspect and clean the content. 3. Make a copy of important files if your team requires a separate working copy. 4. Keep Backup enabled unless your administrator tells you otherwise. 5. Use Dry Run first when working with critical or unfamiliar files. 6. Plan to review the verification result before sharing cleaned output."
            },
            {
              "id": "3-launch-docguard-ai",
              "title": "3. Launch DocGuard AI",
              "text": "3. Launch DocGuard AI 1. Open the Start menu, desktop shortcut, or portable folder. 2. Launch DocGuardAI.exe . 3. Confirm the window title shows DocGuard AI v1.2.0 RC1 U6.1 . 4. Confirm the left sidebar is visible. The main workflow across the top is: 1. Source 2. Scan 3. Review 4. Clean 5. Verify 6. Report Work through the sidebar in this order for the clearest experience: 1. Dashboard 2. File Review 3. Findings 4. Writing Assistant, if needed 5. Risk Map 6. Cleanroom 7. Reports 8. Activity 9. Extensions 10. Settings"
            },
            {
              "id": "4-choose-a-source",
              "title": "4. Choose A Source",
              "text": "4. Choose A Source 1. Click Browse . 2. Select a folder or file. 3. Confirm the selected path appears in the Source field. 4. Leave Recursive enabled if you want subfolders included. 5. Clear Recursive if you only want the selected folder level. Choose a single file when you need to inspect one document. Choose a folder when preparing a group of files for delivery or review."
            },
            {
              "id": "5-understand-supported-files",
              "title": "5. Understand Supported Files",
              "text": "5. Understand Supported Files Core supported file families include: TXT Markdown HTML DOCX PDF PPTX XLSX and XLSM JPEG PNG TIFF WEBP Enabled module packs add inspection support for email, CAD, and media formats. Some of those formats are inspection-first and may provide remediation guidance rather than direct cleaning."
            },
            {
              "id": "6-select-a-profile",
              "title": "6. Select A Profile",
              "text": "6. Select A Profile Use the Profile selector before scanning or cleaning. | Profile | Use This When | |---|---| | standard | You want conservative cleanup for routine metadata reduction. | | aggressive | You are preparing files for normal release or external sharing. | | paranoid | You need the strongest cleanup and have time to verify output carefully. | Recommended first choice: aggressive . Use paranoid carefully. It can apply stronger document handling where supported, so review output before sending or filing cleaned documents."
            },
            {
              "id": "7-set-safety-controls",
              "title": "7. Set Safety Controls",
              "text": "7. Set Safety Controls Review the safety controls before running a workflow. | Control | Recommended Setting | Meaning | |---|---|---| | Backup | On | Creates backups before supported file changes. | | Recursive | On for folders | Includes subfolders. | | Dry Run | On for preview, off for actual cleaning | Shows what would happen without modifying files. | | Typography | Optional | Normalizes selected typography markers where supported. | | Remove EXIF | On | Removes image EXIF metadata where supported. | Recommended first pass: 1. Turn Backup on. 2. Turn Recursive on if scanning a folder. 3. Turn Dry Run on for the first review. 4. Select aggressive . 5. Click Scan ."
            },
            {
              "id": "8-run-a-scan",
              "title": "8. Run A Scan",
              "text": "8. Run A Scan Use Scan when you want to inspect before changing anything. 1. Select a source. 2. Select a profile. 3. Set safety controls. 4. Click Scan . 5. Wait for progress to complete. 6. Review the Dashboard metrics. 7. Open File Review and Findings for details. After scanning, DocGuard AI populates: Dashboard cards Risk distribution Top risk files File Review tree Findings table Risk Map Recent activity"
            },
            {
              "id": "9-review-the-dashboard",
              "title": "9. Review The Dashboard",
              "text": "9. Review The Dashboard The Dashboard page summarizes the current source and latest run. Review: Files scanned Files cleaned Total findings Findings removed Highest risk Verification failures Risk distribution Top risk files Pipeline verification Recent activity If Verification Failures is greater than zero after a full pipeline, review Reports and File Review before using the output."
            },
            {
              "id": "10-review-details-in-file-review",
              "title": "10. Review Details In File Review",
              "text": "10. Review Details In File Review 1. Open File Review . 2. Expand the file tree. 3. Select a file to view file-level details. 4. Select a category to view category details. 5. Select an individual finding to view the finding detail and remediation guidance. Use File Review when you need to answer: Which file caused the risk? Which category was detected? What does the finding mean? What remediation is recommended? Is the file clean or does it have residual findings?"
            },
            {
              "id": "11-review-findings",
              "title": "11. Review Findings",
              "text": "11. Review Findings 1. Open Findings . 2. Review high-risk rows first. 3. Check file path, category, severity, score, finding name, and remediation. 4. Decide whether to clean, document residual risk, or remove the file from the release set. Findings can include: metadata comments EXIF document structure PDF metadata PDF structure image metadata image structure errors"
            },
            {
              "id": "12-use-the-risk-map",
              "title": "12. Use The Risk Map",
              "text": "12. Use The Risk Map 1. Open Risk Map . 2. Review files by risk band. 3. Prioritize high-risk files. 4. Return to File Review or Findings for detail. The heatmap is useful when scanning a large folder and deciding where to spend review time."
            },
            {
              "id": "13-clean-files",
              "title": "13. Clean Files",
              "text": "13. Clean Files Use Clean when you are ready to modify supported files. 1. Confirm the source path is correct. 2. Confirm Backup is on. 3. Turn off Dry Run if you want actual changes. 4. Select the profile. 5. Click Clean . 6. Wait for completion. 7. Review the Dashboard, Reports, and Activity. If Dry Run is on, DocGuard AI previews the operation without changing files."
            },
            {
              "id": "14-run-cleanroom",
              "title": "14. Run Cleanroom",
              "text": "14. Run Cleanroom Use Run Cleanroom for the recommended end-to-end workflow. 1. Select a source. 2. Select a profile. 3. Confirm safety controls. 4. Click Run Cleanroom . 5. Wait for the run to complete. 6. Review Pipeline Verification . 7. Open Reports. 8. Review Activity. The full pipeline performs: scan -> clean -> post-clean scan -> verify -> report -> Activity Use this workflow when preparing a final release package or controlled document set."
            },
            {
              "id": "15-understand-verification",
              "title": "15. Understand Verification",
              "text": "15. Understand Verification Verification compares findings before and after cleaning. If verification passes: cleaned files have no score-bearing residual findings in the verification result reports and Activity are updated the workflow can move to final review If verification fails: 1. Open File Review. 2. Review the file with residual findings. 3. Open Reports. 4. Review the post-clean scan report. 5. Decide whether to retry with a stronger profile, perform manual remediation, or document residual risk. Do not distribute files until verification failures are understood."
            },
            {
              "id": "16-open-reports",
              "title": "16. Open Reports",
              "text": "16. Open Reports 1. Open Reports . 2. Click Refresh Reports if needed. 3. Select a report. 4. Review the report in the viewer. Full pipeline runs can generate: pre-clean scan report clean report post-clean scan report Reports are local files. Treat them as sensitive if they contain paths or finding details."
            },
            {
              "id": "17-review-activity",
              "title": "17. Review Activity",
              "text": "17. Review Activity 1. Open Activity . 2. Click Refresh Activity . 3. Review timestamp, mode, profile, scanned files, cleaned files, findings, removed findings, and highest risk. Use Activity to confirm that a workflow completed and to review prior runs."
            },
            {
              "id": "18-use-cleanroom",
              "title": "18. Use Cleanroom",
              "text": "18. Use Cleanroom The Cleanroom page provides a simple way to run the selected source through the pipeline. 1. Select a source. 2. Open Cleanroom . 3. Click Run Current Source . 4. Wait for completion. 5. Review Reports and Activity. Cleanroom uses the same general order as the full pipeline and is useful when processing known source folders."
            },
            {
              "id": "19-use-the-writing-assistant",
              "title": "19. Use The Writing Assistant",
              "text": "19. Use The Writing Assistant The Writing Assistant is part of the core DocGuard AI package. To analyze text: 1. Open Writing Assistant . 2. Paste text into the editor. 3. Review the live analysis. 4. Review Findings and Statistics tabs. 5. Review sentence heatmap output. To rewrite text: 1. Paste text into the editor. 2. Select a style. 3. Click Rewrite . 4. Review the suggested rewrite. 5. Review changed words and applied changes. 6. Use Replace Original only after reviewing the rewritten text. 7. Use Copy to copy the rewrite. Available styles: natural humanize executive technical academic government Important: Writing Assistant output is heuristic and rule-based. It does not prove authorship, guarantee compliance, or replace human review."
            },
            {
              "id": "20-use-extensions",
              "title": "20. Use Extensions",
              "text": "20. Use Extensions Open Extensions to view enabled Extensions. Core Extensions include: Document Sanitizer Office Sanitizer PDF Sanitizer Image Sanitizer Writing Assistant Additional entries can include: Word Add-in Outlook Add-in Browser Extension CAD Pack Email Pack Media Pack Some Extensions are inspection-first. If a report says manual remediation is required, follow your team process."

            },
            {
              "id": "22-use-activity-and-reports",
              "title": "22. Use Activity And Reports",
              "text": "22. Use Activity And Reports Open Activity when you need a run-by-run summary. Open Reports when you need detailed evidence for review, audit, or release decisions. Activity and Reports can help answer: Did the run start? Which stage is running? Were reports generated? Did verification pass or fail? Was a file skipped or unsupported? If you contact support, include the relevant Activity row, report path, or a screenshot of the issue."
            },
            {
              "id": "23-command-line-basics",
              "title": "23. Command Line Basics",
              "text": "23. Command Line Basics Administrators may ask you to run command-line checks. Scan: sanitize scan \"C:\\Path\\To\\FileOrFolder\" --profile aggressive --summary Clean: sanitize clean \"C:\\Path\\To\\FileOrFolder\" --profile aggressive --html-report auto Run Cleanroom: sanitize run \"C:\\Path\\To\\FileOrFolder\" --profile aggressive View Activity: sanitize history --last 20 List Extensions: sanitize plugins Writing Assistant: sanitize analyze-text --text \"Paste text here\" --heatmap sanitize rewrite --text \"Paste text here\" --style executive"
            },
            {
              "id": "24-recommended-end-to-end-workflow",
              "title": "24. Recommended End-To-End Workflow",
              "text": "24. Recommended End-To-End Workflow For a document release set: 1. Create or identify the working copy of the files. 2. Launch DocGuard AI. 3. Click Browse . 4. Select the source folder. 5. Select aggressive . 6. Enable Backup . 7. Enable Recursive if needed. 8. Enable Dry Run . 9. Click Scan . 10. Review Dashboard. 11. Review File Review and Findings. 12. If results are expected, turn off Dry Run . 13. Click Run Cleanroom . 14. Review Pipeline Verification. 15. Open Reports. 16. Review the post-clean scan report. 17. Open Activity and confirm the run is recorded. 18. Retain reports according to your team policy. 19. Use the cleaned files only after verification has been reviewed."
            },
            {
              "id": "25-best-practices",

              "id": "1-1-setup",

              "text": "1.1 Setup cd H :\\ Projects \\ TTI-S_VBS \\ ttis-ai python -m venv . venv . venv \\ Scripts \\ activate python -m pip install - -upgrade pip pip install -r requirements . txt Copy-Item config \\. env . template config \\. env # then edit (see §1.2) Generate the two mandatory secrets: python -c \"import secrets; print(secrets.token_urlsafe(48))\" # → DASHBOARD_JWT_SECRET (>=32 chars) python -c \"import secrets; print(secrets.token_urlsafe(24))\" # → DASHBOARD_PWD_SALT (>=16 chars)"

              "id": "1-2-configuration-config-env",
              "title": "1.2 Configuration — config/.env",
              "text": "1.2 Configuration — config/.env The full template is config/.env.template . The variables that matter most: Variable Required Purpose ANTHROPIC_API_KEY Yes Claude API key (all agents + LYNNE). DASHBOARD_JWT_SECRET Yes JWT signing key, ≥32 chars , never a placeholder. DASHBOARD_PWD_SALT Yes Password hash salt, ≥16 chars . DASHBOARD_USERS first boot JSON seed of users (after first boot the auth.db is source of truth). WORKFLOW_EXECUTION_MODE prod inline (dev) or queue (prod). REDIS_URL queue mode e.g. redis://localhost:6379/0 ( redis://redis:6379/0 in Docker). DATABASE_URL prod unset → SQLite; postgresql://… → Cloud SQL. CORS_ALLOW_LIST web UI Must include the Dashboard origin (e.g. https://app.tti-solutions.com ). SCHEDULER_ENABLED opt‑in 1 starts the recurring-job loop (reminders, daily updates). Default 0 . SCHEDULER_TZ opt‑in e.g. America/Chicago — daily job times are local. Deploy/domains prod APP_DOMAIN , DASHBOARD_PUBLIC_URL , WEBSITE_DOMAIN , ACME_EMAIL , WEBHOOK_DOMAIN , FRONTEND_UPSTREAM . Integrations optional PURSUITE_* , DUFFEL_API_TOKEN , GOOGLE_* , GOOGLE_MAPS_API_KEY , TICKETMASTER_API_KEY , SLACK_WEBHOOK_URL , OWNER_EMAIL . Optional/unset integration keys degrade gracefully — the feature just isn't offered."

              "id": "1-3-run-dev-inline-mode-3-terminals",
              "title": "1.3 Run — dev (inline mode), 3 terminals",
              "text": "1.3 Run — dev (inline mode), 3 terminals # 1) Bootstrap (loads .env, inits all SQLite DBs, builds tool + agent registries, COMMAND-CORE) python main . py # 2) Dashboard API (port 8000) uvicorn dashboard . main : app - -host 127 . 0 . 0 . 1 - -port 8000 # 3) Webhook receiver (port 8001) — Pursuite CRM + Telegram inbound uvicorn tools . pursuite_webhook : webhook_app - -host 0 . 0 . 0 . 0 - -port 8001 python main.py prints a startup banner ending with the service URLs and the two uvicorn commands. Health check: curl http://127.0.0.1:8000/health → 200 . One-shot maintenance commands (don't start a server): python main . py - -ingest-docs # ingest documents into ChromaDB (see §7) python main . py - -verify-chain # verify the append-only audit hash chain python main . py - -list-gates # list workflows awaiting a human gate python main . py - -test-pursuite # test Pursuite CRM connectivity"
            },
            {
              "id": "1-4-run-docker-queue-mode-production-shape",
              "title": "1.4 Run — Docker (queue mode, production shape)",
              "text": "1.4 Run — Docker (queue mode, production shape) docker-compose up -d # chromadb:8002, redis:6379, dashboard:8000, webhook:8001, worker docker-compose logs -f # tail docker-compose up -d - -scale worker = 3 # more queue throughput docker-compose down # stop (add -v to wipe volumes) In queue mode the API/webhook enqueue to Redis ( queue:workflow_jobs ) and the worker consumes them: python -m orchestration.worker . Inline mode runs the workflow in a background thread (dev only — not durable across restarts). Docker Desktop / WSL2 gotcha — single‑file .env bind mounts. On Windows, bind‑mounting a single file (e.g. ./.env:/app/.env ) is unreliable: Docker Desktop can create the destination as a directory , and then runc rejects the mount with not a directory: Are you trying to mount a directory onto a file (or vice‑versa)? — typically on restart of a container that was first created when the mount existed. Fixes: - Prefer env_file: over a single‑file bind mount — it injects the vars with no filesystem mount. - If you hit it, recreate (don't restart) the container so it picks up the current config: docker compose down --remove-orphans && docker compose … up -d --force-recreate . Never docker start / restart the stale container — that replays the dead mount. - If Docker auto‑created a bogus directory at the host .env path, delete it and ensure a real file exists (copy from .env.template ) before bringing the stack back up."

              "text": "1.8 User & password management (local/dev) Identities live in auth.db . The password hash is sha256(DASHBOARD_PWD_SALT + plaintext) — use the users helpers so the salt is applied for you. To reset the tester's password and create/refresh a charles CEO login: cd H :\\ Projects \\ TTI-S_VBS \\ ttis-ai .\\. venv \\ Scripts \\ python . exe -c \" from dotenv import load_dotenv load_dotenv('config/.env') from dashboard.users import init_users_db, set_password, upsert_user, hash_password, get_user from dashboard.abac import Role init_users_db() PW = 'TTIS-CEO-2026!' print('reset tester (U-TEST):', set_password('U-TEST', PW)) upsert_user(user_id='U-001', username='charles', password_sha256=hash_password(PW), role=Role.parse('ceo'), domain='tti-solutions.com') u = get_user('charles') print('charles present:', bool(u), '| role:', u['role'] if u else None) \" (On the prod VM the equivalent runs inside the container with docker exec — see §4.6.)"

              "id": "1-11-security-regression-testing-mth-pipeline",
              "title": "1.11 Security & regression testing (MTH + pipeline)",
              "text": "1.11 Security & regression testing (MTH + pipeline) Mutative Test Harness (MTH, R‑MTH‑01) — adversarial, in‑process RBAC/auth/injection fuzzing ( tools/mth/ ). It mints a JWT per role, fires mutated requests at the app via TestClient , and an oracle grounded in dashboard/abac.py::can() flags any divergence — so it's self‑checking against the live policy. python -m tools . mth # full run → data/mth/latest.{json,html} python -m tools . mth - -dry-run # build the plan, send nothing python -m tools . mth - -out DIR # write the report elsewhere Strategy groups: Protocol (missing‑auth / forged alg=none / malformed), RBAC (wrong‑role), Structural (overpost / remove‑field / empty‑object), Type (coercion / binary), Value (SQLi / XSS / path‑traversal / long‑string), Semantic (cross‑entity TTIS↔ROSS_LV), Chaos (1 MB / duplicate), Injection (login SQLi). CRITICAL findings ( AUTH_BYPASS , RBAC_BYPASS , INJECTION_ACCEPTED , OVERPOST_ESCALATION , CROSS_ENTITY_LEAK ) → exit 1; UNEXPECTED_CRASH / IDEMPOTENCY_VIOLATION (HIGH) and MISSING_VALIDATION (LOW) are reported, not blocking. It seeds a real charge code + a timecard advanced through the approval chain so write/approval routes hit valid targets. Add an endpoint = add a Baseline in tools/mth/baselines.py (the engine auto‑generates every variant). CI gates on it ( tests/test_mth_oracle.py + a step that fails on CRITICAL and uploads the report artifact). Regression pipeline (R‑REG‑01) — one command runs the whole suite as ordered phases + the MTH gate + a summary report: python scripts / run_regression . py # or: .\\scripts\\run-regression.ps1 python scripts / run_regression . py - -list # phases + file assignment python scripts / run_regression . py - -phase auth_identity python scripts / run_regression . py - -skip-realtime - -skip-mth - -filter timecard 14 phases (guardrails, auth_identity, timecards, finance_payroll, field_ops, projects_pm, lms_onboarding, lynne_eaa, agents_workflows, wizards, travel, integrations, security, realtime) + the MTH harness; the realtime phase auto‑skips when Redis is unreachable. Report → test-results/ regression-<ts>.txt ; exit 0/1. (Plain pytest tests/ -q still works for ad‑hoc runs.)"
            },

              "id": "2-6-debugging-a-failing-api-call-in-the-browser-devtools",
              "title": "2.6 Debugging a failing API call in the browser (DevTools)",
              "text": "2.6 Debugging a failing API call in the browser (DevTools) When the UI misbehaves, the fastest diagnosis is to watch the actual request the browser made. Open DevTools (Windows — Chrome/Edge/Firefox): - F12 (or Ctrl+Shift+I ) — DevTools. - Ctrl+Shift+J — straight to the Console . - Firefox Ctrl+Shift+E — straight to Network . (Mac: Cmd+Option+I .) Capture the failing call: 1. F12 → Network tab. 2. Click the Fetch/XHR filter (hides images/CSS, shows just API calls); optionally type api/v1 in the filter box. 3. Leave DevTools open, then click the panel in the app (or Ctrl+R to reload). 4. Look for rows in red or with a 4xx/5xx Status — those are the failures. 5. Click a red row → the Status (top of Headers ), the Request URL , and the Response tab tell the story. Common reads: a 4xx / 5xx with no Access-Control-Allow-Origin header → CORS (fix the VBS CORS_ALLOW_LIST ); 401 → auth/token; 404 on a new endpoint → backend not redeployed; net::ERR_CONNECTION_REFUSED → wrong NEXT_PUBLIC_VBS_BASE_URL or VBS not running."
            },

              "id": "2-7-troubleshoot",
              "title": "2.7 Troubleshoot",
              "text": "2.7 Troubleshoot Symptom Diagnose Fix API calls fail / blocked (CORS) DevTools Network: missing Access-Control-Allow-Origin Add the Dashboard origin to VBS CORS_ALLOW_LIST , restart VBS. Login 401 DevTools Network: /api/v1/auth/login → 401 Verify creds; check VBS health. New endpoint 404 from the UI DevTools Network: 404 on /api/v1/… Redeploy backend (GCP §4.4); confirm main is current. ERR_CONNECTION_REFUSED wrong base URL / VBS down Fix NEXT_PUBLIC_VBS_BASE_URL ; start VBS on :8000 . Coverage gate fails vitest report; abac/ + finance/ <100% Add tests; those paths require 100%. Old UI after deploy browser bundle cache Hard refresh (Ctrl/Cmd‑Shift‑R); confirm frontend image was pulled. Next downgraded to 9.x npm audit fix --force was run Revert package.json /lock, npm ci ."

              "title": "4.1 Production host",
              "text": "4.1 Production host GCP project tti-solutions-ai , VM ttis-prod (zone us-central1-a , Ubuntu). Repo at ~/ttis-ai . Live IP: 34.27.180.8 (static). dig +short tti-solutions.com @8.8.8.8 → 34.27.180.8 . Cloud SQL (Postgres) via DATABASE_URL . Payroll field‑encryption key lives on a separate /app/secrets volume (never in DB backups), GUI‑rotated. Compose for prod is always the two‑file overlay : -f docker-compose.yml -f docker-compose.prod.yml . Infra/cutover notes: ttis-ai/docs/PRODUCTION_HOSTING.md , ttis-ai/docs/LMS_DEPLOY_AND_SEED_RUNBOOK.md . ⏰ Action by 2026‑08‑01 — Cloud SQL export IAM change. Google is removing the cloudsql.instances.export permission from the Viewer ( roles/cloudsql.viewer ) and legacy Reader roles. After that date, anyone (or any service account) holding only those roles can no longer export the database — via console, gcloud sql export , or the API. If a person or job exports the prod DB to Cloud Storage, grant them roles/cloudsql.editor (or a custom role that includes cloudsql.instances.export ) before the date . Automated Cloud SQL backups are unaffected — this only touches the export‑to‑GCS path, so if you rely solely on managed backups, no action is needed. ```bash Who currently has only Viewer / legacy Reader? gcloud projects get-iam-policy tti-solutions-ai --flatten=\"bindings[].members\" \\ --filter=\"bindings.role=roles/cloudsql.viewer OR bindings.role=roles/cloudsql.legacyReader\" \\ --format=\"table(bindings.role, bindings.members)\" Grant export capability to whoever needs it: gcloud projects add-iam-policy-binding tti-solutions-ai \\ --member=\"user:charles@tti-solutions.com\" --role=\"roles/cloudsql.editor\" ```"

              "text": "4.3 Deploy — orchestrated (the safe default) cd ~/ttis-ai ./scripts/deploy_prod.sh Stages (aborts safely before any cutover if a check fails): preflight (docker + required .env keys) → repo sync ( git pull --ff-only — ⚠️ watch the it pull typo , it silently no‑ops and leaves the backend stale) → Caddyfile validation (throwaway caddy validate with the domain env, incl. WEBHOOK_DOMAIN ; a missing one fails validation — fixed in #196) → build+start app services (website stays live) → pull frontend from GHCR (bare up -d reuses cached :latest ) → health‑gate /health → seed LMS catalog + policy‑ack (idempotent) → cutover Caddy (first run provisions Let's Encrypt; port 80 reachable)."

              "id": "4-4-deploy-manual-per-service-the-everyday-path",
              "title": "4.4 Deploy — manual per‑service (the everyday path)",
              "text": "4.4 Deploy — manual per‑service (the everyday path) When you just need to ship the latest main for one service: # Backend (dashboard) — pull + rebuild the image, recreate the container git pull --ff-only origin main docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build dashboard # Verify the new backend is serving (any 2xx/3xx is \"up\"; this endpoint is a quick probe) curl -s -o /dev/null -w \"%{http_code}\\n\" localhost:8000/api/v1/projects/timeline # Frontend — pull the CI-built GHCR image, recreate the container docker compose -f docker-compose.yml -f docker-compose.prod.yml pull frontend docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d frontend # Force-recreate a service if a config/env change isn't picked up docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate dashboard ⚠️ After every RAG ingest you must rebuild the dashboard (the ingest writes to ChromaDB, but the running container won't reflect it until rebuilt) — see §7.5. Rollback: docker compose stop caddy && docker start ttis-web ."

              "text": "4.5 Post‑deploy verification & precheck # DNS resolves to the prod IP dig +short tti-solutions.com @8.8.8.8 # → 34.27.180.8 # Edge / TLS (run from anywhere) curl -sI https://tti-solutions.com/ # 200, Server: Caddy curl -sI https://www.tti-solutions.com/ # 301 → https://tti-solutions.com curl -sI https://app.tti-solutions.com/ # 307 → /vbs (dashboard root redirects) curl -sI https://app.tti-solutions.com/api/v1/health # API health # On the VM — container health (ttis-dashboard should read \"(healthy)\") docker ps --format 'table {{.Names}}\\t{{.Status}}' # On the VM — certificate provisioning / renewal docker logs ttis-caddy 2 > & 1 | grep -iE 'certificate obtained|obtaining|error' | tail -20 # On the VM — are any users provisioned? 0 ⇒ seed/create one (see §4.6), then restart dashboard grep -c '^DASHBOARD_USERS=' config/.env # if 0: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d dashboard"
            },
            {
              "id": "4-6-create-a-login-on-prod-on-the-vm",
              "title": "4.6 Create a login on prod (on the VM)",
              "text": "4.6 Create a login on prod (on the VM) User identities live in auth.db (not .env after first boot). Create/upsert a CEO login in place — the password hash is sha256(DASHBOARD_PWD_SALT + plaintext) : docker exec -e NU = 'charles' -e NP = 'ChangeThisPassword' ttis-dashboard python -c \" import os, hashlib from dashboard import users from dashboard.abac import Role users.init_users_db() pw = hashlib.sha256((os.environ['DASHBOARD_PWD_SALT'] + os.environ['NP']).encode()).hexdigest() users.upsert_user(user_id='U-001', username=os.environ['NU'], password_sha256=pw, role=Role.CEO, domain='tti-solutions.com') print('created user:', os.environ['NU'], '(role ceo)') \" # → created user: charles (role ceo) Pass the password via the -e NP= env (don't bake it into the command history where avoidable), and change it on first login."

              "id": "4-9-troubleshoot-prod",
              "title": "4.9 Troubleshoot (prod)",
              "text": "4.9 Troubleshoot (prod) Symptom Diagnose Fix Deploy aborts at Caddy validation re‑read the validate error; usually a domain var Set WEBHOOK_DOMAIN / APP_DOMAIN /… in config/.env ; re‑run. New UI not visible after deploy docker inspect ttis-frontend --format '{{.Image}}' vs GHCR digest; browser cache docker compose -f … -f docker-compose.prod.yml pull frontend && … up -d frontend ; hard‑refresh (Ctrl/Cmd‑Shift‑R). New backend endpoints 404 git -C ~/ttis-ai log -1 --oneline (is main current?) git pull --ff-only origin main (beware it pull ), then … up -d --build dashboard . RAG results stale after ingest ingest ran but dashboard not rebuilt Rebuild: … up -d --build dashboard (see §7.5). app.tti-solutions.com not 307→/vbs dashboard down / unhealthy docker ps → check ttis-dashboard (healthy) ; docker logs ttis-dashboard --tail 80 . Login fails for everyone / 0 users grep -c '^DASHBOARD_USERS=' config/.env = 0 and auth.db empty Create a user (§4.6); restart dashboard. TLS cert errors on first cutover docker logs ttis-caddy 2>&1 \\| grep -iE 'obtain\\|error' Open ports 80/443 to the VM; wait for ACME challenge; re‑try. Site serves old Squarespace / wrong IP dig +short tti-solutions.com @8.8.8.8 ≠ 34.27.180.8 Repoint DNS A records to 34.27.180.8 ; lower TTL ahead of changes. Container unhealthy after deploy docker logs <name> --tail 120 ; check .env keys, Redis/Cloud SQL reachability Fix the missing env/dependency; … up -d --force-recreate <svc> . Worker not draining jobs docker logs ttis-worker --tail 80 ; redis-cli llen queue:workflow_jobs Restart worker; ensure WORKFLOW_EXECUTION_MODE=queue + REDIS_URL correct. Need to roll back the edge — docker compose stop caddy && docker start ttis-web ."
            },
            {
              "id": "4-10-publish-a-confidential-corpus-doc-to-prod-e-g-the-founder-company-fact-sheet",
              "title": "4.10 Publish a confidential corpus doc to prod (e.g. the founder/company fact sheet)",
              "text": "4.10 Publish a confidential corpus doc to prod (e.g. the founder/company fact sheet) corp_confidential corpus docs (the founder/company fact sheet , sensitive org docs) are gitignored by design — they never go to GitHub or the name‑scrubbed public corpus. So they ride to prod separately from the code, then get ingested + the dashboard rebuilt so LYNNE / the RESEARCHER agent ground on them. (The ingest handles .md , .docx , and .pdf in corp_confidential .) Environment facts that bite (verified 2026‑06‑17): - GCP project is tti-solutions-ai (not ttis-ai — that's a different, empty project). VM ttis-prod , zone us-central1-a . - You SSH in as echar , but the app is deployed under user charles at /home/charles/ttis-ai (your ~ is /home/echar , which has no repo). So git/docker run as charles , and file ops into the repo need sudo . - The confidential dir is data/documents/corp_confidential/ — not …/library/corp_confidential/ . The ingest globs …/corp_confidential/**/*.md and the container mounts ./data/documents:/app/data/documents:ro , so a file under a library/ subdir is silently skipped. - The ingest script is baked into the dashboard image (only data/documents is mounted, not scripts/ ). So you must build dashboard before ingesting or an older image runs the old script (e.g. one with no .md support). - On Windows, gcloud compute scp shells out to PuTTY's pscp , which reads a H:\\… source as a remote host (the drive‑letter colon). cd into the file's folder and pass the bare filename. Close the file in any editor first (an Office ~$… lock → \"Cannot open file\"). # 0) (on the VM, as echar) make the real target dir, owned by charles gcloud compute ssh ttis-prod --project = tti-solutions-ai --zone = us-central1-a sudo install -d -o charles -g charles /home/charles/ttis-ai/data/documents/corp_confidential # 1) (LOCAL, new PowerShell window — the SSH session holds the other) copy the gitignored doc to /tmp. # cd into the folder so pscp doesn't treat the H: drive letter as a remote host. # >>> run on your workstation, not the VM <<< # cd H:\\Projects\\TTI-S_VBS\\ttis-ai\\data\\documents\\corp_confidential # gcloud compute scp FOUNDER_COMPANY_FACT_SHEET.md ttis-prod:/tmp/ \\ # --project=tti-solutions-ai --zone=us-central1-a # 2) (on the VM, as echar) move it into the repo with charles ownership sudo install -o charles -g charles -m 644 \\ /tmp/FOUNDER_COMPANY_FACT_SHEET.md \\ /home/charles/ttis-ai/data/documents/corp_confidential/ # 3) (on the VM) switch to the charles user — owns the repo + can run docker/git sudo -u charles -H bash -l cd ~/ttis-ai git pull --ff-only origin main # get the .md‑capable ingest script C = \"docker compose -f docker-compose.yml -f docker-compose.prod.yml\" $C build dashboard # re‑bake the new ingest script INTO the image $C run --rm --no-deps dashboard python scripts/ingest_rag_corpus.py # ingest → live chromadb # look for: corp_confidential FOUNDER_COMPANY_FACT_SHEET.md → N chunks (md) $C up -d dashboard # restart on the rebuilt image Verify: ask LYNNE a question only the sheet answers (e.g. \"what year was TTIS founded?\" → 2026, or \"TTIS's initial commercial area of emphasis?\" → data center infrastructure). LYNNE cites it as a REF‑n source. corp_confidential is CEO‑only and not name‑scrubbed, so personal facts are preserved. See the Corpus & RAG tab for the full ingest reference. Notes: if git pull reports a dirty tree (an older root‑owned ingest_rag_corpus.py ), git stash first. If docker says permission denied … docker.sock even as charles , prefix the $C commands with sudo . Chroma is a separate persisted service and the dashboard queries it live, so the ingest alone makes the doc searchable — the up -d dashboard just rolls onto the rebuilt image."
            },

              "text": "6.2 Policy‑acknowledgment course (R‑ACK‑01/02) docker exec ttis-dashboard python scripts/seed_policy_ack.py Creates the POL-ACK course: a module + attestation quiz per company policy letter, plus a comprehension read‑gate for policies that have a question bank ( scripts/policy_lessons/comprehension_banks.json ): 5 random questions, 80% to pass ; on fail the learner re‑reads and gets a different 5; 3 failures lock the quiz and escalate to a supervisor . Earns CERT-POLACK (365‑day). Idempotent (skips if POL-ACK exists). Supervisor escalation / reset: - List open escalations: GET /api/v1/lms/quiz-escalations?status=open (also the Escalations tab). - Reset a locked learner: POST /api/v1/lms/enrollments/{enrollment_id}/quizzes/{quiz_id}/reset-lock ."

              "id": "7-3-ingest-idempotent",
              "title": "7.3 Ingest (idempotent)",
              "text": "7.3 Ingest (idempotent) The canonical run (throwaway container writing to the shared ttis-chromadb ): docker compose run --rm --no-deps \\ -e CHROMA_HOST = ttis-chromadb -e CHROMA_PORT = 8000 \\ -v \"H:/Projects/Library:/library:ro\" \\ -v \"H:/Projects/TTI-S_VBS/ttis-ai/data/documents:/app/data/documents:ro\" \\ -v \"H:/Projects/TTI-S_VBS/ttis-ai/tools:/app/tools:ro\" \\ -v \"H:/Projects/TTI-S_VBS/ttis-ai/dashboard:/app/dashboard:ro\" \\ -v \"H:/Projects/TTI-S_VBS/ttis-ai/scripts:/app/scripts:ro\" \\ dashboard python scripts/ingest_rag_corpus.py (Local non‑Docker equivalent: python main.py --ingest-docs .) Output logs per collection, e.g. policies 120 sections → 980 chunks ingested and a final total across collections. Idempotent / re‑ingest: chunk IDs are deterministic ( source_ref#chunk ), so re‑running upserts in place — changed text gets new embeddings, unchanged chunks are silent overwrites. To update: edit the source doc, re‑run the same command. (Deleted docs leave orphan chunks until cleaned via the ChromaDB API.) FAR and DFARS share far_dfars , so always ingest in one pass. Custom paths via env: RAG_LIBRARY_DIR (default /library ), RAG_DOCS_DIR (default /app/data/documents ), CHROMA_HOST / CHROMA_PORT ."
            },

              "text": "7.4 Ingest on prod (background) + the mandatory rebuild On the VM the corpus library is inside the container at /app/data/documents/library . Run the ingest detached (it's long‑running) and watch the log: # Start the full ingest in the background nohup docker exec -e RAG_LIBRARY_DIR = /app/data/documents/library ttis-dashboard \\ python scripts/ingest_rag_corpus.py > ~/ingest.log 2 > & 1 & tail -f ~/ingest.log # watch progress (Ctrl-C to stop watching) tail -n 15 ~/ingest.log # last lines pgrep -af ingest_rag_corpus | grep -v grep || echo \"ingest finished\" Ingest a single collection (e.g. re‑load the SDVOSB CFR PDF) without a full run: docker exec ttis-dashboard python -c \"from tools.rag_ingest import load_cfr_pdf; from dashboard.rag import chunk_sections, ingest_chunks; s=list(load_cfr_pdf('/app/data/documents/library/13 CFR Part 125.pdf','13 CFR Part 125')); print('sdvosb_regs:', ingest_chunks('sdvosb_regs', chunk_sections(s,'sdvosb_regs')), 'chunks')\""

              "id": "9-pursuite-govcon-capture-proposal-platform",
              "title": "9. Pursuite (GovCon capture/proposal platform)",
              "text": "9. Pursuite (GovCon capture/proposal platform) Separate product at H:\\Projects\\Pursuite\\app — an npm‑workspaces monorepo ( apps/api , apps/web ; internally codenamed BidCommandPro ). It feeds the TTIS VBS through the Pursuite webhook (CRM events → port 8001). Local dev runs in Docker; config is injected via env_file: .env (see the Docker Desktop / WSL2 .env gotcha in §1.4). Prod images are tagged pursuite/api:YYYYMMDD . The admin/troubleshooting CLI lives in apps/api/src/db/scripts/ and all helper scripts run from apps/api/ (they read the monorepo‑root .env automatically). When in doubt, run npm run check-health first (§9.7). Two sibling dirs, easy to confuse: src/db/seeds/ = seeding scripts (run once to populate a demo/dev env); src/db/scripts/ = admin CLI tools (run on‑demand to inspect/modify existing data)."

              "id": "9-2-seed-tti-solutions-own-tenant-telecom-bootstrap-market-intel",
              "title": "9.2 Seed TTI‑Solutions' own tenant (telecom bootstrap + market intel)",
              "text": "9.2 Seed TTI‑Solutions' own tenant (telecom bootstrap + market intel) The seed scripts live in the apps/api workspace, so run them from there (or add -w apps/api from the monorepo root): cd H :\\ Projects \\ Pursuite \\ app \\ apps \\ api # 1) Bootstrap company data — NAICS 238210 (wiring), 517919 (telecom), 561621 (security systems) npm run seed : tti -- - -org tti-solutions - -email charles @tti -solutions . com - -password \"YourPW\" ` - -naics 238210 , 517919 , 561621 - -opportunities 6 # 2) Pull real market intelligence from USASpending.gov for that org npm run seed : enrich -- - -org tti-solutions # 3) Refresh market data periodically npm run seed : enrich -- - -org tti-solutions - -reset Direct equivalent: npx tsx src/db/seeds/telecom-bootstrap.ts --org tti-solutions … ."

              "title": "9.3 Demo seeds (sales / AI‑positioning demos)",
              "text": "9.3 Demo seeds (sales / AI‑positioning demos) cd H :\\ Projects \\ Pursuite \\ app \\ apps \\ api # Simplest — named org with a local-auth login npm run seed : ai-demo -- - -org demo-ai - -email admin @example . com - -password \"Demo@2026!\" - -naics 541512 # Reset an existing named org (purge + re-seed) npm run seed : ai-demo -- - -org demo-ai - -reset - -email admin @example . com - -password \"Demo@2026!\" # No flags = auto-generated unique slug, default email, no local-auth password npm run seed : ai-demo Flags: --org <slug> (named; omit → auto unique slug), --email / --password (local‑auth login; omit → none), --reset (purge the named --org then re‑seed; omitting --org always creates fresh), --naics <csv> . Direct: npx tsx src/db/seeds/ai-positioning-demo.ts … . What the AI demo builds — a 3‑bid / 2‑agency story arc that exercises the three AI initiatives: CISA CDM Phase 4 ( LOSS to Booz Allen, with a written debrief) → Army DEVCOM MCADE ( WIN $12.8M, banked win themes) → CISA ZTA Advisory ( ACTIVE , due in 28 days, the test bed) → NIH IT Modernization ( QUALIFYING ). It demonstrates (1) Capture‑Context Injection (win themes, debriefs, CRM hot buttons, bid/no‑bid rationale, compliance scan, content library), (2) Agentic Content Research (real agency DHS CISA + real NAICS 541512 → live USASpending.gov awarded‑contract queries), and (3) Section‑Type Intelligent Pipelines (six section types, each with type‑specific context; Price/Cost links to the CPQ quote). Using a real agency + NAICS is what makes USASpending return actual awards in the demo. Generic CRM test data (separate from the tenant/demo seeds — bulk accounts + contacts for load/UX testing). Two scripts in G:\\BidCommandPro\\seed\\ : run generate.js first (→ accounts.csv 100 rows + contacts.csv ~1,615 rows; 10 \"anchor\" accounts get a 5‑level org chart), then seed.js to POST them to a running API: node generate . js node seed . js - -url http :// localhost : 3001 - -token < jwt > # --dry to preview, --delay 50 to throttle --token is a JWT from POST /api/v1/auth/login . seed.js imports in dependency order (accounts → contacts → wire reportsTo hierarchy) with a live progress bar."

              "id": "9-8-helper-admin-scripts-apps-api-src-db-scripts",
              "title": "9.8 Helper / admin scripts ( apps/api/src/db/scripts/ )",
              "text": "9.8 Helper / admin scripts ( apps/api/src/db/scripts/ ) Run from apps/api/ . Full option reference is in each script's JSDoc header. Script Purpose npm run check-health DB + schema + Redis + BullMQ health (exit 0/1). npm run list-orgs Table of every org: slug, plan, Stripe status, trial expiry, user count. npm run inspect-org -- --org <slug> Deep‑inspect one org — billing, full user table (roles/active/SSO), anomaly warnings. npm run create-user -- --email <e> --org <slug> --role <role> [--name \"…\"] Create a user. npm run set-user-role -- --email <e> --org <slug> --role <role> Change a user's role. npm run reset-local-pw -- --email <e> --org <slug> --password <pw> Set/reset the bcrypt local‑auth password (admin only). npm run clear-session -- --email <e> --org <slug> Force‑logout (writes Redis blocklist). npm run set-plan -- --org <slug> --plan <plan> [opts] Override an org's plan/billing for testing. npm run purge:org -- [--pattern <pre>\\|--org <slug>\\|--keep <csv>] [--dry-run] Targeted org purge. npm run purge:test Purge test-* orgs + clear business data from the bootstrap org. npm run db:generate / npm run db:migrate Generate / apply Drizzle migrations."
            },
            {
              "id": "9-9-users-roles-sessions",
              "title": "9.9 Users, roles & sessions",
              "text": "9.9 Users, roles & sessions cd H :\\ Projects \\ Pursuite \\ app \\ apps \\ api npm run create-user -- - -email admin @pursuite . local - -org pursuite - -role admin npm run create-user -- - -email writer @example . com - -org pursuite - -role writer - -name \"Jane Doe\" npm run set-user -role -- - -email charles @pursuite . io - -org pursuite - -role admin npm run reset-local -pw -- - -email admin @pursuite . local - -org pursuite - -password \"<password>\" Valid roles: admin · proposal_manager · writer · executive_approver · read_only . Only admin can use local‑auth login. First‑time SSO users are auto‑provisioned read_only — upgrade via Admin → Users. Bootstrap an admin from env (fresh org, dev/source via tsx ): $env:ADMIN_EMAIL = 'admin@pursuite.local' ; $env:ADMIN_PASSWORD = '<password>' $env:ORG_SLUG = 'pursuite' ; $env:ORG_NAME = 'Pursuite' npx tsx apps / api / src / db / seeds / bootstrap-admin . ts Standalone delivered app login and named-admin handoff. The standalone login form has no separate username field. Use: Org: default Email: admin email Password: local admin password On a clean standalone install, Pursuite Manager auto-creates: Email: admin@pursuite.local Org: default Password file: %APPDATA%\\Pursuite\\first-run-admin.txt Use that first-run password to sign in, then create your named admin account. To create/set a named admin from PowerShell against the standalone container: docker exec pursuite-api node dist / db / scripts / create-user . js - -email \"you@company.com\" - -org default - -role admin - -name \"Your Name\" docker exec pursuite-api node dist / db / scripts / reset-local -pw . js - -email \"you@company.com\" - -org default - -password \"Use-A-Strong-Password-Here\" If the user already exists, promote them and set/reset the password: docker exec pursuite-api node dist / db / scripts / set-user -role . js - -email \"you@company.com\" - -org default - -role admin docker exec pursuite-api node dist / db / scripts / reset-local -pw . js - -email \"you@company.com\" - -org default - -password \"Use-A-Strong-Password-Here\" After confirming the named admin can log in, disable the temporary/default local password: docker exec pursuite-api node dist / db / scripts / reset-local -pw . js - -email admin @pursuite . local - -org default - -clear Gotcha: standalone-admin.js only creates the first admin if the org has no existing admin. Once admin@pursuite.local exists, use create-user , set-user-role , and reset-local-pw ; rerunning standalone-admin.js will not reset the password. reset-local-pw specifics: local‑auth is admin‑only ( systemRole = \"admin\" ); the password is a bcrypt hash (12 rounds) stored in Redis at local_pw:<userId> . --clear deletes it (disables local auth for that user); does not affect SSO. Force‑logout / \"Token revoked\": clear-session writes blocklist entries for the access token ( blocklist:<userId> , 8 h) and refresh token ( blocklist:<userId>:refresh , 30 d); the next request returns 401 Token revoked . A normal login clears them automatically. It accepts --email <e> --org <slug> or --user-id <uuid> . Stale entries after re‑login: redis-cli DEL blocklist:<userId> blocklist:<userId>:refresh ."

              "id": "9-10-schema-drift-migrations-the-1-login-500-cause",
              "title": "9.10 Schema drift & migrations (the #1 login‑500 cause)",
              "text": "9.10 Schema drift & migrations (the #1 login‑500 cause) Symptom: 500 on POST /api/v1/auth/local with column \"X\" does not exist (e.g. onboarding_completed_at , settings , system_roles , notification_prefs ). A migration added columns but didn't run against this DB. # Apply pending migrations cd H :\\ Projects \\ Pursuite \\ app \\ apps \\ api npm run db : migrate # or: npm run db:migrate --workspace=@bidcommand/api npm run check-health # all Schema rows should be green Emergency manual fix (CI down / first deploy) via psql : ALTER TABLE organizations ADD COLUMN IF NOT EXISTS onboarding_completed_at timestamp ; ALTER TABLE organizations ADD COLUMN IF NOT EXISTS settings jsonb NOT NULL DEFAULT '{}' ; ALTER TABLE organizations ADD COLUMN IF NOT EXISTS plan text NOT NULL DEFAULT 'free' ; ALTER TABLE users ADD COLUMN IF NOT EXISTS system_roles text []; ALTER TABLE users ADD COLUMN IF NOT EXISTS sso_subject text ; ALTER TABLE users ADD COLUMN IF NOT EXISTS notification_prefs jsonb NOT NULL DEFAULT '{}' ; Prevent: run db:migrate in the deploy pipeline before the API process starts."
            },

              "text": "9.11 Onboarding wizard & org cleanup # Onboarding wizard (clears/sets onboardingCompletedAt) — run from monorepo root node - -env -file =. env node_modules /. bin / tsx apps / api / src / db / scripts / reset-onboarding . ts # force reappear node - -env -file =. env node_modules /. bin / tsx apps / api / src / db / scripts / reset-onboarding . ts - -org acme # specific org node - -env -file =. env node_modules /. bin / tsx apps / api / src / db / scripts / reset-onboarding . ts - -complete # suppress wizard # Purge orgs (from apps/api) — ALWAYS --dry-run first npm run purge : org -- - -pattern test - - -dry-run npm run purge : org -- - -pattern test - npm run purge : org -- - -pattern tti-solutions - 17 # all timestamp-suffixed TTI seeds npm run purge : org -- - -keep default , meridian-federal-solutions - -dry-run npm run purge : org -- - -org tti-solutions - 1716300000000 # one exact slug npm run purge : test # test-* + clear bootstrap-org business data"

              "text": "9.12 Billing / plan overrides (testing) cd H :\\ Projects \\ Pursuite \\ app \\ apps \\ api npm run set-plan -- - -plan enterprise npm run set-plan -- - -plan pro - -status active - -period-end + 30d npm run set-plan -- - -plan starter - -status trialing - -trial-ends + 3d # trial banner npm run set-plan -- - -plan free - -status canceled - -trial-ends - 1d # red \"upgrade required\" npm run set-plan -- - -plan free - -clear-stripe # reset / unsubscribe npm run set-plan -- - -org < slug > - -plan pro # target a specific org Plan not updating after Stripe checkout? Check: webhook delivered ( checkout.session.completed )? STRIPE_WEBHOOK_SECRET correct (a wrong secret fails signature verify silently)? STRIPE_STARTER_PRICE_ID + STRIPE_PRO_PRICE_ID both set and matching the dashboard? Inspect with npm run inspect-org -- --org <slug> ."

              "text": "9.13 Redis & background jobs redis-cli ping # → PONG (else Redis down / wrong REDIS_URL) redis-cli KEYS \"bull:*:wait\" # waiting BullMQ jobs redis-cli ZCARD \"bull:sam-monitor:delayed\" # scheduled SAM.gov monitors redis-cli LMOVE \"bull:<q>:failed\" \"bull:<q>:wait\" LEFT RIGHT # retry a failed job SAM.gov monitors run as BullMQ scheduled jobs; each org supplies its own SAM.gov API key (Admin → Integrations, expires annually). For managed Redis use rediss:// (TLS) and check VPC rules."

              "id": "9-14-environment-variables-reference",
              "title": "9.14 Environment variables (reference)",
              "text": "9.14 Environment variables (reference) All belong in the monorepo‑root .env (or your secrets manager). Variable Required Notes APP_URL ✅ Public base URL users type to reach the app, no trailing slash . See the callout below. DATABASE_URL ✅ postgres://user:pass@host/db . REDIS_URL ✅ redis://… or rediss://… (TLS). JWT_SECRET ✅ ≥32 random chars. TOKEN_ENCRYPTION_KEY ✅ Distinct 64‑char hex ( openssl rand -hex 32 ), ≠ JWT_SECRET ; server fails closed if missing/dup. STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET ✅ sk_… / whsec_… . STRIPE_STARTER_PRICE_ID / STRIPE_PRO_PRICE_ID ✅ Must match the Stripe dashboard exactly. EMAIL_PROVIDER (+ provider keys) ✅ ses ( SES_FROM_ADDRESS , AWS_* ) or sendgrid ( SENDGRID_* ). VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY / VAPID_SUBJECT push npx web-push generate-vapid-keys (changing them forces re‑subscribe). AWS_S3_BUCKET / AWS_S3_REGION / AWS_* uploads S3 file storage. OIDC_ISSUER / OIDC_CLIENT_ID / OIDC_CLIENT_SECRET / OIDC_REDIRECT_URI SSO SSO_PROVIDER=auth0 or generic. APP_URL — the most delivery‑critical setting. It's the public base URL the API uses to build absolute links/redirects in five places: user‑invitation accept links, Stripe checkout success_url / cancel_url , the Stripe billing‑portal return_url , Nylas calendar/email OAuth callbacks, and \"View Report\" links in scheduled‑report emails (plus the desktop tray's open‑in‑browser). Set it to exactly what users type to reach the app — no trailing slash . If it's wrong, invite emails contain broken links, Stripe redirects fail after checkout, and OAuth redirects go to the wrong host. Examples: http://localhost (local), http://192.168.1.100 (LAN/office — most common self‑hosted), http://bidcommandpro.local (custom DNS/hosts), https://bids.yourcompany.com (Internet + TLS)."
            },

              "text": "9.15 Error‑code quick reference HTTP Message Likely cause See 401 Token revoked force‑logout / stale blocklist §9.9 401 Invalid credentials wrong pw, user inactive, or not admin §9.9 400 Invalid or expired state SSO state TTL (60 s) expired §9.13 400 Organization 'X' not found bad ?org= slug on /auth/login list-orgs 403 Plan limit exceeded free/starter hitting a gated feature §9.12 500 column \"X\" does not exist migration not applied §9.10 500 TOKEN_ENCRYPTION_KEY error missing/duplicate key §9.14 500 connect ECONNREFUSED Redis/Postgres not reachable §9.13"

              "id": "9-16-troubleshoot-operations-product",
              "title": "9.16 Troubleshoot (operations + product)",
              "text": "9.16 Troubleshoot (operations + product) Symptom Diagnose Fix OCI not a directory on .env mount stale container replaying old single‑file mount down --remove-orphans then up -d --force-recreate (§1.4). Login 500 read the API log stack trace ( docker compose logs api --tail=50 ) Almost always schema drift (§9.10) or a missing env key (§9.14). Login 401 despite correct password inspect-org — user inactive / not admin? Reactivate ( UPDATE users SET active=true … ); only admin does local‑auth (§9.9). Seed says org already exists named --org already seeded Add --reset (or omit --org for a fresh slug). USASpending returns nothing unreal agency/NAICS, or org not seeded Seed first; use real agency + NAICS (demo uses DHS CISA + 541512). Delivery gate fails in build-and-deliver.ps1 bootstrap-admin /vitest failed Fix the failing test before packaging — the gate is intentional. Can't log in after delivery temp password expired (3 days) / not captured Shown once in the verdict banner; re‑issue via reset-local-pw . \"MFA code required\" but never enrolled account is TOTP‑enrolled Enter the authenticator code; Admin can reset MFA (Admin → Users), then re‑enroll. MFA code rejected repeatedly device clock drift Wait for the next 30‑s code; set phone time to automatic. Document blocked — \"clearance required\" (403) clearance below the item minimum Set under Profile → Security (Admin‑assigned); the denial is audited. RFP Shredder finds no requirements scanned/image‑only PDF, OCR layer absent OCR runs automatically; re‑upload a clearer scan or add requirements manually (air‑gap bundles the OCR layer). Compliance Matrix export stuck \"Generating\" DOCX/PDF renders in the background Wait for Complete (CSV is instant); ensure soffice (LibreOffice) is on the worker for PDF. No emails sent / going to spam check EMAIL_PROVIDER + keys; SPF/DKIM/DMARC SES sandbox only sends to verified addresses — request production access."
            },
            {
              "id": "9-17-mutative-test-harness-regression",
              "title": "9.17 Mutative Test Harness & regression",
              "text": "9.17 Mutative Test Harness & regression MTH ( testing/mutative-harness/ ; ref MTH_User_Guide_v4 ) — adversarial input mutation against the Pursuite API. Never run against prod — it creates/deletes users and edits org config; use a dedicated test/staging instance. cd H :\\ Projects \\ Pursuite \\ testing \\ mutative-harness npm install ; copy . env . example . env # add tokens + API URL (DRY_RUN=true by default) npm run run : dry # plan + results/latest.html, no requests sent # set DRY_RUN=false in .env, then a scope: npm run run : all # or run:auth / run:rbac / run:compliance / run:admin Mutation types: Structural (remove_field / empty_object / extra_fields / nesting), Type (invalid_enum SQLi / binary), Value (sql / xss / path‑traversal / long‑string), Semantic (cross_org_id), Protocol (missing_auth / wrong_role_token / alg=none / malformed), Chaos (duplicate / concurrent / large_payload), Fuzz. Findings → results/latest.{json,html} ; severities CRITICAL/HIGH/MEDIUM/LOW; exit 0 clean / 1 CRITICAL (block) / 2 fatal. Add an endpoint = append a baseline in src/input-generator/baseline-payloads.ts (the engine auto‑generates all groups). 17‑step regression pipeline — scripts/run-regression.ps1 (ref TestPlan_Regression_v6.docx ; 301 documented TCs, 258 active): .\\ scripts \\ run-regression . ps1 # full 17-step run .\\ scripts \\ run-regression . ps1 -Filter \"BUG-\" # bug-fix regression only .\\ scripts \\ run-regression . ps1 -Filter \"NEG-\" -ApiOnly .\\ scripts \\ run-regression . ps1 -AirGap -AirGapApiUrl http :// airgap-host : 3000 -AirGapEmail admin @company . gov Steps: prereqs → container health → credentials → tsc → API vitest → web vitest → BUG‑/NEG‑ regression → CPQ → debrief/WLA → RFP shredder → A‑series stubs → phase 1–4 suites → air‑gap smoke (25 checks) → summary ( test-results/regression-*.txt ). Flags: -ApiOnly / -WebOnly / -Filter / -AirGap . Filter aliases: BUG- , NEG- , TC-CPQ- , TC-DB- , TC-RFP- , TC-WLA- , … The TTIS VBS port of this methodology lives on the TTI‑VBS tab §1.11 ( tools/mth/ , scripts/run_regression.py ) — same oracle/strategy model, adapted to FastAPI + the ABAC PDP."
